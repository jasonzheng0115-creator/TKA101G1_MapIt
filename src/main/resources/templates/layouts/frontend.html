<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="MapIt 旅遊平台" />
    <meta name="author" content="TKA101G1" />
    <title>MapIt - 旅遊景點平台</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <!-- Google Fonts Outfit & Noto Sans TC -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet" />
</head>
<body>

    <!-- 組合式固定導覽列 (整合主選單與次選單) -->
    <header th:fragment="navbar" class="fixed-top bg-white shadow-sm" style="z-index: 1030;">
        <!-- 主選單 (Top Bar) -->
        <nav class="navbar navbar-expand-lg navbar-light border-bottom py-2">
            <div class="container px-4 px-lg-5">
                <a class="navbar-brand fw-bold fs-3" href="/" style="color: #ff5722;">旅圖 | MapIt</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center" style="font-size: 0.9rem;">
                        <!-- 1. 會員中心：已登入才顯示，並點擊展開選單 -->
                        <li class="nav-item dropdown" th:if="${userName != null or session.loginCust != null}">
                            <a class="nav-link text-secondary px-3 dropdown-toggle" href="#" id="memberDropdown" role="button">
                                <i class="bi bi-person-circle"></i> <span th:text="${userName != null ? userName : (session.loginCust != null ? session.loginCust.custName : '')} + ' 你好'">會員中心</span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 mt-2" aria-labelledby="memberDropdown" style="border-radius: 10px;">
                                <li>
                                    <a class="dropdown-item py-2" th:href="@{/customer/updateProfile}">
                                        <i class="bi bi-person-lines-fill me-2 text-secondary"></i>修改個人資料
                                    </a>
                                </li>
                                <li>
                                    <a class="dropdown-item py-2" th:href="@{/customer/ticket}">
                                        <i class="bi bi-tags me-2 text-secondary"></i>我的票券夾
                                    </a>
                                </li>
                                <li>
                                    <a class="dropdown-item py-2" th:href="@{/orders/my-orders}">
                                        <i class="bi bi-file-earmark-text me-2 text-secondary"></i>我的訂單紀錄
                                    </a>
                                </li>
                                <li>
                                    <a class="dropdown-item py-2" th:href="@{/customer/message}">
                                        <i class="bi bi-bell me-2 text-secondary"></i>我的通知
                                    </a>
                                </li>
                            </ul>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-secondary px-3" th:href="@{/cart/show}">
                                <i class="bi bi-cart3"></i> 購物車
                            </a>
                        </li>
                        <!-- 3. 登出按鈕：已登入時顯示 -->
                        <li class="nav-item ms-lg-2" th:if="${userName != null or session.loginCust != null}">
                            <a class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold shadow-sm"
                                th:href="@{/customer/logout}">登出</a>
                        </li>
                        <!-- 4. 註冊 / 登入按鈕：未登入時才顯示 -->
                        <li class="nav-item ms-lg-2" th:unless="${userName != null or session.loginCust != null}">
                            <a class="btn btn-warning btn-sm rounded-pill px-3 fw-bold shadow-sm"
                                th:href="@{/customer/login}">註冊 / 登入</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <!-- 次選單 (Sub-Navbar) -->
        <nav class="sub-navbar bg-white py-1">
            <div class="container px-4 px-lg-5">
                <ul class="nav justify-content-center fw-bold">
                    <li class="nav-item"><a class="nav-link active px-4" href="/">首頁</a></li>
                    <li class="nav-item"><a class="nav-link text-dark px-4" href="/front/attr/about">關於我們</a></li>
                    <li class="nav-item"><a class="nav-link text-dark px-4"
                            th:href="@{/frontend/product/listAll}">商城</a></li>
                    
                    <!-- 景點探索 (地區下拉選單) -->
                    <li class="nav-item megamenu-nav-item position-relative">
                        <a class="nav-link text-dark px-4" href="/front/attr/search">景點探索</a>
                        
                        <!-- 觀光景點小型下拉選單 (無地圖版) -->
                        <div class="megamenu-dropdown" style="width: 200px !important; left: 50% !important; transform: translateX(-50%) !important; right: auto !important; border-radius: 12px; padding: 20px;">
                            <h6 class="fw-bold text-dark mb-3" style="font-size: 1.05rem; letter-spacing: 1px;">觀光景點</h6>
                            <ul class="list-unstyled ps-3" style="border-left: 2px solid #ff5722; line-height: 2.2; margin-bottom: 0;">
                                <li><a href="/front/attr/search?area=北部地區" class="text-secondary text-decoration-none region-link">北部地區</a></li>
                                <li><a href="/front/attr/search?area=中部地區" class="text-secondary text-decoration-none region-link">中部地區</a></li>
                                <li><a href="/front/attr/search?area=南部地區" class="text-secondary text-decoration-none region-link">南部地區</a></li>
                                <li><a href="/front/attr/search?area=東部地區" class="text-secondary text-decoration-none region-link">東部地區</a></li>
                                <li><a href="/front/attr/search?area=離島地區" class="text-secondary text-decoration-none region-link">離島地區</a></li>
                            </ul>
                        </div>
                    </li>
                    
                    <!-- 主題推薦 (Megamenu) -->
                    <li class="nav-item megamenu-nav-item">
                        <a class="nav-link text-dark px-4" href="#!">主題推薦</a>
                        <div class="megamenu-dropdown">
                            <div class="container px-4 px-lg-5">
                                <div class="megamenu-grid">
                                    <!-- 1. 自然景觀 (categoryId=1) -->
                                    <a href="/front/attr/search?categoryId=1" class="megamenu-card text-decoration-none">
                                        <div class="megamenu-img-wrapper">
                                            <img src="/images/nature.jpg" class="megamenu-img" alt="自然景觀">
                                        </div>
                                        <div class="megamenu-title">自然景觀</div>
                                    </a>
                                    <!-- 2. 歷史古蹟 (categoryId=2) -->
                                    <a href="/front/attr/search?categoryId=2" class="megamenu-card text-decoration-none">
                                        <div class="megamenu-img-wrapper">
                                            <img src="/images/history.jpg" class="megamenu-img" alt="歷史古蹟">
                                        </div>
                                        <div class="megamenu-title">歷史古蹟</div>
                                    </a>
                                    <!-- 3. 主題樂園 (categoryId=3) -->
                                    <a href="/front/attr/search?categoryId=3" class="megamenu-card text-decoration-none">
                                        <div class="megamenu-img-wrapper">
                                            <img src="/images/amusement.jpg" class="megamenu-img" alt="主題樂園">
                                        </div>
                                        <div class="megamenu-title">主題樂園</div>
                                    </a>
                                    <!-- 4. 藝文館所 (categoryId=4) -->
                                    <a href="/front/attr/search?categoryId=4" class="megamenu-card text-decoration-none">
                                        <div class="megamenu-img-wrapper">
                                            <img src="/images/gallery.jpg" class="megamenu-img" alt="藝文館所">
                                        </div>
                                        <div class="megamenu-title">藝文館所</div>
                                    </a>
                                    <!-- 5. 商圈夜市 (categoryId=5) -->
                                    <a href="/front/attr/search?categoryId=5" class="megamenu-card text-decoration-none">
                                        <div class="megamenu-img-wrapper">
                                            <img src="/images/market.jpg" class="megamenu-img" alt="商圈夜市">
                                        </div>
                                        <div class="megamenu-title">商圈夜市</div>
                                    </a>
                                    <!-- 6. 休閒農場 (categoryId=6) -->
                                    <a href="/front/attr/search?categoryId=6" class="megamenu-card text-decoration-none">
                                        <div class="megamenu-img-wrapper">
                                            <img src="/images/farm.jpg" class="megamenu-img" alt="休閒農場">
                                        </div>
                                        <div class="megamenu-title">休閒農場</div>
                                    </a>
                                    <!-- 7. 宗教廟宇 (categoryId=7) -->
                                    <a href="/front/attr/search?categoryId=7" class="megamenu-card text-decoration-none">
                                        <div class="megamenu-img-wrapper">
                                            <img src="/images/temple.jpg" class="megamenu-img" alt="宗教廟宇">
                                        </div>
                                        <div class="megamenu-title">宗教廟宇</div>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </li>
                    <li class="nav-item"><a class="nav-link text-dark px-4" th:href="@{/trip/my-trips}">我的行程</a></li>
                    <li class="nav-item"><a class="nav-link text-dark px-4" href="/front/favorite/list">我的收藏</a></li>
                    <li class="nav-item"><a class="nav-link text-dark px-4" href="/contact">客服中心</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- JS Dropdown 控制 -->
    <th:block th:fragment="scripts">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", function() {
                // 1. 會員選單控制
                const memberDropdownToggle = document.getElementById('memberDropdown');
                if (memberDropdownToggle) {
                    const dropdownMenu = memberDropdownToggle.nextElementSibling;
                    memberDropdownToggle.addEventListener('click', function(e) {
                        e.preventDefault(); e.stopPropagation();
                        dropdownMenu.classList.toggle('show');
                    });
                    document.addEventListener('click', function(e) {
                        if (dropdownMenu.classList.contains('show')) {
                            if (!dropdownMenu.contains(e.target) && e.target !== memberDropdownToggle && !memberDropdownToggle.contains(e.target)) {
                                dropdownMenu.classList.remove('show');
                            }
                        }
                    });
                }

                // 2. 自動設定導覽列作用中項目的橘色底線
                const currentPath = window.location.pathname;
                const navLinks = document.querySelectorAll(".sub-navbar .nav-link");
                
                navLinks.forEach(link => {
                    link.classList.remove("active");
                    link.classList.add("text-dark");
                    
                    const href = link.getAttribute("href");
                    if (!href) return;
                    
                    let isMatch = false;
                    
                    if (currentPath === href) {
                        isMatch = true;
                    } else if (href === "/" && (currentPath === "" || currentPath === "/index.html")) {
                        isMatch = true;
                    } else if ((href.includes("/front/attr/search") || href.includes("/front/attr/list")) && currentPath.startsWith("/front/attr/") && !currentPath.includes("/about")) {
                        // 排除「關於我們」後，所有前台景點相關路由都高亮「景點探索」
                        isMatch = true;
                    } else if (href.includes("/trip/") && currentPath.startsWith("/trip/")) {
                        // 行程子路由
                        isMatch = true;
                    } else if (href.includes("/favorite/") && currentPath.startsWith("/front/favorite/")) {
                        // 收藏子路由
                        isMatch = true;
                    } else if (href.includes("/frontend/product/") && (currentPath.startsWith("/frontend/product/") || currentPath.startsWith("/cart/"))) {
                        // 商品與購物車路由皆高亮「商城」
                        isMatch = true;
                    }
                    
                    if (isMatch) {
                        link.classList.add("active");
                        link.classList.remove("text-dark");
                    }
                });
            });
        </script>
    </th:block>
</body>
</html>
