<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>票券庫存總覽 - MapIt 後台</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7fc;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --border-color: #e2e8f0;
            --success-color: #10b981;
            --success-bg: #d1fae5;
            --warning-color: #f59e0b;
            --warning-bg: #fef3c7;
            --danger-color: #ef4444;
            --danger-bg: #fee2e2;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header {
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .glass-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .search-form {
            display: flex;
            gap: 16px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-control {
            padding: 10px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            min-width: 250px;
        }

        .btn-primary {
            background-color: var(--primary-color);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
        }
        
        .btn-outline-info {
            border-radius: 8px;
            font-weight: 600;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        th {
            background-color: #f8fafc;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
            min-width: 60px;
            text-align: center;
        }
        
        .status-unsold { background-color: var(--success-bg); color: var(--success-color); }
        .status-sold { background-color: var(--danger-bg); color: var(--danger-color); }
        .status-void { background-color: #f1f5f9; color: #64748b; }
        
        .status-col {
            width: 180px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h1>🎟️ 票券庫存大清單 (聚合統計)</h1>
    </div>

    <!-- 搜尋區塊 -->
    <div class="glass-card">
        <form class="search-form" onsubmit="event.preventDefault(); searchTickets();">
            <div class="form-group">
                <label for="searchProdId">🔍 商品編號 (精確查詢)</label>
                <input type="number" id="searchProdId" class="form-control" placeholder="例如: 1">
            </div>
            <div class="form-group">
                <label for="searchProdName">🔍 商品名稱 (模糊查詢)</label>
                <input type="text" id="searchProdName" class="form-control" placeholder="例如: 台北一日遊">
            </div>
            <button type="button" class="btn btn-primary" onclick="searchTickets()">查詢庫存</button>
            <button type="reset" class="btn btn-light" onclick="setTimeout(searchTickets, 100)">清除</button>
        </form>
    </div>

    <!-- 票券統計總表區塊 -->
    <div class="glass-card">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>商品編號 (ID)</th>
                        <th>商品名稱</th>
                        <th class="status-col">🟢 未售出(庫存)</th>
                        <th class="status-col">🔴 已售出</th>
                        <th class="status-col">⚪ 已作廢</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="ticketTableBody">
                    <!-- JavaScript 將會把 TicketTotalDTO 的資料填入這裡 -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- ========================================== -->
<!-- 彈出視窗 (Modal) : 用來顯示特定商品的所有散裝票券 -->
<!-- ========================================== -->
<div class="modal fade" id="ticketDetailModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">商品票券明細</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>票券實體編號 (TKT_ID)</th>
                    <th>銷售狀態</th>
                </tr>
            </thead>
            <tbody id="modalTableBody">
                <!-- JavaScript 將會把特定商品的 TicketDTO 填入這裡 -->
            </tbody>
        </table>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
      </div>
    </div>
  </div>
</div>

<!-- 引入 Bootstrap 的 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
	// 網頁載入完成時，去抓取票券查詢功能的資料
	window.onload = function() {searchTickets();};

	
	//票券查詢功能
	function searchTickets(){
		var inputId = document.getElementById("searchProdId").value;
		var inputName = document.getElementById("searchProdName").value;
		var url = "/ticket/api/ticketAll?prodId="+inputId+"&prodName="+inputName;
	fetch(url) //接到api網址
		.then(function(response){
			return response.json(); //把uri拆成json格式
		})
		.then(function(data){ //拿到json格式的報表

			//每次查詢時都先清空網頁的資料，避免疊加上一次的搜尋結果資料
			var tbody = document.getElementById("ticketTableBody");
			tbody.innerHTML="";
	
			//寫上搜尋的所有結果
			for(var i=0;i<data.length;i++){
				var prodListOne = data[i]; //拿出一份單獨的商品報表
				
				var trHTML = "<tr>";
				trHTML = trHTML+"<td>"+prodListOne.productId +"</td>";
				trHTML = trHTML+"<td>"+prodListOne.productName +"</td>";
				trHTML = trHTML+"<td class='status-col'><span class='status-badge status-unsold'>"
					+prodListOne.unsoldCount +"</span></td>";
				trHTML = trHTML+"<td class='status-col'><span class='status-badge status-sold'>"
					+prodListOne.soldCount +"</span></td>";
				trHTML = trHTML+"<td class='status-col'><span class='status-badge status-void'>"
					+prodListOne.cancelCount +"</span></td>";
				trHTML = trHTML + "<td><button class='btn btn-sm btn-outline-info' onclick='openDetailModal(" 
					+ prodListOne.productId
					+ ",\" "+ prodListOne.productName +"\")'>查看明細</button></td>";
				trHTML = trHTML+"</tr>";
				tbody.innerHTML=tbody.innerHTML+trHTML;
			}
		});
	}
	
	//票券詳細視窗
	//點查看明細的按鈕後，會把商品編號(productId)傳進來(modal代表視窗)
	function openDetailModal(productId,productName) {
		//拿取商品票券明細的內容，改寫顯示的文字
		document.getElementById("modalTitle").innerHTML="商品編號: "+ productId + " / 商品名稱:"+productName+" - 票券明細"
		//資料去後端找需要時間，提供載入中的字樣，避免使用者以為當機或重複點按
		var modalTbody=document.getElementById("modalTableBody");
		modalTbody.innerHTML="<tr><td colspan='2' style='text-align:center;'>資料飛奔中...請稍候</td></tr>";
		//呼叫bootStrap，啟動彈出視窗
		var myModal = new bootstrap.Modal(document.getElementById('ticketDetailModal'));
		myModal.show();
		
	var detailUrl = "/ticket/api/ticketList?prodId=" +productId;
	fetch(detailUrl) //接到api網址
	.then(function(response){
		return response.json(); //把uri拆成json格式
	})
	.then(function(detailData){
		modalTbody.innerHTML="";
		
		if(detailData.length ===0){
			modalTbody.innerHTML = "<tr><td colspan='2' style ='text-align:center; color:red;'>這項商品目前沒有任何票券喔！ </td></tr>";
			return; //直接結束，不跑迴圈
		}
		
		for(var i=0;i<detailData.length;i++){
			var ticket = detailData[i]; //拿出單獨一份詳細票券資料
			
			// 準備彩色名牌
			var statusBadge = "";
			if(ticket.saleStatus === "未售出") {
				statusBadge = "<span class='status-badge status-unsold'>未售出</span>";
			} else if (ticket.saleStatus === "已售出") {
				statusBadge = "<span class='status-badge status-sold'>已售出</span>";
			} else {
				statusBadge = "<span class='status-badge status-void'>已作廢</span>";
			}
			
			var trHTML = "<tr>"
			trHTML = trHTML + "<td>" +ticket.tktId + "</td>";
			trHTML = trHTML + "<td>" +statusBadge + "</td>";
			trHTML = trHTML + "</tr>"
			modalTbody.innerHTML = modalTbody.innerHTML +trHTML;
		}
	});
	}
	
	
</script>
</body>
</html>
