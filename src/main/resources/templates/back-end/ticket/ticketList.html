<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>票券庫存管理 - MapIt 後台</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7fc;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --border-color: #e2e8f0;
            --success-color: #10b981;
            --success-bg: #d1fae5;
            --warning-color: #f59e0b;
            --warning-bg: #fef3c7;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 標題區塊 */
        .page-header {
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        /* 玻璃擬真/質感卡片設計 */
        .glass-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        /* 搜尋區塊 */
        .search-form {
            display: flex;
            gap: 16px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-control {
            padding: 10px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            min-width: 250px;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        /* 資料表格設計 */
        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f8fafc;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #f8fafc;
        }

        /* 狀態標籤 */
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            display: inline-block;
        }

        .status-unsold {
            background-color: var(--success-bg);
            color: var(--success-color);
        }

        .status-sold {
            background-color: var(--warning-bg);
            color: var(--warning-color);
        }

        /* 數量統計面板預留區 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat-title {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h1>🎟️ 票券庫存大清單</h1>
    </div>

    <!-- 統計面板預留位 (你可以在 Controller 算好傳過來，或是之後再做) -->
    <!-- 
    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-title">總票數</span>
            <span class="stat-value">1,250</span>
        </div>
        ...
    </div>
    -->

    <!-- 搜尋區塊 -->
    <div class="glass-card">
        <!-- 【教練提示】這裡把 action 指向你的 Controller 門牌 -->
        <form action="/ticket/ticketList" method="get" class="search-form">
            <div class="form-group">
                <label for="prodId">選擇商品進行查詢</label>
                <!-- 【關鍵點】使用下拉選單，前端顯示名稱，後端傳遞 ID -->
                <select id="prodId" name="prodId" class="form-control">
                    <option value="">-- 顯示所有票券 --</option>
                    <!-- 使用 Thymeleaf 迴圈，從後端傳過來的 prodList 動態產生選項 -->
                    <option th:each="prod : ${prodList}" 
                            th:value="${prod.productId}" 
                            th:text="${prod.productName}">
                    </option>
                </select>
            </div>
            <button type="button" class="btn btn-primary" onclick="searchTickets()">查詢票券</button>
        </form>
    </div>

    <!-- 票券列表區塊 -->
    <div class="glass-card">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>票券編號 (TKT_ID)</th>
                        <th>所屬商品 (PROD_ID)</th>
                        <th>銷售狀態</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
	//拿後端資料的函數
	function findTicketsAPI(prodId){
		
		//準備接後端JSON資料的門牌
		var url = "/ticket/api/ticketList"
		
		//如果proId不等於空值 (!==嚴格不等於)
		if(prodId !== undefined){
			//?prodId=路徑到此為止，後面是參數
			url = url+"?prodId="+prodId;
		}
	
		fetch(url)
			.then(function(response){
				return response.json(); //包裹拆開變成json格式
		})
		.then(function(data){
			//data已經是從後端傳過來的JSON資料了
			var tbody = document.querySelector("tbody");
			//先把原本的HTML表格內容清空(如沒有就會顯示上一次查詢的結果，繼續疊加)
			tbody.innerHTML = ""
		
			for(var i=0 ; i<data.length ; i=i+1){
				var ticket = data[i];
				
				//html字串組合
				var trHTML = "<tr>";
				trHTML = trHTML+"<td>"+ticket.tktId+"</td>";
				trHTML = trHTML+"<td>"+ticket.productName+"</td>";
				trHTML = trHTML+"<td>"+ticket.saleStatus+"</td>";
				trHTML = trHTML+"<td><a href='#'>查看明細</a></td>";
				trHTML = trHTML+"</tr>"
				//組合好的tbody塞進html裡
				tbody.innerHTML = tbody.innerHTML+trHTML;
			}
		})
		//如果失敗會跑這
		.catch(function(error){
			console.error("抓取資料失敗:", error);	
		});
	}
	 window.onload = function() {
		 findTicketsAPI();
	 };
	 
	 //查詢票券的功能
	 function searchTickets(){
		var searchElement = document.getElementById("prodId");
		var selectValue = searchElement.value;
		
		if(selectValue !== ""){
			findTicketsAPI(selectValue);
		}else{
			findTicketsAPI();
		}
	 }
</script>
</body>
</html>
