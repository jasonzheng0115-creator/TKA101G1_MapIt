<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MapIt 後台 - 編輯會員資料</title>
    <!-- 引入前台風格的 CSS (共用資源) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="/css/styles.css" rel="stylesheet" />
    <style>
        :root {
            --primary-orange: #ff5722;
            --primary-orange-hover: #e64a19;
            --dark-blue: #0f172a;
            --bg-color: #f8fafc;
            --card-bg: #FFFFFF;
            --text-main: #334155;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-top: 140px; /* 為了固定導覽列留出空間 */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        /* 後台專用 Top Bar */
        .navbar-backend {
            background-color: white;
            border-bottom: 1px solid var(--border-color);
        }

        /* 後台功能次選單 */
        .sub-navbar-backend {
            background-color: white;
            border-bottom: 2px solid var(--border-color);
        }

        .sub-navbar-backend .nav-link {
            color: #475569;
            transition: color 0.2s;
            font-size: 0.95rem;
        }

        .sub-navbar-backend .nav-link:hover {
            color: var(--primary-orange);
        }

        /* 編輯表單卡片設計 */
        .form-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            width: 100%;
            max-width: 800px;
            padding: 40px;
            box-sizing: border-box;
            border-top: 4px solid var(--primary-orange);
            margin-bottom: 50px;
        }

        .form-card h2 {
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 1.5rem;
            color: var(--dark-blue);
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
            font-weight: bold;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        input, select {
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--primary-orange);
            box-shadow: 0 0 0 3px rgba(255, 87, 34, 0.1);
        }

        input[readonly] {
            background-color: #f1f5f9;
            color: #94a3b8;
            cursor: not-allowed;
            border-color: #e2e8f0;
        }

        .btn-group {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }

        .btn-save {
            background-color: var(--primary-orange);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-save:hover {
            background-color: var(--primary-orange-hover);
        }

        .btn-back {
            background-color: #FFFFFF;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 12px 28px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            transition: all 0.2s;
        }

        .btn-back:hover {
            background-color: #f8fafc;
            color: var(--text-main);
        }
    </style>
</head>

<body>

    <!-- 組合式固定導覽列 (後台專用) -->
    <header class="fixed-top shadow-sm" style="z-index: 1030;">
        <!-- 主選單 (Top Bar) -->
        <nav class="navbar navbar-expand-lg navbar-light navbar-backend py-2">
            <div class="container-fluid px-4 px-lg-5">
                <a class="navbar-brand fw-bold fs-3" href="/manage" style="color: var(--primary-orange);">MapIt <span
                        class="fs-5 text-secondary">後台管理系統</span></a>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center" style="font-size: 0.9rem;">
                        <li class="nav-item">
                            <span class="nav-link text-secondary px-3">
                                <i class="bi bi-person-badge-fill text-dark"></i>
                                <span th:text="${session.loginEmp != null ? session.loginEmp.empName + ' 您好' : '管理員 您好'}">管理員 您好</span>
                            </span>
                        </li>
                        <li class="nav-item ms-lg-2">
                            <a class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold shadow-sm"
                                th:href="@{/emp/logout}">登出</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- 次選單 (功能導覽) -->
        <nav class="sub-navbar-backend py-1">
            <div class="container-fluid px-4 px-lg-5">
                <ul class="nav justify-content-center fw-bold">
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/product/select_page}">商品管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/orders/backend-list}">訂單管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/customer/empCustomerList}">會員管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/supplier/select_page}">廠商管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/ap/select_page}">應付帳款</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/emp/select_page}">員工管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/dept/listAllDept}">部門管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/emp/message/send}">通知發送</a></li>
                </ul>
            </div>
        </nav>
    </header>

<script type="text/javascript">

	window.onload = function(){
		var urlParams = new URLSearchParams(window.location.search);
		var custId = urlParams.get("custId");		
		fetch("/customer/api/getOne?custId=" + custId)
			.then(function(responses){
				return responses.json();
		})
		.then(function(data){
			document.getElementById("custId").value = data.custId;
			document.getElementById("custAccount").value = data.custAccount;
			document.getElementById("custPassword").value = data.custPassword;
			document.getElementById("custRight").value = data.custRight;
			document.getElementById("custUse").value = data.custUse;
			document.getElementById("custName").value = data.custName;
			document.getElementById("custSex").value = data.custSex;
			document.getElementById("custTel").value = data.custTel;
			document.getElementById("custEmail").value = data.custEmail;
			document.getElementById("custIdCard").value = data.custIdCard;
			document.getElementById("custBirthday").value = data.custBirthday;
			document.getElementById("custCard").value = data.custCard;
			document.getElementById("custAddress").value = data.custAddress;
		})

		document.getElementById("updateForm").onsubmit = function(event){
		event.preventDefault();
		
		var payload = {
			custId:document.getElementById("custId").value,
			custAccount:document.getElementById("custAccount").value,
			custPassword:document.getElementById("custPassword").value,
			custRight:document.getElementById("custRight").value,
			custUse:document.getElementById("custUse").value,
			custName:document.getElementById("custName").value,
			custSex:document.getElementById("custSex").value,
			custTel:document.getElementById("custTel").value,
			custEmail:document.getElementById("custEmail").value,
			custIdCard:document.getElementById("custIdCard").value,
			custBirthday:document.getElementById("custBirthday").value,
			custCard:document.getElementById("custCard").value,
			custAddress:document.getElementById("custAddress").value
		}
		
		fetch("/customer/api/update",{
		method:"POST",
		headers: {"Content-Type": "application/json"},
		body:JSON.stringify(payload)
		})
		.then(function(responses){
		return responses.text();	
		})
		.then(function(resultText){
			if(resultText === "success"){
				alert("會員資料修改成功！");
				window.location.href = "/customer/empCustomerList";
			}else{
				alert("修改失敗，原因：" + resultText);
			}
	    });
	  }
	}
	
</script>

<div class="form-card">
    <h2>編輯會員資料</h2>
    
    <form id="updateForm">
        <input type="hidden" id="custId" name="custId"/>
        <input type="hidden" id="custPassword" name="custPassword"/>
        
        <div class="form-grid">
            <div class="form-group">
                <label>會員帳號 (不可修改)</label>
                <input type="text" id="custAccount" name="custAccount" readonly />
            </div>
            
            <div class="form-group">
                <label>真實姓名</label>
                <input type="text" id="custName" name="custName" placeholder="請輸入姓名" />
            </div>
            
            <div class="form-group">
                <label>性別</label>
                <select id="custSex" name="custSex">
                    <option value="M">男性</option>
                    <option value="F">女性</option>
                    <option value="不透露">不透露</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>手機號碼</label>
                <input type="text" id="custTel" name="custTel" placeholder="例如: 0912345678" />
            </div>
            
            <div class="form-group">
                <label>電子郵件</label>
                <input type="text" id="custEmail" name="custEmail" placeholder="example@email.com" />
            </div>
            
            <div class="form-group">
                <label>身份證字號</label>
                <input type="text" id="custIdCard" name="custIdCard" placeholder="請輸入身份證字號" />
            </div>
            
            <div class="form-group">
                <label>會員生日</label>
                <input type="date" id="custBirthday" name="custBirthday" />
            </div>
            
            <div class="form-group">
                <label>啟用狀態</label>
                <select id="custUse" name="custUse">
                    <option value="啟動">啟動</option>
                    <option value="未啟動">未啟動</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>會員權限</label>
                <select id="custRight" name="custRight">
                    <option value="正常">正常</option>
                    <option value="停權">停權</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>信用卡號</label>
                <input type="text" id="custCard" name="custCard" placeholder="請輸入信用卡號" />
            </div>
            
            <div class="form-group full-width">
                <label>聯絡地址</label>
                <input type="text" id="custAddress" name="custAddress" placeholder="請輸入完整地址" />   
            </div>
        </div>
        
        <div class="btn-group">
            <a th:href="@{/customer/empCustomerList}" class="btn-back">返回列表</a>
            <button type="submit" class="btn-save">儲存修改</button>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
