<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>歷史訂單紀錄</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        h2 { color: #333; border-bottom: 2px solid #4a90e2; padding-bottom: 10px; }
        .order-card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .order-info { flex: 1; }
        .order-info p { margin: 5px 0; color: #555; }
        .order-status { font-weight: bold; padding: 5px 10px; border-radius: 4px; }
        .status-paid { background-color: #d1fae5; color: #059669; }
        .status-unpaid { background-color: #fee2e2; color: #dc2626; }
        .btn-back { display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: #f1f1f1; color: #333; text-decoration: none; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📦 歷史訂單紀錄-未完成僅預覽</h2>
        
        <!-- 這裡之後會用 th:each 來跑迴圈顯示訂單 -->
        <div class="order-card">
            <div class="order-info">
                <p><strong>訂單編號：</strong> ORD-20260618-001</p>
                <p><strong>訂單日期：</strong> 2026-06-18 10:30</p>
                <p><strong>總金額：</strong> $1,250</p>
            </div>
            <div class="order-status status-paid">已付款</div>
        </div>
        
        <!-- 假資料 2 -->
        <div class="order-card">
            <div class="order-info">
                <p><strong>訂單編號：</strong> ORD-20260615-088</p>
                <p><strong>訂單日期：</strong> 2026-06-15 14:20</p>
                <p><strong>總金額：</strong> $800</p>
            </div>
            <div class="order-status status-unpaid">未付款</div>
        </div>

        <a th:href="@{/cust/loginSuccess}" class="btn-back">返回會員中心</a>
    </div>
</body>
</html>
