<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
</head>

<body>

    <!-- 定義 backendHeader 片段，包含 CSS 與 HTML -->
    <header th:fragment="backendHeader" class="fixed-top shadow-sm" style="z-index: 1030;">
        <style>
            :root {
                --primary-orange: #ff5722;
                --dark-blue: #0f172a;
            }

            body {
                padding-top: 120px;
                /* 預留上方固定導覽列的高度，避免內容被遮擋 */
            }

            /* 後台專用 Top Bar */
            .navbar-backend {
                background-color: white;
                border-bottom: 1px solid #e2e8f0;
            }

            /* 後台功能次選單 */
            .sub-navbar-backend {
                background-color: white;
                border-bottom: 2px solid #e2e8f0;
            }

            .sub-navbar-backend .nav-link {
                color: #475569;
                transition: color 0.2s;
                font-size: 0.95rem;
            }

            .sub-navbar-backend .nav-link:hover {
                color: var(--primary-orange);
            }
        </style>

        <!-- 主選單 (Top Bar) -->
        <nav class="navbar navbar-expand-lg navbar-light navbar-backend py-2">
            <div class="container-fluid px-4 px-lg-5">
                <a class="navbar-brand fw-bold fs-3" href="/manage" style="color: var(--primary-orange);">MapIt <span
                        class="fs-5 text-secondary">後台管理系統</span></a>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center" style="font-size: 0.9rem;">
                        <li class="nav-item" th:if="${session.loginEmp}">
                            <span class="nav-link text-secondary px-3">
                                <i class="bi bi-person-badge-fill text-dark"></i>
                                <span th:text="${session.loginEmp.empName} + ' 您好'">管理員 您好</span>
                            </span>
                        </li>
                        <li class="nav-item ms-lg-2">
                            <a class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold shadow-sm"
                                th:href="@{/emp/logout}">登出</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- 次選單 (功能導覽) -->
        <nav class="sub-navbar-backend py-1">
            <div class="container-fluid px-4 px-lg-5">
                <ul class="nav justify-content-center fw-bold">
                    <li class="nav-item">
                        <a class="nav-link px-4" th:href="@{/attr/listAll}">景點管理</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link px-4" th:href="@{/product/select_page}">商品管理</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link px-4" th:href="@{/orders/backend-list}">訂單管理</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link px-4" th:href="@{/customer/empCustomerList}">會員管理</a>
                    </li>

                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/supplier/select_page}">廠商管理</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link px-4" th:href="@{/ap/select_page}">應付帳款</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link px-4" th:href="@{/emp/select_page}">員工管理</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link px-4" th:href="@{/dept/listAllDept}">部門管理</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link px-4" th:href="@{/emp/message/send}">通知發送</a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

</body>

</html>
