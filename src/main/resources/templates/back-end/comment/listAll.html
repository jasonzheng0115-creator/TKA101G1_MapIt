<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>評論管理 - MapIt 旅遊平台</title>
    <!-- 引用共用的 head fragment -->
    <th:block th:replace="~{layouts/backend :: head}"></th:block>
    
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
</head>
<body>
    <!-- 引用共用的導航列 -->
    <nav th:replace="~{layouts/backend :: navbar}"></nav>
    
    <!-- 主要內容區 -->
    <div class="container px-4 px-lg-5 mt-5">
        <!-- 頁面標題 -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-chat-left-text-fill text-primary"></i> 評論管理</h2>
            <a th:href="@{/comment/add}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> 新增評論
            </a>
        </div>
        
        <!-- 評論列表表格 -->
        <div class="card shadow-sm">
            <div class="card-body">
                <table id="commentTable" class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th class="text-center" style="width: 8%;">編號</th>
                            <th style="width: 12%;">評論者</th>
                            <th style="width: 15%;">景點名稱</th>
                            <th class="text-center" style="width: 8%;">評分</th>
                            <th style="width: 25%;">評論內容</th>
                            <th class="text-center" style="width: 12%;">評論時間</th>
                            <th class="text-center" style="width: 10%;">狀態</th>
                            <th class="text-center" style="width: 10%;">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="comment : ${commentList}">
                            <td class="text-center" th:text="${comment.commentId}">1</td>
                            <td th:text="${comment.custId}">顧客1</td>
                            <td th:text="${comment.attrVO != null ? comment.attrVO.attrName : '未指定'}">景點名稱</td>
                            <td class="text-center">
                                <span class="badge bg-info" th:text="${comment.commentScore} + ' 星'">5 星</span>
                            </td>
                            <td>
                                <span th:text="${#strings.length(comment.commentContent) > 50 ? 
                                                #strings.substring(comment.commentContent, 0, 50) + '...' : 
                                                comment.commentContent}">評論內容</span>
                            </td>
                            <td class="text-center" th:text="${#temporals.format(comment.commentTime, 'yyyy-MM-dd HH:mm')}">2024-01-01 12:00</td>
                            <td class="text-center">
                                <!-- 狀態標籤：使用 th:switch 判斷 -->
                                <th:block th:switch="${comment.commentStatus}">
                                    <span th:case="'0'" class="badge bg-warning text-dark">待審核</span>
                                    <span th:case="'1'" class="badge bg-success">已上架</span>
                                    <span th:case="'2'" class="badge bg-danger">已下架</span>
                                    <span th:case="*" class="badge bg-secondary">未知</span>
                                </th:block>
                            </td>
                            <td class="text-center">
                                <!-- 狀態切換按鈕：根據當前狀態顯示不同操作 -->
                                <th:block th:switch="${comment.commentStatus}">
                                    <!-- 待審核 (0) -> 提供上架按鈕 -->
                                    <th:block th:case="'0'">
                                        <a th:href="@{/comment/updateStatus(commentId=${comment.commentId}, status='1')}" 
                                           class="btn btn-sm btn-success"
                                           title="上架此評論">
                                            <i class="bi bi-check-circle"></i> 上架
                                        </a>
                                    </th:block>
                                    
                                    <!-- 已上架 (1) -> 提供下架按鈕 -->
                                    <th:block th:case="'1'">
                                        <a th:href="@{/comment/updateStatus(commentId=${comment.commentId}, status='2')}" 
                                           class="btn btn-sm btn-danger"
                                           title="下架此評論"
                                           onclick="return confirm('確定要下架此評論嗎？下架後將不計入景點評分。');">
                                            <i class="bi bi-x-circle"></i> 下架
                                        </a>
                                    </th:block>
                                    
                                    <!-- 已下架 (2) -> 提供上架按鈕 -->
                                    <th:block th:case="'2'">
                                        <a th:href="@{/comment/updateStatus(commentId=${comment.commentId}, status='1')}" 
                                           class="btn btn-sm btn-success"
                                           title="重新上架此評論">
                                            <i class="bi bi-check-circle"></i> 上架
                                        </a>
                                    </th:block>
                                </th:block>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- 返回首頁按鈕 -->
        <div class="mt-3 mb-5">
            <a th:href="@{/}" class="btn btn-secondary">
                <i class="bi bi-house-door"></i> 返回首頁
            </a>
        </div>
    </div>
    
    <!-- 引用共用的頁尾 -->
    <footer th:replace="~{layouts/backend :: footer}"></footer>
    
    <!-- 引用共用的 scripts -->
    <th:block th:replace="~{layouts/backend :: scripts}"></th:block>
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
    
    <!-- 初始化 DataTables -->
    <script>
        $(document).ready(function() {
            $('#commentTable').DataTable({
                "language": {
                    "url": "//cdn.datatables.net/plug-ins/1.13.4/i18n/zh-HANT.json"
                },
                "pageLength": 10,
                // 改用純 JavaScript 的 Array 建構方式，避開 Thymeleaf 的解析
                "order": new Array(new Array(0, 'desc'))
            });
        });
    </script>
</body>
</html>
