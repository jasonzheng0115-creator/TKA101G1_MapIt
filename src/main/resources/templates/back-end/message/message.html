<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>通知中心</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        h2 { color: #333; border-bottom: 2px solid #f59e0b; padding-bottom: 10px; }
        .message-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: flex-start; }
        .message-item.unread { background-color: #fffbeb; }
        .dot { width: 10px; height: 10px; background-color: #ef4444; border-radius: 50%; margin-top: 5px; margin-right: 15px; flex-shrink: 0; }
        .dot.read { background-color: transparent; }
        .content { flex: 1; }
        .title { margin: 0 0 5px 0; font-weight: bold; color: #333; }
        .time { font-size: 12px; color: #9ca3af; margin: 0; }
        .desc { margin: 8px 0 0 0; color: #555; font-size: 14px; }
        .btn-back { display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: #f1f1f1; color: #333; text-decoration: none; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔔 通知中心-未完成僅預覽</h2>
        
        <!-- 未讀通知範例 -->
        <div class="message-item unread">
            <div class="dot"></div>
            <div class="content">
                <p class="title">訂單成立通知</p>
                <p class="time">2026-06-18 10:35</p>
                <p class="desc">您的訂單 (ORD-20260618-001) 已成功付款！票券已發放至您的票券匣，感謝您的購買。</p>
            </div>
        </div>
        
        <!-- 已讀通知範例 -->
        <div class="message-item">
            <div class="dot read"></div>
            <div class="content">
                <p class="title">系統維護公告</p>
                <p class="time">2026-06-10 08:00</p>
                <p class="desc">親愛的會員您好，系統將於明日凌晨 2:00 進行升級維護，預計暫停服務一小時。</p>
            </div>
        </div>

        <a th:href="@{/cust/loginSuccess}" class="btn-back">返回會員中心</a>
    </div>
</body>
</html>
