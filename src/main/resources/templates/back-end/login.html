<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapIt - 後台管理員登入</title>
    <!-- 引入與前台首頁完全一致的 Bootstrap 5 與圖標樣式 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="/css/styles.css" rel="stylesheet" />
    <style>
        :root {
            --primary-orange: #ff5722;
            --primary-orange-hover: #e64a19;
            --bg-gradient: linear-gradient(135deg, #2c3e50 0%, #0f172a 100%); /* 深邃暗色背景，凸顯後台專業感 */
            --card-bg: rgba(255, 255, 255, 0.95);
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        }
        .login-card {
            background: var(--card-bg);
            padding: 3rem 2.5rem;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 420px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .brand-logo {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary-orange);
            text-decoration: none;
            margin-bottom: 0.5rem;
            display: block;
        }
        .brand-subtitle {
            color: #64748b;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #334155;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-orange);
            box-shadow: 0 0 0 3px rgba(255, 87, 34, 0.15);
        }
        .submit-btn {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-orange);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 1rem;
            box-shadow: 0 4px 12px rgba(255, 87, 34, 0.3);
        }
        .submit-btn:hover {
            background-color: var(--primary-orange-hover);
        }
        .submit-btn:active {
            transform: scale(0.98);
        }
        .error-message {
            color: #ef4444;
            background-color: #fef2f2;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid #fee2e2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 45px;
        }
        .eye-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            user-select: none;
            color: #64748b;
            font-size: 1.2rem;
            transition: color 0.2s;
        }
        .eye-icon:hover {
            color: var(--primary-orange);
        }
        .back-to-front {
            display: inline-block;
            margin-top: 1.5rem;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: color 0.2s;
        }
        .back-to-front:hover {
            color: var(--primary-orange);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <!-- 橘色品牌 Logo -->
        <a href="/" class="brand-logo">MapIt</a>
        <div class="brand-subtitle">後台管理員系統</div>
        
        <!-- 登入表單 -->
        <form method="post" th:action="@{/back-end/emp/loginCheck}">
            
            <!-- 錯誤訊息提示區 -->
            <div class="error-message" th:if="${errorMsg != null}">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${errorMsg}"></span>
            </div>

            <!-- 帳號輸入框 -->
            <div class="form-group">
                <label for="empAcc">管理員帳號</label>
                <input type="text" id="empAcc" name="empAcc" placeholder="請輸入 6-12 碼英數帳號" required autocomplete="username">
            </div>

            <!-- 密碼輸入框 -->
            <div class="form-group">
                <label for="empPwd">管理員密碼</label>
                <div class="password-wrapper">
                    <input type="password" id="empPwd" name="empPwd" placeholder="請輸入 8-20 碼英數密碼" required autocomplete="current-password">
                    <i id="togglePassword" class="bi bi-eye eye-icon"></i>
                </div>
            </div>

            <!-- 登入按鈕 -->
            <button type="submit" class="submit-btn">登入後台</button>
        </form>

        <a href="/" class="back-to-front">
            <i class="bi bi-arrow-left"></i> 返回前台首頁
        </a>
    </div>

    <!-- 密碼明文切換 JS -->
    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#empPwd');

        togglePassword.addEventListener('click', function () {
            // 切換密碼框的 type 屬性 (password <=> text)
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            
            // 切換眼睛 icon 樣式
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });
    </script>
</body>
</html>
