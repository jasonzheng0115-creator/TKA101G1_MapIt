<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>新增應付帳款</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
<link href="/css/styles.css" rel="stylesheet" />
<style>
	
	:root {
		--primary-orange: #ff5722;
		--dark-blue: #0f172a;
	}
	
	* {
		box-sizing: border-box;
		margin: 0;
		padding: 0;
	}
	
	body {
		font-family: "Segoe UI", Arial, sans-serif;
		background-color: whitesmoke;
		color: dimgray;
		padding-top: 140px;
	}
	
	/* 導覽列 */
    .navbar-backend {
        background-color: white;
        border-bottom: 1px solid lightgray;
    }

    .sub-navbar-backend {
        background-color: white;
        border-bottom: 2px solid lightgray;
    }

    .sub-navbar-backend .nav-link {
        color: slategray;
        transition: color 0.2s;
        font-size: 0.95rem;
    }

    .sub-navbar-backend .nav-link:hover {
        color: var(--primary-orange);
    }

	/* 表單大卡片 */
	.form-card {
		max-width: 550px;
		margin: 12px auto 30px auto;
	}
	
	/* 表單頂部大標題 */
	.form-header h3 {
		margin: 0;
		font-size: 20px;
		color: black;
		border-bottom: 2px solid lightgray;
		padding-bottom: 15px;
		margin-bottom: 25px;
	}
	
	/* 標題與輸入框垂直排版 */
	.form-group {
		display: flex;
		flex-direction: column;  /* 垂直排版 */
		gap: 6px;
		margin-bottom: 18px;
	}
	
	/* 欄位小標題 */
	.form-label {
		font-size: 14px;
		font-weight: 600;
		color: black;
	}
	
	/* 輸入框、下拉選單與日期挑選器 */
	.form-control {
		width: 100%;
		padding: 10px 12px; 
		border: 1px solid lightgray;
		border-radius: 4px;
		font-size: 14px;
		color: dimgray;
		box-sizing: border-box;  /* 防止輸入框被 padding 撐開爆框 */
		background-color: white;
		transition: border-color 0.2s;
	}
	
	/* 滑鼠點擊準備輸入資料時（Focus） */
	.form-control:focus {
		border-color: #ff5722; /* 外框亮藍色 */
		outline: none;            /* 移除預設黑框 */
	}
	
	/*  (Radio) 橫向排版 */
	.form-radio-group {
		display: flex;
		gap: 20px; 
		padding: 8px 0;
	}
	
	.radio-inline {
		font-size: 14px;
		color: dimgray;
		cursor: pointer;  /* 滑鼠移過去顯示手指符號 */
		display: flex;
		align-items: center;
		gap: 6px;
	}
	
	.error {
		color: crimson;
		font-size: 13px;
		margin-top: 4px;
		font-weight: bold;
	}
	
	/* 底部按鈕排版 */
	.form-actions {
		display: flex;
		justify-content: flex-end; /* 取消與送出按鈕靠右對齊 */
		align-items: center;
		gap: 12px;
		margin-top: 30px;
		border-top: 1px solid lightgray;
		padding-top: 20px;
	}
	
	/* 確認送出按鈕 */
	.btn-submit {
		padding: 7px 16px;
		background-color: #ff5722; 
		color: white;                 
		border: 1px solid #ff5722;
		border-radius: 4px;
		font-size: 13px;
		font-weight: bold;
		cursor: pointer;
		transition: all 0.2s;
	}
	
	.btn-submit:hover {
		background-color: royalblue;
		border-color: royalblue;
	}
	
	/* 取消返回按鈕 */
	.btn-back {
		text-decoration: none;
		color: gray;
		border: 1px solid lightgray;
		padding: 6px 14px;
		border-radius: 4px;
		font-size: 13px;
		transition: all 0.2s;
	}
	
	.btn-back:hover {
		background-color: whitesmoke;
		color: black;
		border-color: gray;
	}

</style>
</head>
<body>

	<!-- 組合式固定導覽列 -->
    <header class="fixed-top shadow-sm" style="z-index: 1030;">
        <!-- 主選單 (Top Bar) -->
        <nav class="navbar navbar-expand-lg navbar-light navbar-backend py-2">
            <div class="container-fluid px-4 px-lg-5">
                <a class="navbar-brand fw-bold fs-3" href="/manage" style="color: var(--primary-orange);">MapIt <span
                        class="fs-5 text-secondary">後台管理系統</span></a>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center" style="font-size: 0.9rem;">
                        <li class="nav-item" th:if="${session.loginEmp}">
                            <span class="nav-link text-secondary px-3">
                                <i class="bi bi-person-badge-fill text-dark"></i>
                                <span th:text="${session.loginEmp.empName} + ' 您好'">管理員 您好</span>
                            </span>
                        </li>
                        <li class="nav-item ms-lg-2">
                            <a class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold shadow-sm"
                                th:href="@{/emp/logout}">登出</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- 次選單 (功能導覽) -->
        <nav class="sub-navbar-backend py-1">
            <div class="container-fluid px-4 px-lg-5">
                <ul class="nav justify-content-center fw-bold">
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/product/select_page}">商品管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/orders/backend-list}">訂單管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/customer/empCustomerList}">會員管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/supplier/select_page}">廠商管理</a></li>
                    
                    <li class="nav-item">
	                	<a class="nav-link active px-4" 
	                		style="color: #ff5722 !important; 
	                				font-weight: bold;
	                				border-bottom: 3px solid #ff5722;
	                				padding-bottom: 8px;
	                				margin-bottom: -1px;"
	                		th:href="@{/ap/select_page}">
	                		應付帳款
	                	</a>
	                </li>  
                    
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/emp/select_page}">員工管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/dept/listAllDept}">部門管理</a></li>
                </ul>
            </div>
        </nav>
    </header>
	
	<div class="container-fluid">
		<div class="main-card form-card">

			<div class="form-header">
				<h3>➕ 新增應付帳款</h3>
			</div>
		
		    <form th:action="@{/ap/insert}" th:object="${apVO}" method="post">
		        
		        <div class="form-group">
		            <label class="form-label">選擇廠商：</label>
		            <select class="form-control" name="splrVO.supplierId">
		                <option value="">-- 請選擇廠商 --</option>
		                <option th:each="supplier : ${supplierList}" 
		                		th:value="${supplier.supplierId}" 
		                		th:text="${supplier.supplierId + ' - ' + supplier.supplierName}"
		                		th:selected="${apVO.splrVO != null && supplier.supplierId == apVO.splrVO.supplierId}"></option>
		            </select>
		        </div>
		
		        <div class="form-group">
		            <label class="form-label">應付金額 ($)：</label>
		            <input type="number" class="form-control" th:field="*{amountPayable}" />
		            <span class="error" th:if="${#fields.hasErrors('amountPayable')}" th:errors="*{amountPayable}"></span>
		        </div>
		
		        <div class="form-group">
		            <label class="form-label">付款狀態：</label>
		            <div class="form-radio-group">
			            <label class="radio-inline"><input type="radio" th:field="*{apStatus}" value="true" />🟢 已付款</label>
			            <label class="radio-inline"><input type="radio" th:field="*{apStatus}" value="false" />🔴 未付款</label>
					</div>    
			            <span class="error" th:if="${#fields.hasErrors('apStatus')}" th:errors="*{apStatus}"></span>
		        </div>
		
		        <div class="form-group">
		            <label class="form-label">帳單月份 (YYYY-MM)：</label>
		            <input type="month" class="form-control" th:field="*{billMonth}" placeholder="例如: 2026-06"/>
		            <span class="error" th:if="${#fields.hasErrors('billMonth')}" th:errors="*{billMonth}"></span>
		        </div>

		        <div class="form-group">
		            <label class="form-label">付款日期：</label>
		            <input type="date" class="form-control" th:field="*{paymentDate}" />
		        </div>

				<div class="form-actions">
					<a th:href="@{/ap/select_page}" class="btn-back">🔙 取消返回</a>
					<button type="submit" class="btn-submit">✅ 確認送出</button>
				</div>
		    </form>
		    
		</div>
	</div>
	
	<script>
		document.addEventListener("DOMContentLoaded", function () {
		    // 透過 Thymeleaf 生成的 id 或 name 抓取單選鈕與日期欄位
		    const radioPaid = document.querySelector('input[name="apStatus"][value="true"]');
		    const radioUnpaid = document.querySelector('input[name="apStatus"][value="false"]');
		    const paymentDateInput = document.getElementById('paymentDate');
		
		    function togglePaymentDate() {
		        if (radioUnpaid && radioUnpaid.checked) {
		            // 如果選未付款：清空日期並禁用
		            paymentDateInput.value = "";
		            paymentDateInput.disabled = true;
		            paymentDateInput.style.backgroundColor = "lightgray";
		        } else if (radioPaid && radioPaid.checked) {
		            // 如果選已付款：解除禁用
		            paymentDateInput.disabled = false;
		            paymentDateInput.style.backgroundColor = "white";
		            
		            // 如果原本沒日期，自動帶入今天日期
		            if (!paymentDateInput.value) {
		                const today = new Date().toISOString().split('T')[0];
		                paymentDateInput.value = today;
		            }
		        }
		    }
		
		    // 綁定點擊事件
		    if (radioPaid && radioUnpaid && paymentDateInput) {
		        radioPaid.addEventListener("change", togglePaymentDate);
		        radioUnpaid.addEventListener("change", togglePaymentDate);
		        
		        // 網頁剛載入時先執行一次，確保初始狀態正確
		        togglePaymentDate();
		    }
		});
	</script>
</body>
</html>
