<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>應付帳款管理中心</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
<link href="/css/styles.css" rel="stylesheet" />
<style>
	
	
	
	* {
		box-sizing: border-box;
		margin: 0;
		padding: 0;
	}
	
	
	
	
    
	/* 表單大卡片 */
	.form-card {
		max-width: 650px;        
		margin: 12px auto 30px auto;
	}
	
	/* 2. 功能按鈕排版（新增、總覽） */
	.action-header {
		margin-bottom: 25px;
		display: flex;
		gap: 10px;
	}
	
	.action-header .page-item {
		display: inline-block;
		text-decoration: none;
		color: dimgray;
		padding: 8px 16px;
		border: 1px solid lightgray;
		border-radius: 4px;
		font-size: 13px;
		background-color: white;
		transition: all 0.2s;
	}
	
	.action-header .page-item:hover {
		border-color: #ff5722;
		color: #ff5722;
		background-color: whitesmoke;
	}
	
	/* 搜尋區塊排版 */
	.search-box { 
		background: whitesmoke;
		padding: 25px; 
		border-radius: 6px; 
		border: 1px solid lightgray;
		margin-bottom: 25px; 
	}
	
	.search-box h3 { 
		margin-top: 0; 
		margin-bottom: 20px;
		color: black; 
		font-size: 16px;
		border-left: 4px solid #ff5722; /* 標題左邊藍色邊條 */
		padding-left: 10px;
	}
	
	/* 欄位群組排版：垂直排版 */
	.form-group { 
		display: flex;
		flex-direction: column;
		gap: 6px;
		margin-bottom: 18px; 
	}
	
	.form-label {
		font-size: 14px;
		font-weight: 600;
		color: black;
	}
	
	/* 輸入框與下拉選單通用設定 */
	.form-control { 
		width: 100%;
		padding: 10px 12px; 
		border: 1px solid lightgray; 
		border-radius: 4px; 
		font-size: 14px;
		color: dimgray;
		box-sizing: border-box;
		background-color: white;
		transition: border-color 0.2s;
	}
	
	.form-control:focus {
		border-color: #ff5722;
		outline: none;
	}
	
	/* 限制搜尋首頁輸入框的最大寬度 */
	.form-control-limited {
		max-width: 400px;
		height: auto;
	}
	
	/* 搜尋按鈕 */
	.btn-container {
		margin-top: 20px;
	}
	
	/* 按鈕通用樣式 */
	.btn-submit { 
		background-color: #ff5722; 
		color: white; 
		padding: 10px 24px;
		border: 1px solid #ff5722; 
		border-radius: 4px; 
		cursor: pointer; 
		font-size: 13px; 
		font-weight: bold;
		transition: all 0.2s;
	}
	
	.btn-submit:hover { 
		background-color: chocolate; 
		border-color: chocolate;
	}
	
	/* 複合查詢按鈕 */
	.box-container { 
		display: flex; 
		gap: 20px; 
	}
	
	.status-box { 
		width: 120px; 
		height: 50px; 
		border-radius: 8px; 
		display: flex; 
		align-items: center; 
		justify-content: center; 
		text-decoration: none; 
		font-weight: bold; 
		font-size: 18px; 
		background-color: white;
		transition: all 0.2s;
	}
	
	/* 已付款 */
	.status-box.paid {
		border: 2px solid #ff5722; 
		color: #ff5722; 
	}
	
	.status-box.paid:hover { 
		background-color: #ff5722; 
		color: white; 
	}
	
	/* 未付款 */
	.status-box.unpaid {
		border: 2px solid crimson; 
		color: crimson; 
	}
	.status-box.unpaid:hover { 
		background-color: crimson; 
		color: white; 
	}
	
</style>
</head>
<body>
	
		<!-- 引入共用後台導覽列片段 -->
	<header th:replace="~{layouts/backend :: backendHeader}"></header>
	
	<div class="container-fluid">
		<div class="main-card form-card">
		
		    <h3>💵 應付帳款管理中心</h3>
		    
		    <div class="action-header">
		        <a th:href="@{/ap/addAp}"
		        	class="page-item"
		        	style="text-decoration: none;">
		        	➕ 新增應付帳款
		        </a>
		        <a th:href="@{/ap/listAllAp}"
		        	class="page-item"
		        	style="text-decoration: none; margin-left: 10px;">
		        	📋 顯示所有應付帳款
		        </a>
		    </div>
		
			<div class="search-box">
			    <h3>🔍 萬用複合查詢</h3>
			    <form th:action="@{/ap/listApByCompositeQuery}" method="post">
			        
			        <div class="form-group">
			            <label class="form-label">廠商編號：</label>
			            <select class="form-control" name="supplierId">
			                <option value="">-- 請選擇廠商 --</option>
			                <option th:each="supplier : ${supplierList}" 
			                        th:value="${supplier.supplierId}" 
			                        th:text="${supplier.supplierId + ' - ' + supplier.supplierName}"></option>
			            </select>
			        </div>
			        
			        <div class="form-group">
			            <label class="form-label">廠商名稱：</label>
			            <input type="text" class="form-control" name="supplierName" placeholder="請輸入廠商名稱關鍵字...">
			        </div>
			        
			        <div class="btn-container">
			        	<button type="submit" class="btn-submit">🚀 開始萬用複合搜尋</button>
			        </div>
			    </form>
			</div>
		
			<div class="search-box">
			    <h3>⚡ 帳款狀態快速查詢</h3>
			    <div class="box-container">
			        <a th:href="@{/ap/getByApStatus(apStatus=true)}" class="status-box paid">🟢 已付款</a>
			        <a th:href="@{/ap/getByApStatus(apStatus=false)}" class="status-box unpaid">🔴 未付款</a>
			    </div>
			</div>

		</div>
	</div>

</body>
</html>
