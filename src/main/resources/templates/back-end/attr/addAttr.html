<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>新增景點 - MapIt 後台</title>
    <!-- 引用 backend.html 的 head fragment -->
    <th:block th:replace="~{layouts/backend :: head}"></th:block>
</head>
<body>
    <!-- 引用 backend.html 的 navbar fragment -->
    <nav th:replace="~{layouts/backend :: navbar}"></nav>

    <!-- ========== 主要內容區 ========== -->
    <section class="py-5">
        <div class="container px-4 px-lg-5">
            <!-- 頁面標題 -->
            <div class="row mb-4">
                <div class="col-12">
                    <h2 class="fw-bolder">新增景點</h2>
                    <p class="text-muted">填寫以下資訊以新增景點</p>
                </div>
            </div>

            <!-- 表單區域 -->
            <div class="row">
                <div class="col-lg-8 col-md-10 mx-auto">
                    <div class="card shadow">
                        <div class="card-body p-4">
                            <form th:action="@{/attr/add}" th:object="${attrVO}" method="post">
                                
                                <!-- 景點名稱 -->
                                <div class="mb-3">
                                    <label for="attrName" class="form-label">
                                        景點名稱 <span class="text-danger">*</span>
                                    </label>
                                    <input type="text" 
                                           class="form-control" 
                                           id="attrName" 
                                           th:field="*{attrName}"
                                           th:classappend="${#fields.hasErrors('attrName')} ? 'is-invalid' : ''"
                                           placeholder="請輸入景點名稱">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('attrName')}" th:errors="*{attrName}">
                                        景點名稱錯誤訊息
                                    </div>
                                </div>

                                <!-- 地區選擇 -->
                                <div class="mb-3">
                                    <label for="regionVO" class="form-label">
                                        地區 <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-select" 
                                            id="regionVO" 
                                            th:field="*{regionVO.regionId}"
                                            th:classappend="${#fields.hasErrors('regionVO')} ? 'is-invalid' : ''">
                                        <option value="">請選擇地區</option>
                                        <option th:each="region : ${regionList}" 
                                                th:value="${region.regionId}" 
                                                th:text="${region.regionName}">
                                            地區名稱
                                        </option>
                                    </select>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('regionVO')}" th:errors="*{regionVO}">
                                        地區錯誤訊息
                                    </div>
                                </div>

                                <!-- 類別選擇 -->
                                <div class="mb-3">
                                    <label for="categoryVO" class="form-label">
                                        類別 <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-select" 
                                            id="categoryVO" 
                                            th:field="*{categoryVO.categoryId}"
                                            th:classappend="${#fields.hasErrors('categoryVO')} ? 'is-invalid' : ''">
                                        <option value="">請選擇類別</option>
                                        <option th:each="category : ${categoryList}" 
                                                th:value="${category.categoryId}" 
                                                th:text="${category.categoryName}">
                                            類別名稱
                                        </option>
                                    </select>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('categoryVO')}" th:errors="*{categoryVO}">
                                        類別錯誤訊息
                                    </div>
                                </div>

                                <!-- 景點地址 -->
                                <div class="mb-3">
                                    <label for="attrAddress" class="form-label">
                                        景點地址 <span class="text-danger">*</span>
                                    </label>
                                    <input type="text" 
                                           class="form-control" 
                                           id="attrAddress" 
                                           th:field="*{attrAddress}"
                                           th:classappend="${#fields.hasErrors('attrAddress')} ? 'is-invalid' : ''"
                                           placeholder="請輸入景點地址">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('attrAddress')}" th:errors="*{attrAddress}">
                                        景點地址錯誤訊息
                                    </div>
                                </div>

                                <!-- 座標資訊（緯度與經度） -->
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="lat" class="form-label">
                                                緯度 (Latitude) <span class="text-danger">*</span>
                                            </label>
                                            <input type="number" 
                                                   class="form-control" 
                                                   id="lat" 
                                                   th:field="*{lat}"
                                                   th:classappend="${#fields.hasErrors('lat')} ? 'is-invalid' : ''"
                                                   step="0.00000001"
                                                   placeholder="例：25.03370000">
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('lat')}" th:errors="*{lat}">
                                                緯度錯誤訊息
                                            </div>
                                            <small class="form-text text-muted">範圍：-90 ~ 90</small>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="lng" class="form-label">
                                                經度 (Longitude) <span class="text-danger">*</span>
                                            </label>
                                            <input type="number" 
                                                   class="form-control" 
                                                   id="lng" 
                                                   th:field="*{lng}"
                                                   th:classappend="${#fields.hasErrors('lng')} ? 'is-invalid' : ''"
                                                   step="0.00000001"
                                                   placeholder="例：121.56440000">
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('lng')}" th:errors="*{lng}">
                                                經度錯誤訊息
                                            </div>
                                            <small class="form-text text-muted">範圍：-180 ~ 180</small>
                                        </div>
                                    </div>
                                </div>

                                <!-- 景點電話 -->
                                <div class="mb-3">
                                    <label for="attrTel" class="form-label">景點電話</label>
                                    <input type="tel" 
                                           class="form-control" 
                                           id="attrTel" 
                                           th:field="*{attrTel}"
                                           placeholder="例：02-12345678">
                                    <small class="form-text text-muted">選填</small>
                                </div>

                                <!-- 營業時間 -->
                                <div class="mb-3">
                                    <label for="openTime" class="form-label">營業時間</label>
                                    <input type="text" 
                                           class="form-control" 
                                           id="openTime" 
                                           th:field="*{openTime}"
                                           placeholder="例：09:00-18:00">
                                    <small class="form-text text-muted">選填</small>
                                </div>

                                <!-- 營業狀態 -->
                                <div class="mb-3">
                                    <label for="isOpen" class="form-label">
                                        營業狀態 <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-select" id="isOpen" th:field="*{isOpen}">
                                        <option value="營業中" selected>營業中</option>
                                        <option value="休息中">休息中</option>
                                        <option value="已歇業">已歇業</option>
                                    </select>
                                </div>

                                <!-- 按鈕區 -->
                                <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                    <a href="/attr/listAll" class="btn btn-secondary me-md-2">
                                        <i class="bi bi-x-circle"></i> 取消
                                    </a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-check-circle"></i> 新增景點
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 引用 backend.html 的 footer fragment -->
    <footer th:replace="~{layouts/backend :: footer}"></footer>

    <!-- 引用 backend.html 的 scripts fragment -->
    <th:block th:replace="~{layouts/backend :: scripts}"></th:block>
</body>
</html>
