<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>檢舉管理 - MapIt 旅遊平台</title>
    <!-- 引用共用的 head fragment -->
    <th:block th:replace="~{layouts/backend :: head}"></th:block>
    
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
</head>
<body>
    <!-- 引用共用的導航列 -->
    <nav th:replace="~{layouts/backend :: navbar}"></nav>
    
    <!-- 主要內容區 -->
    <div class="container px-4 px-lg-5 mt-5">
        <!-- 頁面標題 -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-flag-fill text-danger"></i> 檢舉管理</h2>
            <a th:href="@{/report/add}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> 新增檢舉
            </a>
        </div>
        
        <!-- 檢舉列表表格 -->
        <div class="card shadow-sm">
            <div class="card-body">
                <table id="reportTable" class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th class="text-center" style="width: 6%;">編號</th>
                            <th class="text-center" style="width: 8%;">評論編號</th>
                            <th style="width: 15%;">被檢舉評論內容</th>
                            <th class="text-center" style="width: 8%;">檢舉人</th>
                            <th style="width: 20%;">檢舉內容</th>
                            <th class="text-center" style="width: 8%;">處理員工</th>
                            <th class="text-center" style="width: 12%;">檢舉時間</th>
                            <th class="text-center" style="width: 10%;">狀態</th>
                            <th class="text-center" style="width: 13%;">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="report : ${reportList}">
                            <td class="text-center" th:text="${report.reportId}">1</td>
                            <td class="text-center" th:text="${report.commentVO != null ? report.commentVO.commentId : '未指定'}">1</td>
                            <td>
                                <span th:if="${report.commentVO != null && report.commentVO.commentContent != null}"
                                      th:text="${#strings.length(report.commentVO.commentContent) > 30 ? 
                                                #strings.substring(report.commentVO.commentContent, 0, 30) + '...' : 
                                                report.commentVO.commentContent}">評論內容</span>
                                <span th:if="${report.commentVO == null || report.commentVO.commentContent == null}" 
                                      class="text-muted">無評論內容</span>
                            </td>
                            <td class="text-center" th:text="${report.custId}">顧客1</td>
                            <td>
                                <span th:text="${#strings.length(report.reportContent) > 40 ? 
                                                #strings.substring(report.reportContent, 0, 40) + '...' : 
                                                report.reportContent}">檢舉內容</span>
                            </td>
                            <td class="text-center" th:text="${report.empId}">員工1</td>
                            <td class="text-center" th:text="${#temporals.format(report.reportTime, 'yyyy-MM-dd HH:mm')}">2024-01-01 12:00</td>
                            <td class="text-center">
                                <!-- 狀態標籤：使用 th:switch 判斷 -->
                                <th:block th:switch="${report.reportStatus}">
                                    <span th:case="'0'" class="badge bg-warning text-dark">待處理</span>
                                    <span th:case="'1'" class="badge bg-success">已處理</span>
                                    <span th:case="'2'" class="badge bg-secondary">已駁回</span>
                                    <span th:case="*" class="badge bg-secondary">未知</span>
                                </th:block>
                            </td>
                            <td class="text-center">
                                <!-- 審核按鈕：根據當前狀態顯示不同操作 -->
                                <th:block th:switch="${report.reportStatus}">
                                    <!-- 待處理 (0) -> 提供審核通過與駁回按鈕 -->
                                    <th:block th:case="'0'">
                                        <a th:href="@{/report/approve(reportId=${report.reportId})}" 
                                           class="btn btn-sm btn-success me-1"
                                           title="審核通過（將下架被檢舉的評論）"
                                           onclick="return confirm('確定要審核通過此檢舉嗎？被檢舉的評論將會被強制下架。');">
                                            <i class="bi bi-check-circle"></i> 通過
                                        </a>
                                        <a th:href="@{/report/reject(reportId=${report.reportId})}" 
                                           class="btn btn-sm btn-secondary"
                                           title="駁回此檢舉"
                                           onclick="return confirm('確定要駁回此檢舉嗎？');">
                                            <i class="bi bi-x-circle"></i> 駁回
                                        </a>
                                    </th:block>
                                    
                                    <!-- 已處理 (1) -> 顯示已處理標記 -->
                                    <th:block th:case="'1'">
                                        <span class="badge bg-success">
                                            <i class="bi bi-check-circle-fill"></i> 已處理
                                        </span>
                                    </th:block>
                                    
                                    <!-- 已駁回 (2) -> 顯示已駁回標記 -->
                                    <th:block th:case="'2'">
                                        <span class="badge bg-secondary">
                                            <i class="bi bi-x-circle-fill"></i> 已駁回
                                        </span>
                                    </th:block>
                                </th:block>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- 返回首頁按鈕 -->
        <div class="mt-3 mb-5">
            <a th:href="@{/}" class="btn btn-secondary">
                <i class="bi bi-house-door"></i> 返回首頁
            </a>
        </div>
    </div>
    
    <!-- 引用共用的頁尾 -->
    <footer th:replace="~{layouts/backend :: footer}"></footer>
    
    <!-- 引用共用的 scripts -->
    <th:block th:replace="~{layouts/backend :: scripts}"></th:block>
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
    
    <!-- 初始化 DataTables -->
    <script>
        $(document).ready(function() {
            $('#reportTable').DataTable({
                "language": {
                    "url": "//cdn.datatables.net/plug-ins/1.13.4/i18n/zh-HANT.json"
                },
                "pageLength": 10,
                // 改用純 JavaScript 的 Array 建構方式，避開 Thymeleaf 的解析
                "order": new Array(new Array(0, 'desc'))
            });
        });
    </script>
</body>
</html>
