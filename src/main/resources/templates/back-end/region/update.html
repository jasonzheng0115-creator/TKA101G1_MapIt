<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>編輯地區 - MapIt 旅遊平台</title>
    <!-- 引用共用的 head fragment -->
    <th:block th:replace="~{layouts/backend :: head}"></th:block>
</head>
<body>
    <!-- 引用共用的導航列 -->
    <nav th:replace="~{layouts/backend :: navbar}"></nav>
    
    <!-- 主要內容區 -->
    <div class="container px-4 px-lg-5 mt-5">
        <!-- 頁面標題 -->
        <div class="mb-4">
            <h2><i class="bi bi-pencil-square text-warning"></i> 編輯地區</h2>
        </div>
        
        <!-- 編輯表單 -->
        <div class="card shadow-sm">
            <div class="card-body">
                <form th:action="@{/region/update}" th:object="${regionVO}" method="post">
                    <!-- 地區編號（唯讀） -->
                    <div class="mb-3">
                        <label for="regionId" class="form-label">
                            地區編號
                        </label>
                        <input type="number" 
                               class="form-control" 
                               id="regionId" 
                               th:field="*{regionId}"
                               readonly>
                        <div class="form-text">地區編號為主鍵，無法修改</div>
                    </div>
                    
                    <!-- 地區名稱 -->
                    <div class="mb-3">
                        <label for="regionName" class="form-label">
                            地區名稱 <span class="text-danger">*</span>
                        </label>
                        <input type="text" 
                               class="form-control" 
                               id="regionName" 
                               th:field="*{regionName}"
                               th:classappend="${#fields.hasErrors('regionName')} ? 'is-invalid' : ''"
                               placeholder="請輸入地區名稱（例如：台北市、新北市）"
                               maxlength="20"
                               required>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('regionName')}" th:errors="*{regionName}">
                            地區名稱錯誤訊息
                        </div>
                    </div>
                    
                    <!-- 按鈕區 -->
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-check-circle"></i> 確認更新
                        </button>
                        <a th:href="@{/region/listAll}" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> 取消
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- 引用共用的頁尾 -->
    <footer th:replace="~{layouts/backend :: footer}"></footer>
    
    <!-- 引用共用的 scripts -->
    <th:block th:replace="~{layouts/backend :: scripts}"></th:block>
</body>
</html>
