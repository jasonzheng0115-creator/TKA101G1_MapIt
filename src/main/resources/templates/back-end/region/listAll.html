<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>地區管理 - MapIt 旅遊平台</title>
    <!-- 引用共用的 head fragment -->
    <th:block th:replace="~{layouts/backend :: head}"></th:block>
    
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
</head>
<body>
    <!-- 引用共用的導航列 -->
    <nav th:replace="~{layouts/backend :: navbar}"></nav>
    
    <!-- 主要內容區 -->
    <div class="container px-4 px-lg-5 mt-5">
        <!-- 頁面標題 -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-geo-alt-fill text-primary"></i> 地區管理</h2>
            <a th:href="@{/region/add}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> 新增地區
            </a>
        </div>
        
        <!-- 地區列表表格 -->
        <div class="card shadow-sm">
            <div class="card-body">
                <table id="regionTable" class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th class="text-center" style="width: 20%;">地區編號</th>
                            <th style="width: 50%;">地區名稱</th>
                            <th class="text-center" style="width: 30%;">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="region : ${regionList}">
                            <td class="text-center" th:text="${region.regionId}">1</td>
                            <td th:text="${region.regionName}">台北市</td>
                            <td class="text-center">
                                <a th:href="@{/region/update(regionId=${region.regionId})}" 
                                   class="btn btn-sm btn-warning">
                                    <i class="bi bi-pencil-square"></i> 編輯
                                </a>
                                <a th:href="@{/region/delete(regionId=${region.regionId})}" 
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('確定要刪除此地區嗎？');">
                                    <i class="bi bi-trash"></i> 刪除
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- 返回首頁按鈕 -->
        <div class="mt-3 mb-5">
            <a th:href="@{/}" class="btn btn-secondary">
                <i class="bi bi-house-door"></i> 返回首頁
            </a>
        </div>
    </div>
    
    <!-- 引用共用的頁尾 -->
    <footer th:replace="~{layouts/backend :: footer}"></footer>
    
    <!-- 引用共用的 scripts -->
    <th:block th:replace="~{layouts/backend :: scripts}"></th:block>
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
    
    <!-- 初始化 DataTables -->
    <script>
        $(document).ready(function() {
            $('#regionTable').DataTable({
                "language": {
                    "url": "//cdn.datatables.net/plug-ins/1.13.4/i18n/zh-HANT.json"
                },
                "pageLength": 10,
                "order": [[0, "asc"]]
            });
        });
    </script>
</body>
</html>
