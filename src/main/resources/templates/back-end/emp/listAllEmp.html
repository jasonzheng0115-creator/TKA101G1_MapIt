<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>MapIt 後台 - 員工資料列表</title>
    <!-- 引入與前台一致的 Bootstrap 5 與圖標樣式 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="/css/styles.css" rel="stylesheet" />
    <style>
        :root {
            --primary-orange: #ff5722;
            --primary-orange-hover: #e64a19;
            --dark-blue: #0f172a;
        }
        body {
            background-color: #f8fafc;
            color: #334155;
            padding-top: 120px; /* 預留給固定頂部雙導覽列的空間 */
        }
        /* 後台專用 Top Bar */
        .navbar-backend {
            background-color: white;
            border-bottom: 1px solid #e2e8f0;
        }
        /* 後台功能次選單 */
        .sub-navbar-backend {
            background-color: white;
            border-bottom: 2px solid #e2e8f0;
        }
        .sub-navbar-backend .nav-link {
            color: #475569;
            transition: color 0.2s;
            font-size: 0.95rem;
        }
        .sub-navbar-backend .nav-link:hover {
            color: var(--primary-orange);
        }
        .sub-navbar-backend .nav-link.active {
            color: var(--primary-orange);
            border-bottom: 3px solid var(--primary-orange);
            margin-bottom: -2px;
        }
        /* 列表卡片樣式 */
        .list-card {
            background-color: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            padding: 2rem;
            margin-bottom: 2rem;
        }
        /* 按鈕樣式 */
        .btn-orange {
            background-color: var(--primary-orange);
            color: white;
            font-weight: 600;
            border-radius: 6px;
            border: none;
            transition: background-color 0.2s;
        }
        .btn-orange:hover {
            background-color: var(--primary-orange-hover);
            color: white;
        }
        .btn-outline-orange {
            border: 1.5px solid var(--primary-orange);
            color: var(--primary-orange);
            font-weight: 600;
            border-radius: 6px;
            background: transparent;
            transition: all 0.2s;
        }
        .btn-outline-orange:hover {
            background-color: var(--primary-orange);
            color: white;
        }
        /* 表格字型微調 */
        .table {
            font-size: 0.95rem;
        }
        .table th {
            background-color: #f1f5f9;
            color: #1e293b;
            font-weight: 700;
        }
        /* 徽章樣式 */
        .badge-status {
            padding: 0.35em 0.65em;
            font-size: 0.8rem;
            font-weight: 700;
            border-radius: 50rem;
        }
    </style>
</head>
<body>

    <!-- 組合式固定導覽列 (與前台首頁結構一致) -->
    <header class="fixed-top shadow-sm" style="z-index: 1030;">
        <!-- 主選單 (Top Bar) -->
        <nav class="navbar navbar-expand-lg navbar-light navbar-backend py-2">
            <div class="container-fluid px-4 px-lg-5">
                <a class="navbar-brand fw-bold fs-3" href="/product/select_page" style="color: var(--primary-orange);">MapIt <span class="fs-5 text-secondary">後台管理系統</span></a>
                
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center" style="font-size: 0.9rem;">
                        <li class="nav-item" th:if="${session.loginEmp}">
                            <span class="nav-link text-secondary px-3">
                                <i class="bi bi-person-badge-fill text-dark"></i>
                                <span th:text="${session.loginEmp.empName} + ' 您好 (管理員)'">管理員 您好</span>
                            </span>
                        </li>
                        <li class="nav-item ms-lg-2">
                            <a class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold shadow-sm" th:href="@{/back-end/emp/logout}">登出</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- 次選單 (後台功能選單) -->
        <nav class="sub-navbar-backend py-1">
            <div class="container-fluid px-4 px-lg-5">
                <ul class="nav justify-content-center fw-bold">
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/supplier/select_page}">供應商管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/product/select_page}">商品管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/ap/select_page}">應付帳款</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/orders/backend-list}">訂單管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/customer/empCustomerList}">會員管理</a></li>
                    <li class="nav-item"><a class="nav-link active px-4" th:href="@{/back-end/emp/select_page}">員工管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/back-end/dept/listAllDept}">部門管理</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- 主要內容區 -->
    <div class="container-fluid px-4 px-lg-5 mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-12">
                
                <!-- 列表卡片區區塊 -->
                <div class="list-card">
                    <!-- 卡片上方區塊 -->
                    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                        <h3 class="fw-bold m-0 text-dark"><i class="bi bi-list-stars text-orange"></i> 員工資料總覽</h3>
                        <div class="d-flex gap-2">
                            <a th:href="@{/back-end/emp/addEmp}" class="btn btn-orange shadow-sm px-3 py-2">
                                <i class="bi bi-person-plus-fill"></i> 新增員工
                            </a>
                            <a th:href="@{/back-end/emp/select_page}" class="btn btn-outline-orange shadow-sm px-3 py-2">
                                <i class="bi bi-arrow-left"></i> 返回查詢
                            </a>
                        </div>
                    </div>

                    <!-- 資料表格 -->
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle">
                            <thead>
                                <tr class="text-center">
                                    <th>員工編號</th>
                                    <th>姓名</th>
                                    <th>性別</th>
                                    <th>聯絡電話</th>
                                    <th>電子信箱</th>
                                    <th>所屬部門</th>
                                    <th>帳號</th>
                                    <th>啟用狀態</th>
                                    <th>修改</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="empVO : ${empList}" class="text-center">
                                    <!-- 員編 -->
                                    <td th:text="${empVO.empId}" class="fw-bold text-dark">1001</td>
                                    <!-- 姓名 -->
                                    <td th:text="${empVO.empName}">張三豐</td>
                                    <!-- 性別 -->
                                    <td>
                                        <span th:if="${empVO.empSex == 'M'}">男</span>
                                        <span th:if="${empVO.empSex == 'F'}">女</span>
                                    </td>
                                    <!-- 電話 -->
                                    <td th:text="${empVO.empTel}">0912345678</td>
                                    <!-- 信箱 -->
                                    <td th:text="${empVO.empEmail}" class="text-start">test@example.com</td>
                                    <!-- 部門 -->
                                    <td th:text="${empVO.deptVO.deptName}" class="fw-bold text-primary">資訊部</td>
                                    <!-- 帳號 -->
                                    <td th:text="${empVO.empAcc}" class="text-secondary">ituser01</td>
                                    <!-- 狀態 -->
                                    <td>
                                        <span th:if="${empVO.empStatus}" class="badge bg-success badge-status"><i class="bi bi-check-circle-fill"></i> 啟用</span>
                                        <span th:unless="${empVO.empStatus}" class="badge bg-danger badge-status"><i class="bi bi-slash-circle-fill"></i> 停用</span>
                                    </td>
                                    <!-- 修改按鈕 (表單傳送 ID) -->
                                    <td>
                                        <form method="post" th:action="@{/back-end/emp/getOne_For_Update}">
                                            <input type="hidden" name="empId" th:value="${empVO.empId}">
                                            <button type="submit" class="btn btn-outline-orange btn-sm px-3 py-1">
                                                <i class="bi bi-pencil-square"></i> 編輯
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- 資料筆數統計 -->
                    <div class="text-end text-muted mt-3" style="font-size: 0.9rem;">
                        共 <span class="fw-bold text-dark" th:text="${empList.size()}">0</span> 筆員工資料
                    </div>

                </div>

            </div>
        </div>
    </div>

</body>
</html>
