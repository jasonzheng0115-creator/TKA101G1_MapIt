<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>MapIt 後台 - 管理系統主頁</title>
    <!-- 引入前台風格的 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="/css/styles.css" rel="stylesheet" />
    <style>
        :root {
            --primary-orange: #ff5722;
            --dark-blue: #0f172a;
        }

        body {
            background-color: #f8fafc;
            color: #334155;
            padding-top: 120px;
        }

        /* 後台專用 Top Bar */
        .navbar-backend {
            background-color: white;
            border-bottom: 1px solid #e2e8f0;
        }

        /* 後台功能次選單 */
        .sub-navbar-backend {
            background-color: white;
            border-bottom: 2px solid #e2e8f0;
        }

        .sub-navbar-backend .nav-link {
            color: #475569;
            transition: color 0.2s;
            font-size: 0.95rem;
        }

        .sub-navbar-backend .nav-link:hover {
            color: var(--primary-orange);
        }

        /* 後台快速入口大卡片 */
        .portal-card {
            background-color: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
            height: 100%;
        }

        .portal-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-orange);
            box-shadow: 0 10px 15px -3px rgba(255, 87, 34, 0.1);
        }

        .portal-icon {
            font-size: 2.5rem;
            color: var(--primary-orange);
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>

    <!-- 組合式固定導覽列 -->
    <header class="fixed-top shadow-sm" style="z-index: 1030;">
        <!-- 主選單 (Top Bar) -->
        <nav class="navbar navbar-expand-lg navbar-light navbar-backend py-2">
            <div class="container-fluid px-4 px-lg-5">
                <a class="navbar-brand fw-bold fs-3" href="/manage" style="color: var(--primary-orange);">MapIt <span
                        class="fs-5 text-secondary">後台管理系統</span></a>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center" style="font-size: 0.9rem;">
                        <li class="nav-item" th:if="${session.loginEmp}">
                            <span class="nav-link text-secondary px-3">
                                <i class="bi bi-person-badge-fill text-dark"></i>
                                <span th:text="${session.loginEmp.empName} + ' 您好'">管理員 您好</span>
                            </span>
                        </li>
                        <li class="nav-item ms-lg-2">
                            <a class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold shadow-sm"
                                th:href="@{/emp/logout}">登出</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- 次選單 (功能導覽) -->
        <nav class="sub-navbar-backend py-1">
            <div class="container-fluid px-4 px-lg-5">
                <ul class="nav justify-content-center fw-bold">
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/product/select_page}">商品管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/orders/backend-list}">訂單管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/customer/empCustomerList}">會員管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/supplier/select_page}">廠商管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/ap/select_page}">應付帳款</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/emp/select_page}">員工管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/dept/listAllDept}">部門管理</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- 主要內容區：儀表板快速選單 -->
    <div class="container px-4 px-lg-5 mt-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold" style="color: var(--dark-blue);">歡迎使用 MapIt 後台管理系統</h1>
            <p class="text-muted">請選擇您要管理的功能模組</p>
        </div>

        <div class="row g-4 justify-content-center">
            <!-- 1. 商品管理 -->
            <div class="col-md-4">
                <a th:href="@{/product/select_page}" class="portal-card p-4 text-center">
                    <div class="portal-icon"><i class="bi bi-box-seam"></i></div>
                    <h4 class="fw-bold">商品管理</h4>
                    <p class="text-muted fs-7">管理旅遊票券商品上架與狀態</p>
                </a>
            </div>

            <!-- 2. 訂單管理 -->
            <div class="col-md-4">
                <a th:href="@{/orders/backend-list}" class="portal-card p-4 text-center">
                    <div class="portal-icon"><i class="bi bi-receipt"></i></div>
                    <h4 class="fw-bold">訂單管理</h4>
                    <p class="text-muted fs-7">查看並更新客戶的交易訂單狀態</p>
                </a>
            </div>

            <!-- 3. 會員管理 -->
            <div class="col-md-4">
                <a th:href="@{/customer/empCustomerList}" class="portal-card p-4 text-center">
                    <div class="portal-icon"><i class="bi bi-people"></i></div>
                    <h4 class="fw-bold">會員管理</h4>
                    <p class="text-muted fs-7">查詢、檢索並停權前台平台會員</p>
                </a>
            </div>

            <!-- 4. 員工管理 -->
            <div class="col-md-4">
                <a th:href="@{/emp/select_page}" class="portal-card p-4 text-center">
                    <div class="portal-icon"><i class="bi bi-person-workspace"></i></div>
                    <h4 class="fw-bold">員工管理</h4>
                    <p class="text-muted fs-7">新增、檢索與管理員工帳號狀態</p>
                </a>
            </div>

            <!-- 5. 廠商管理 -->
            <div class="col-md-4">
                <a th:href="@{/supplier/select_page}" class="portal-card p-4 text-center">
                    <div class="portal-icon"><i class="bi bi-building"></i></div>
                    <h4 class="fw-bold">廠商管理</h4>
                    <p class="text-muted fs-7">管理合作旅行社與供應商</p>
                </a>
            </div>

            <!-- 6. 部門管理 -->
            <div class="col-md-4">
                <a th:href="@{/dept/listAllDept}" class="portal-card p-4 text-center">
                    <div class="portal-icon"><i class="bi bi-diagram-3"></i></div>
                    <h4 class="fw-bold">部門管理</h4>
                    <p class="text-muted fs-7">新增、修改公司部門</p>
                </a>
            </div>
        </div>
    </div>

</body>

</html>
