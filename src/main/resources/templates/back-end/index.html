<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>MapIt 後台 - 管理系統主頁</title>

    <style>
        /* 後台快速入口大卡片 */
        .portal-card {
            background-color: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
            height: 100%;
        }

        .portal-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-orange);
            box-shadow: 0 10px 15px -3px rgba(255, 87, 34, 0.1);
        }

        .portal-icon {
            font-size: 2.5rem;
            color: var(--primary-orange);
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>

    <!-- 引入共用後台導覽列片段 -->
    <header th:replace="~{layouts/backend :: backendHeader}"></header>


    <!-- 主要內容區：儀表板快速選單 -->
    <div class="container px-4 px-lg-5 mt-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold" style="color: var(--dark-blue);">歡迎使用 MapIt 後台管理系統</h1>
            <p class="text-muted">請選擇您要管理的功能模組</p>
        </div>

        <div class="row g-4 justify-content-center">
            <!-- 1. 景點管理 -->
            <div class="col-md-4">
                <a th:href="@{/attr/listAll}" class="portal-card p-4 text-center">
                    <div class="portal-icon"><i class="bi bi-compass"></i></div>
                    <h4 class="fw-bold">景點管理</h4>
                    <p class="text-muted fs-7">管理旅遊景點資訊、照片與評論狀態</p>
                </a>
            </div>

            <!-- 2. 商品管理 -->
            <div class="col-md-4">
                <a th:href="@{/product/select_page}" class="portal-card p-4 text-center">
                    <div class="portal-icon"><i class="bi bi-box-seam"></i></div>
                    <h4 class="fw-bold">商品管理</h4>
                    <p class="text-muted fs-7">管理旅遊票券商品上架與狀態</p>
                </a>
            </div>

            <!-- 3. 訂單管理 -->
            <div class="col-md-4">
                <a th:href="@{/orders/backend-list}" class="portal-card p-4 text-center">
                    <div class="portal-icon"><i class="bi bi-receipt"></i></div>
                    <h4 class="fw-bold">訂單管理</h4>
                    <p class="text-muted fs-7">查看並更新客戶的交易訂單狀態</p>
                </a>
            </div>

            <!-- 4. 會員管理 -->
            <div class="col-md-4">
                <a th:href="@{/customer/empCustomerList}" class="portal-card p-4 text-center">
                    <div class="portal-icon"><i class="bi bi-people"></i></div>
                    <h4 class="fw-bold">會員管理</h4>
                    <p class="text-muted fs-7">查詢、檢索並停權前台平台會員</p>
                </a>
            </div>

            <!-- 5. 員工管理 -->
            <div class="col-md-4">
                <a th:href="@{/emp/select_page}" class="portal-card p-4 text-center">
                    <div class="portal-icon"><i class="bi bi-person-workspace"></i></div>
                    <h4 class="fw-bold">員工管理</h4>
                    <p class="text-muted fs-7">新增、檢索與管理員工帳號狀態</p>
                </a>
            </div>

            <!-- 6. 廠商管理 -->
            <div class="col-md-4">
                <a th:href="@{/supplier/select_page}" class="portal-card p-4 text-center">
                    <div class="portal-icon"><i class="bi bi-building"></i></div>
                    <h4 class="fw-bold">廠商管理</h4>
                    <p class="text-muted fs-7">管理合作旅行社與票券供應商</p>
                </a>
            </div>

            <!-- 7. 部門管理 -->
            <div class="col-md-4">
                <a th:href="@{/dept/listAllDept}" class="portal-card p-4 text-center">
                    <div class="portal-icon"><i class="bi bi-diagram-3"></i></div>
                    <h4 class="fw-bold">部門管理</h4>
                    <p class="text-muted fs-7">新增、修改公司部門</p>
                </a>
            </div>

            <!-- 8. 通知發送 -->
            <div class="col-md-4">
                <a th:href="@{/emp/message/send}" class="portal-card p-4 text-center">
                    <div class="portal-icon"><i class="bi bi-megaphone"></i></div>
                    <h4 class="fw-bold">通知發送</h4>
                    <p class="text-muted fs-7">向全體會員推播系統公告與重要訊息</p>
                </a>
            </div>
        </div>
    </div>

</body>

</html>
