<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>商品詳細資料</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
<link href="/css/styles.css" rel="stylesheet" />
<style>
	
	:root {
		--primary-orange: #ff5722;
		--dark-blue: #0f172a;
	}
	
	* {
		box-sizing: border-box;
		margin: 0;
		padding: 0;
	}
	
	body {
		font-family: "Segoe UI", Arial, sans-serif;
		background-color: whitesmoke;
		color: dimgray;
		padding-top: 140px;
	}
	
	/* 導覽列 */
    .navbar-backend {
        background-color: white;
        border-bottom: 1px solid lightgray;
    }

    .sub-navbar-backend {
        background-color: white;
        border-bottom: 2px solid lightgray;
    }

    .sub-navbar-backend .nav-link {
        color: slategray;
        transition: color 0.2s;
        font-size: 0.95rem;
    }

    .sub-navbar-backend .nav-link:hover {
        color: var(--primary-orange);
    }

	/* 表單大卡片 */
	.form-card {
		max-width: 550px;        
		margin: 12px auto 30px auto; 
	}
	
	/* 表單頂部大標題 */
	.form-header h3 {
		margin: 0;
		font-size: 20px;
		color: black;
		border-bottom: 2px solid lightgray; 
		padding-bottom: 15px;
		margin-bottom: 25px;    
	}
	
	/* 明細欄位排版 */
	.detail-group { 
		display: flex;
		align-items: center;
		padding: 12px 0; 
		border-bottom: 1px solid whitesmoke;
		font-size: 14px; 
	}
	
	/* 讓最後一個欄位不要有下劃線 */
	.detail-group:last-child { 
		border-bottom: none; 
	}
	
	/* 欄位左側固定寬度，確保右側內容對齊一線 */
	.detail-label { 
		font-weight: 600; 
		color: black; 
		width: 120px; 
		flex-shrink: 0;
	}
	
	/* 欄位右側數值 */
	.detail-value { 
		color: dimgray; 
	}
	
	/* 狀態 */
	.status-on { color: forestgreen; font-weight: bold; }
	.status-off { color: crimson; font-weight: bold; }
	
	.error-box {
		color: crimson; 
		text-align: center; 
		font-weight: bold;
		margin: 30px 0;
		font-size: 15px;
	}
	
	/* 行內樣式回收與按鈕一體化 */
	.form-inline {
		display: inline;
	}
	
	.form-actions {
		display: flex;
		justify-content: flex-end; /* 按鈕靠右並排 */
		align-items: center;
		gap: 12px;
		margin-top: 30px;
		border-top: 1px solid lightgray; 
		padding-top: 20px;
	}
	
	/* 修改按鈕 */
	.btn-submit {
		padding: 7px 16px;
		background-color: #ff5722; 
		color: white;                 
		border: 1px solid #ff5722;
		border-radius: 4px;
		font-size: 13px;
		font-weight: bold;
		cursor: pointer;
		transition: all 0.2s;
	}
	
	.btn-submit:hover {
		background-color: royalblue;  
		border-color: royalblue;
	}
	
	/* 返回按鈕 */
	.btn-back {
		text-decoration: none;        
		color: gray;
		border: 1px solid lightgray;
		padding: 6px 14px;
		border-radius: 4px;
		font-size: 13px;
		transition: all 0.2s;
	}
	
	.btn-back:hover {
		background-color: whitesmoke;
		color: black;
		border-color: gray;
	}
		
</style>
</head>
<body>

	<!-- 組合式固定導覽列 -->
    <header class="fixed-top shadow-sm" style="z-index: 1030;">
        <!-- 主選單 (Top Bar) -->
        <nav class="navbar navbar-expand-lg navbar-light navbar-backend py-2">
            <div class="container-fluid px-4 px-lg-5">
                <a class="navbar-brand fw-bold fs-3" href="/manage" style="color: var(--primary-orange);">MapIt <span
                        class="fs-5 text-secondary">後台管理系統</span></a>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center" style="font-size: 0.9rem;">
                        <li class="nav-item" th:if="${session.loginEmp}">
                            <span class="nav-link text-secondary px-3">
                                <i class="bi bi-person-badge-fill text-dark"></i>
                                <span th:text="${session.loginEmp.empName} + ' 您好'">管理員 您好</span>
                            </span>
                        </li>
                        <li class="nav-item ms-lg-2">
                            <a class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold shadow-sm"
                                th:href="@{/emp/logout}">登出</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- 次選單 (功能導覽) -->
        <nav class="sub-navbar-backend py-1">
            <div class="container-fluid px-4 px-lg-5">
                <ul class="nav justify-content-center fw-bold">
                    
                    <li class="nav-item">
	                	<a class="nav-link active px-4" 
	                		style="color: #ff5722 !important; 
	                				font-weight: bold;
	                				border-bottom: 3px solid #ff5722;
	                				padding-bottom: 8px;
	                				margin-bottom: -1px;"
	                		th:href="@{/product/select_page}">
	                		商品管理
	                	</a>
	                </li>   
                    
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/orders/backend-list}">訂單管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/customer/empCustomerList}">會員管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/supplier/select_page}">廠商管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/ap/select_page}">應付帳款</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/emp/select_page}">員工管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/dept/listAllDept}">部門管理</a></li>
                </ul>
            </div>
        </nav>
    </header>
	
	<div class="container-fluid">
		<div class="main-card form-card">

		    <div class="form-header">
		        <h3>🔍 商品詳細資料</h3>
			</div>
		        
	        <div th:if="${prodVO}">
	            <div class="detail-group">
	                <span class="detail-label">商品編號：</span>
	                <span class="detail-value" th:text="${prodVO.productId}"></span>
	            </div>
	            <div class="detail-group">
	                <span class="detail-label">商品名稱：</span>
	                <span class="detail-value" th:text="${prodVO.productName}"></span>
	            </div>
				<div class="detail-group" style="align-items: flex-start;">
				    <span class="detail-label" style="padding-top: 5px;">商品圖片：</span>
				    <span class="detail-value">
				        <img th:src="@{/upload/{img}(img=${prodVO.productImg})}" 
				             style="max-width: 100%; max-height: 250px; border-radius: 6px; border: 1px solid lightgray;" alt="商品圖片">
				    </span>
				</div>
				<div class="detail-group" style="align-items: flex-start;">
					<span class="detail-label" style="padding-top: 2px;">商品描述：</span>
					<span class="detail-value">
						<div id="detail-desc-text" th:text="${prodVO.productDesc}" style="display:none;"></div>
						<div id="detail-desc-formatted"></div>
					</span>
				</div>
	            <div class="detail-group">
	                <span class="detail-label">商品價格：</span>
	                <span class="detail-value" th:text="'$' + ${prodVO.productPrice}"></span>
	            </div>
	            <div class="detail-group">
	                <span class="detail-label">剩餘庫存：</span>
	                <span class="detail-value" th:text="${prodVO.productQty}"></span>
	            </div>
	            <div class="detail-group">
	                <span class="detail-label">已購數量：</span>
	                <span class="detail-value" th:text="${prodVO.purchasedQty}"></span>
	            </div>
	            <div class="detail-group">
	                <span class="detail-label">使用期限：</span>
	                <span class="detail-value" th:text="${prodVO.usePeriod} + ' 個月'"></span>
	            </div>
	            <div class="detail-group">
	                <span class="detail-label">所屬廠商：</span>
	                <span class="detail-value" th:text="${prodVO.splrVO.supplierId} + ' - ' + ${prodVO.splrVO.supplierName}"></span>
	            </div>
	            <div class="detail-group">
	                <span class="detail-label">目前狀態：</span>
	                <span class="detail-value">
	                    <span th:if="${prodVO.productStatus}" class="status-on">🟢 已上架</span>
	                    <span th:if="${!prodVO.productStatus}" class="status-off">🔴 已下架</span>
	                </span>
	            </div>
	        </div>
	        
	        <div th:unless="${prodVO}" class="error-box">
	            ❌ 找不到該商品的詳細資料！
	        </div>
	
	        <div class="form-actions">
	            <a th:href="@{/product/select_page}" class="btn-back">🔙 返回控制中心</a>
	            
	            <form th:if="${prodVO}" th:action="@{/product/getOne_For_Update}" method="post" style="display:inline;">
	                <input type="hidden" name="productId" th:value="${prodVO.productId}">
	                <button type="submit" class="btn-submit">✍️ 前往修改</button>
	            </form>
	        </div>
		</div>
	</div>
	
	<script>
		// 因為是單筆詳細頁，直接用 ID 精準抓取那唯一的欄位
		const rawEl = document.getElementById('detail-desc-text');
		const targetDiv = document.getElementById('detail-desc-formatted');
		
		if (rawEl && targetDiv) {
			const rawText = rawEl.innerText.trim();
			
			if (rawText.startsWith('{')) {
				try {
					const data = JSON.parse(rawText);
					
					// 空間足夠用大間距排版
					targetDiv.innerHTML = `
						<div style="font-size: 14px; color: #555; text-align: left; line-height: 1.6;">
							<p style="margin: 6px 0;">📍 <b>地址/集合地點：</b>${data.address || '未填'}</p>	
							<p style="margin: 6px 0;">🕒 <b>營業/接駁時間：</b>${data.businessHours || '未填'}</p>
							<p style="margin: 6px 0;">⏳ <b>票券使用期限：</b>${data.expiry || '未填'}</p>
							<p style="margin: 6px 0; color: gray; font-style: italic;">📝 <b>補充說明：</b>${data.remark || '無'}</p>
						</div>
					`;
				} catch (e) {
					targetDiv.innerHTML = `<span style="font-size: 14px; color: dimgray;">${rawText}</span>`;
				}
			} else {
				// 舊有純文字資料直接相容秀出
				targetDiv.innerHTML = `<span style="font-size: 14px; color: dimgray;">${rawText}</span>`;
			}
		}
	</script>

</body>
</html>
