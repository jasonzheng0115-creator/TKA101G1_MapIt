<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品詳細資料</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f7f6; }
        .card { max-width: 600px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin: 0 auto; }
        h2 { color: #4CAF50; border-bottom: 2px solid #4CAF50; padding-bottom: 10px; margin-top: 0; }
        .detail-group { margin-bottom: 15px; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .detail-group:last-child { border-bottom: none; }
        .label { font-weight: bold; color: #555; display: inline-block; width: 120px; }
        .value { color: #333; }
        .status-on { color: green; font-weight: bold; }
        .status-off { color: red; font-weight: bold; }
        .btn-group { margin-top: 20px; text-align: right; }
        .btn { display: inline-block; padding: 10px 20px; text-decoration: none; border-radius: 4px; font-size: 14px; color: white; }
        .btn-back { background-color: #666; margin-right: 10px; }
        .btn-back:hover { background-color: #555; }
        .btn-update { background-color: #ff9800; }
        .btn-update:hover { background-color: #e68a00; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🔍 商品詳細資料</h2>
        
        <div th:if="${prodVO}">
            <div class="detail-group">
                <span class="label">商品編號：</span>
                <span class="value" th:text="${prodVO.productId}"></span>
            </div>
            <div class="detail-group">
                <span class="label">商品名稱：</span>
                <span class="value" th:text="${prodVO.productName}"></span>
            </div>
            <div class="detail-group">
                <span class="label">商品描述：</span>
                <span class="value" th:text="${prodVO.productDesc}"></span>
            </div>
            <div class="detail-group">
                <span class="label">商品價格：</span>
                <span class="value" th:text="'$' + ${prodVO.productPrice}"></span>
            </div>
            <div class="detail-group">
                <span class="label">剩餘庫存：</span>
                <span class="value" th:text="${prodVO.productQty}"></span>
            </div>
            <div class="detail-group">
                <span class="label">已購數量：</span>
                <span class="value" th:text="${prodVO.purchasedQty}"></span>
            </div>
            <div class="detail-group">
                <span class="label">使用期限：</span>
                <span class="value" th:text="${prodVO.usePeriod} + ' 個月'"></span>
            </div>
            <div class="detail-group">
                <span class="label">所屬廠商：</span>
                <span class="value" th:text="${prodVO.splrVO.supplierId} + ' - ' + ${prodVO.splrVO.supplierName}"></span>
            </div>
            <div class="detail-group">
                <span class="label">目前狀態：</span>
                <span class="value">
                    <span th:if="${prodVO.productStatus}" class="status-on">🟢 已上架</span>
                    <span th:if="${!prodVO.productStatus}" class="status-off">🔴 已下架</span>
                </span>
            </div>
        </div>
        
        <div th:unless="${prodVO}" style="color: red; text-align: center; margin: 20px 0;">
            ❌ 找不到該商品的詳細資料！
        </div>

        <div class="btn-group">
            <a th:href="@{/product/select_page}" class="btn btn-back">返回控制中心</a>
            
            <form th:if="${prodVO}" th:action="@{/product/getOne_For_Update}" method="post" style="display:inline;">
                <input type="hidden" name="productId" th:value="${prodVO.productId}">
                <button type="submit" class="btn btn-update" style="border:none; cursor:pointer;">前往修改</button>
            </form>
        </div>
    </div>

</body>
</html>
