<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>修改商品資料</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
<link href="/css/styles.css" rel="stylesheet" />
<style>

	:root {
		--primary-orange: #ff5722;
		--dark-blue: #0f172a;
	}
	
	* {
		box-sizing: border-box;
		margin: 0;
		padding: 0;
	}
	
	body {
		font-family: "Segoe UI", Arial, sans-serif;
		background-color: whitesmoke;
		color: dimgray;
		padding-top: 140px;
	}
	
	/* 導覽列 */
    .navbar-backend {
        background-color: white;
        border-bottom: 1px solid lightgray;
    }

    .sub-navbar-backend {
        background-color: white;
        border-bottom: 2px solid lightgray;
    }

    .sub-navbar-backend .nav-link {
        color: slategray;
        transition: color 0.2s;
        font-size: 0.95rem;
    }

    .sub-navbar-backend .nav-link:hover {
        color: var(--primary-orange);
    }
    
	/* 表單大卡片 */
	.form-card {
		max-width: 550px; 
		margin: 12px auto 30px auto;
	}
	
	/* 表單頂部大標題 */
	.form-header h3 {
		margin: 0;
		font-size: 20px;
		color: black;
		border-bottom: 2px solid lightgray;
		padding-bottom: 15px;
		margin-bottom: 25px;
	}
	
	/* 標題與輸入框垂直排版 */
	.form-group {
		display: flex;
		flex-direction: column;  /* 垂直排版 */
		gap: 6px; 
		margin-bottom: 18px;
	}
	
	/* 欄位小標題 */
	.form-label {
		font-size: 14px;
		font-weight: 600;
		color: black;
	}
	
	/* 商品編號專用 */
	.form-text-static {
		padding: 10px 12px;
		background-color: whitesmoke;
		color: gray;
		border: 1px solid lightgray;
		border-radius: 4px;
		font-size: 14px;
		font-family: monospace;       /* 使用等寬字型 */
	}
	
	/* 輸入框與下拉選單（Input / Select） */
	.form-control {
		width: 100%;
		padding: 10px 12px;
		border: 1px solid lightgray;
		border-radius: 4px;
		font-size: 14px;
		color: dimgray;
		box-sizing: border-box;
		background-color: white;
		transition: border-color 0.2s;
	}
	
	/* 當員工滑鼠點擊（Focus）準備打字時 */
	.form-control:focus {
		border-color: #ff5722; 
		outline: none;            /* 移除預設黑框 */
	}
	
	.error {
		color: crimson;
		font-size: 13px;
		margin-top: 4px;
		font-weight: bold;
	}
	
	/* 底部按鈕區塊排版 */
	.form-actions {
		display: flex;
		justify-content: flex-end; /* 取消與送出按鈕靠右對齊 */
		align-items: center;
		gap: 12px; 
		margin-top: 30px;
		border-top: 1px solid lightgray;
		padding-top: 20px;
	}
	
	/* 儲存修改按鈕 */
	.btn-submit {
		padding: 7px 16px;
		background-color: #ff5722; 
		color: white;                 
		border: 1px solid #ff5722;
		border-radius: 4px;
		font-size: 13px;
		font-weight: bold;
		cursor: pointer;
		transition: all 0.2s;
	}
	
	.btn-submit:hover {
		background-color: royalblue;
		border-color: royalblue;
	}
	
	/* 取消返回按鈕 */
	.btn-back {
		margin-top: 0 !important;     /* 強制歸零，跟確認送出按鈕平齊 */
		text-decoration: none;
		color: gray;
		border: 1px solid lightgray;
		padding: 6px 14px;
		border-radius: 4px;
		font-size: 13px;
		transition: all 0.2s;
	}
	
	.btn-back:hover {
		background-color: whitesmoke;
		color: black;
		border-color: gray;
	}

</style>
</head>
<body>

	<!-- 組合式固定導覽列 -->
    <header class="fixed-top shadow-sm" style="z-index: 1030;">
        <!-- 主選單 (Top Bar) -->
        <nav class="navbar navbar-expand-lg navbar-light navbar-backend py-2">
            <div class="container-fluid px-4 px-lg-5">
                <a class="navbar-brand fw-bold fs-3" href="/manage" style="color: var(--primary-orange);">MapIt <span
                        class="fs-5 text-secondary">後台管理系統</span></a>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center" style="font-size: 0.9rem;">
                        <li class="nav-item" th:if="${session.loginEmp}">
                            <span class="nav-link text-secondary px-3">
                                <i class="bi bi-person-badge-fill text-dark"></i>
                                <span th:text="${session.loginEmp.empName} + ' 您好'">管理員 您好</span>
                            </span>
                        </li>
                        <li class="nav-item ms-lg-2">
                            <a class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold shadow-sm"
                                th:href="@{/emp/logout}">登出</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- 次選單 (功能導覽) -->
        <nav class="sub-navbar-backend py-1">
            <div class="container-fluid px-4 px-lg-5">
                <ul class="nav justify-content-center fw-bold">
                    
                    <li class="nav-item">
	                	<a class="nav-link active px-4" 
	                		style="color: #ff5722 !important; 
	                				font-weight: bold;
	                				border-bottom: 3px solid #ff5722;
	                				padding-bottom: 8px;
	                				margin-bottom: -1px;"
	                		th:href="@{/product/select_page}">
	                		商品管理
	                	</a>
	                </li>   
                    
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/orders/backend-list}">訂單管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/customer/empCustomerList}">會員管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/supplier/select_page}">廠商管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/ap/select_page}">應付帳款</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/emp/select_page}">員工管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/dept/listAllDept}">部門管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/emp/message/send}">通知發送</a></li>
                </ul>
            </div>
        </nav>
    </header>
	
	<div class="container-fluid">
		<div class="main-card form-card">
		
		    <div class="form-header">
		        <h2>✏️ 修改商品資料</h2>
		    </div>
		        
	        <form th:action="@{/product/update}" method="post" th:object="${prodVO}" enctype="multipart/form-data">
	            
	            <input type="hidden" th:field="*{productId}" />
	            <input type="hidden" th:field="*{purchasedQty}" />
	            
	            <div class="form-group">
					<label class="form-label">商品編號:</label>
					<div class="form-text-static" th:text="*{productId}"></div>
				</div>
	
	            <div class="form-group">
	                <label class="form-label">所屬廠商：</label>
					<select class="form-control" th:field="*{splrVO.supplierId}"> 
					    <option th:each="splr : ${supplierList}" 
					            th:value="${splr.supplierId}" 
					            th:text="${splr.supplierId} + ' - ' + ${splr.supplierName}">
					    </option>
					</select>
	            </div>
	
	            <div class="form-group">
	                <label class="form-label">商品名稱：</label>
	                <input type="text" class="form-control" th:field="*{productName}" />
	                <span th:if="${#fields.hasErrors('productName')}" th:errors="*{productName}" class="error"></span>
	            </div>
				
				<!-- 原本只有一個文字框 -->
<!-- 	            <div class="form-group"> -->
<!-- 	                <label class="form-label">商品描述：</label> -->
<!-- 	                <input type="text" class="form-control" th:field="*{productDesc}" /> -->
<!-- 	                <span th:if="${#fields.hasErrors('productDesc')}" th:errors="*{productDesc}" class="error"></span> -->
<!-- 	            </div> -->
				<!-- 改為分成四個文字框(地址.營業時間.票券使用期限.補充資訊) 搭配JS -->
				<div class="form-group">
					<label class="form-label">📍 地址 / 集合地點：</label>
					<input type="text" class="form-control" id="desc_address" />
				</div>
				
				<div class="form-group">
					<label class="form-label">🕒 營業時間 / 接駁時間：</label>
					<input type="text" class="form-control" id="desc_businessHours" />
				</div>
				
				<div class="form-group">
					<label class="form-label">⏳ 票券使用期限：</label>
					<input type="text" class="form-control" id="desc_expiry" />
				</div>
				
				<div class="form-group">
					<label class="form-label">📝 補充說明：</label>
					<textarea class="form-control" id="desc_remark" rows="3" style="resize: vertical;"></textarea>
				</div>
				
				<div class="form-group" style="display: none;">
					<input type="text" id="real_productDesc" th:field="*{productDesc}" />
				</div>
				<span th:if="${#fields.hasErrors('productDesc')}" th:errors="*{productDesc}" class="error" style="display: block; margin-bottom: 15px;"></span>

	
	            <div class="form-group">
	                <label class="form-label">商品價格 ($)：</label>
	                <input type="number" class="form-control" th:field="*{productPrice}" min="0" />
	                <span th:if="${#fields.hasErrors('productPrice')}" th:errors="*{productPrice}" class="error"></span>
	            </div>
	
	            <div class="form-group">
	                <label class="form-label">庫存數量：</label>
	                <input type="number" class="form-control" th:field="*{productQty}" min="0" />
	                <span th:if="${#fields.hasErrors('productQty')}" th:errors="*{productQty}" class="error"></span>
	            </div>
	
	            <div class="form-group">
	                <label class="form-label">使用期限 (單位: 月數)：</label>
	                <input type="number" class="form-control" th:field="*{usePeriod}" min="0" />
	                <span th:if="${#fields.hasErrors('usePeriod')}" th:errors="*{usePeriod}" class="error"></span>
	            </div>
	
	            <div class="form-group">
	                <label class="form-label">商品狀態：</label>
	                <select class="form-control" th:field="*{productStatus}">
	                    <option th:value="true">🟢 上架</option>
	                    <option th:value="false">🔴 下架</option>
	                </select>
	            </div>
	
	            <div class="form-actions">
	                <a th:href="@{/product/listAllProduct}" class="btn-back">❌ 取消返回</a>
	            	<button type="submit" class="btn-submit">💾 儲存修改</button>
	            </div>
	        </form>

		</div>
	</div>
	
	<script>
		// 在網頁一載入完成時，立刻執行「反向解鎖填回」
		document.addEventListener("DOMContentLoaded", function() {
			const realInput = document.getElementById('real_productDesc');
			if (realInput) {
				const rawText = realInput.value.trim();
				
				// 如果原本是 JSON 格式，就打散填入 4 個框框
				if (rawText.startsWith('{')) {
					try {
						const data = JSON.parse(rawText);
						document.getElementById('desc_address').value = data.address || '';
						document.getElementById('desc_businessHours').value = data.businessHours || '';
						document.getElementById('desc_expiry').value = data.expiry || '';
						document.getElementById('desc_remark').value = data.remark || '';
					} catch (e) {
						// 防呆：萬一解析失敗，當作純文字填入第一欄
						document.getElementById('desc_address').value = rawText;
					}
				} else {
					// 舊有的純文字，100% 相容直接填入第一欄
					document.getElementById('desc_address').value = rawText;
				}
			}
		});

		// 監聽表單送出事件，按下儲存時「打包成 JSON」送回後端
		document.querySelector('form').addEventListener('submit', function(e) {
			const addressVal = document.getElementById('desc_address').value.trim();
			const hoursVal = document.getElementById('desc_businessHours').value.trim();
			const expiryVal = document.getElementById('desc_expiry').value.trim();
			const remarkVal = document.getElementById('desc_remark').value.trim();
			
			const descObj = {
				address: addressVal,
				businessHours: hoursVal,
				expiry: expiryVal,
				remark: remarkVal
			};
			
			// 把新改好的內容字串化，塞進隱藏欄位
			document.getElementById('real_productDesc').value = JSON.stringify(descObj);
		});
	</script>

</body>
</html>
