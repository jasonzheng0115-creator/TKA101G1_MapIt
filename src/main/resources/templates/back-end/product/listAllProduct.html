<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>商品資料列表</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
<link href="/css/styles.css" rel="stylesheet" />
<style>

	:root {
		--primary-orange: #ff5722;
		--dark-blue: #0f172a;
	}
	
	* {
		box-sizing: border-box;
		margin: 0;
		padding: 0;
	}
	
	body {
		font-family: "Segoe UI", Arial, sans-serif;
		background-color: whitesmoke;
		color: dimgray;
		padding-top: 140px;
	}
	
	/* 導覽列 */
    .navbar-backend {
        background-color: white;
        border-bottom: 1px solid lightgray;
    }

    .sub-navbar-backend {
        background-color: white;
        border-bottom: 2px solid lightgray;
    }

    .sub-navbar-backend .nav-link {
        color: slategray;
        transition: color 0.2s;
        font-size: 0.95rem;
    }

    .sub-navbar-backend .nav-link:hover {
        color: var(--primary-orange);
    }
    
	/* 修改與刪除的 form 表單水平並排 */
	.form-inline {
		display: inline;
	}
	
	/* 細線表格 */
	table { 
		width: 100%;
		border-collapse: collapse; /*把表格的『雙線邊框』合併成『單線邊框』*/
		text-align: left; 
		font-size: 14px; 
		table-layout: fixed;     /* 鎖定欄位寬度，防止內容太長時表格變形 */
		margin-top: 20px;
	}
	
	/* 表格最上方的標題列 */
	th { 
		background-color: whitesmoke;
		color: black; 
		font-weight: 600; 
		padding: 12px 10px; 
		border-bottom: 2px solid lightgray; /* 標題下方精緻水平線 */
	}
	
	/* 表格內每一格資料 */
	td { 
		padding: 12px 10px; 
		border-bottom: 1px solid lightgray; /* 拔除左右框線，只留上下水平線 */
		color: dimgray; 
		vertical-align: middle;             /* 關鍵：讓文字、標籤與右邊按鈕絕對垂直置中對齊 */
	}
	
	/* 滑鼠移過去那一列時，亮起灰底色 */
	tr:hover { 
		background-color: whitesmoke; 
	}
	
	/* 商品狀態標籤顏色 */
	.status-on { color: forestgreen; font-weight: bold; }
	.status-off { color: crimson; font-weight: bold; }
	
	/* 返回按鈕 */
	.btn-back {
		display: inline-block;
		padding: 6px 12px;
		border: 1px solid gray;
		color: gray;
		text-decoration: none;
		border-radius: 4px;
		font-size: 13px;
		transition: all 0.2s;
	}
	
	.btn-back:hover {
		background-color: whitesmoke;
		color: black;
	}
	
	/* 修改刪除按鈕 */
	.btn-action {
		padding: 5px 10px;
		border: 1px solid lightgray;
		border-radius: 4px;
		font-size: 12px;
		cursor: pointer;
		background-color: white;
		transition: all 0.2s;
		margin-right: 2px;
	}
	
	/* 修改按鈕滑過 */
	.btn-update:hover {
		border-color: #ff5722;
		color: #ff5722;
		background-color: whitesmoke;
	}
	
	/* 刪除按鈕滑過 */
	.btn-delete:hover {
		border-color: crimson;
		color: crimson;
		background-color: snow;
	}
	
	/* 分頁 */
	.pagination-container {
		display: flex;
		justify-content: center; /* 讓所有東西在正中間水平排成一列 */
		align-items: center;
		margin-top: 30px;
	}
	
	.page-info {
		font-size: 13px;
		color: gray;
		margin-right: 20px;      /* 左邊頁數與右邊按鈕的呼吸間距 */
	}
	
	.page-buttons {
		display: flex;
		gap: 5px;
	}
	
	.page-item {
		display: inline-block;
		text-decoration: none;
		color: dimgray;
		padding: 6px 12px;
		border: 1px solid lightgray;
		border-radius: 4px;
		font-size: 13px;
		transition: all 0.2s;
	}
	
	.page-item:hover {
		border-color: #ff5722;
		color: #ff5722;
		background-color: whitesmoke;
	}
	
	/* 當前所在頁面狀態 */
	.page-item.active {
		background-color: #ff5722;
		border-color: #ff5722;
		color: white;
		font-weight: bold;
	}
	
	/* 第一頁與最後一頁鎖死 */
	.page-item.disabled {
		color: lightgray;
		border-color: lightgray;
		pointer-events: none; /* 讓超連結點了沒反應 */
	}
		
</style>
</head>
<body>

	<!-- 組合式固定導覽列 -->
    <header class="fixed-top shadow-sm" style="z-index: 1030;">
        <!-- 主選單 (Top Bar) -->
        <nav class="navbar navbar-expand-lg navbar-light navbar-backend py-2">
            <div class="container-fluid px-4 px-lg-5">
                <a class="navbar-brand fw-bold fs-3" href="/manage" style="color: var(--primary-orange);">MapIt <span
                        class="fs-5 text-secondary">後台管理系統</span></a>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center" style="font-size: 0.9rem;">
                        <li class="nav-item" th:if="${session.loginEmp}">
                            <span class="nav-link text-secondary px-3">
                                <i class="bi bi-person-badge-fill text-dark"></i>
                                <span th:text="${session.loginEmp.empName} + ' 您好'">管理員 您好</span>
                            </span>
                        </li>
                        <li class="nav-item ms-lg-2">
                            <a class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold shadow-sm"
                                th:href="@{/emp/logout}">登出</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- 次選單 (功能導覽) -->
        <nav class="sub-navbar-backend py-1">
            <div class="container-fluid px-4 px-lg-5">
                <ul class="nav justify-content-center fw-bold">
                    
                    <li class="nav-item">
	                	<a class="nav-link active px-4" 
	                		style="color: #ff5722 !important; 
	                				font-weight: bold;
	                				border-bottom: 3px solid #ff5722;
	                				padding-bottom: 8px;
	                				margin-bottom: -1px;"
	                		th:href="@{/product/select_page}">
	                		商品管理
	                	</a>
	                </li>   
                    
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/orders/backend-list}">訂單管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/customer/empCustomerList}">會員管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/supplier/select_page}">廠商管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/ap/select_page}">應付帳款</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/emp/select_page}">員工管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/dept/listAllDept}">部門管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/emp/message/send}">通知發送</a></li>
                </ul>
            </div>
        </nav>
    </header>
	
	<div class="container-fluid">
		<div class="main-card">

		    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
		        <h3 style="margin: 0;">📋 商品資料清單</h3>
		        <a th:href="@{/product/select_page}" class="btn-back" style="margin-top: 0;">🔙 回控制中心</a>
		    </div>
		
		    <table>
		        <thead>
		            <tr>
		                <th>商品編號</th>
		                <th>商品名稱</th>
		                <th>商品圖片</th>
		                <th>商品描述</th>
		                <th>商品價格</th>
		                <th>商品數量</th>
		                <th>所屬廠商</th>
		                <th>狀態</th>
		                <th>操作動作</th>
		            </tr>
		        </thead>
		        <tbody>
		            <th:block th:if="${prodData}">
		                <tr th:each="prod : ${prodData}">
		                    <td th:text="${prod.productId}"></td>
		                    <td th:text="${prod.productName}"></td>
							<td>
							    <form th:action="@{/product/getOne_For_Display}" method="post" style="margin:0; padding:0;">
							        <input type="hidden" name="productId" th:value="${prod.productId}"/>
							        <button type="submit" style="background: none; border: none; padding: 0; cursor: pointer;">
							            <img th:src="@{/upload/{img}(img=${prod.productImg})}" 
							                 style="height: 50px; width: auto; border-radius: 4px; border: 1px solid lightgray;" />
							        </button>
							    </form>
							</td>
							<td>
								<div class="backend-desc-text" th:text="${prod.productDesc}" style="display:none;"></div>
								<div class="backend-desc-formatted"></div>
							</td>
		                    <td th:text="'$' + ${prod.productPrice}"></td>
		                    <td th:text="${prod.productQty}"></td>
		                    <td th:text="${prod.splrVO.supplierId} + ' - ' + ${prod.splrVO.supplierName}"></td>
		                    <td>
		                        <span th:if="${prod.productStatus}" class="status-on">🟢 已上架</span>
		                        <span th:if="${!prod.productStatus}" class="status-off">🔴 已下架</span>
		                    </td>
		                    <td>
		                        <form th:action="@{/product/getOne_For_Update}" method="post" style="display:inline;">
		                            <input type="hidden" name="productId" th:value="${prod.productId}">
		                            <button type="submit" class="btn-action btn-update">修改</button>
		                        </form>
		                        <form th:action="@{/product/delete}" method="post" style="display:inline;" onsubmit="return confirm('確定要刪除這件商品嗎？');">
		                            <input type="hidden" name="productId" th:value="${prod.productId}">
		                            <button type="submit" class="btn-action btn-delete">刪除</button>
		                        </form>
		                    </td>
		                </tr>
		            </th:block>
		
		            <th:block th:if="${productStatusList}">
		                <tr th:each="prod : ${productStatusList}">
		                    <td th:text="${prod.productId}"></td>
		                    <td th:text="${prod.productName}"></td>
							<td>
							    <form th:action="@{/product/getOne_For_Display}" method="post" style="margin:0; padding:0;">
							        <input type="hidden" name="productId" th:value="${prod.productId}"/>
							        <button type="submit" style="background: none; border: none; padding: 0; cursor: pointer;">
							            <img th:src="@{/upload/{img}(img=${prod.productImg})}" 
							                 style="height: 50px; width: auto; border-radius: 4px; border: 1px solid lightgray;" />
							        </button>
							    </form>
							</td>
							<td>
								<div class="backend-desc-text" th:text="${prod.productDesc}" style="display:none;"></div>
								<div class="backend-desc-formatted"></div>
							</td>
		                    <td th:text="'$' + ${prod.productPrice}"></td>
		                    <td th:text="${prod.productQty}"></td>
		                    <td th:text="${prod.splrVO.supplierId} + ' - ' + ${prod.splrVO.supplierName}"></td>
		                    <td>
		                        <span th:if="${prod.productStatus}" class="status-on">🟢 已上架</span>
		                        <span th:if="${!prod.productStatus}" class="status-off">🔴 已下架</span>
		                    </td>
		                    <td>
		                        <form th:action="@{/product/getOne_For_Update}" method="post" style="display:inline;">
		                            <input type="hidden" name="productId" th:value="${prod.productId}">
		                            <button type="submit" class="btn-action btn-update">修改</button>
		                        </form>
		                        <form th:action="@{/product/delete}" method="post" style="display:inline;" onsubmit="return confirm('確定要刪除這件商品嗎？');">
		                            <input type="hidden" name="productId" th:value="${prod.productId}">
		                            <button type="submit" class="btn-action btn-delete">刪除</button>
		                        </form>
		                    </td>
		                </tr>
		            </th:block>
		            
		 			<th:block th:if="${prodVOList}">
		                <tr th:each="prod : ${prodVOList}">
		                    <td th:text="${prod.productId}"></td>
		                    <td th:text="${prod.productName}"></td>
							<td>
							    <form th:action="@{/product/getOne_For_Display}" method="post" style="margin:0; padding:0;">
							        <input type="hidden" name="productId" th:value="${prod.productId}"/>
							        <button type="submit" style="background: none; border: none; padding: 0; cursor: pointer;">
							            <img th:src="@{/upload/{img}(img=${prod.productImg})}" 
							                 style="height: 50px; width: auto; border-radius: 4px; border: 1px solid lightgray;" />
							        </button>
							    </form>
							</td>
							<td>
								<div class="backend-desc-text" th:text="${prod.productDesc}" style="display:none;"></div>
								<div class="backend-desc-formatted"></div>
							</td>
		                    <td th:text="'$' + ${prod.productPrice}"></td>
		                    <td th:text="${prod.productQty}"></td>
		                    <td th:text="${prod.splrVO.supplierId} + ' - ' + ${prod.splrVO.supplierName}"></td>
		                    <td>
		                        <span th:if="${prod.productStatus}" class="status-on">🟢 已上架</span>
		                        <span th:if="${!prod.productStatus}" class="status-off">🔴 已下架</span>
		                    </td>
		                    <td>
		                        <form th:action="@{/product/getOne_For_Update}" method="post" style="display:inline;">
		                            <input type="hidden" name="productId" th:value="${prod.productId}">
		                            <button type="submit" class="btn-action btn-update">修改</button>
		                        </form>
		                        <form th:action="@{/product/delete}" method="post" style="display:inline;" onsubmit="return confirm('確定要刪除這件商品嗎？');">
		                            <input type="hidden" name="productId" th:value="${prod.productId}">
		                            <button type="submit" class="btn-action btn-delete">刪除</button>
		                        </form>
		                    </td>
		                </tr>
		            </th:block>
		        </tbody>
		    </table>
		
		    <div class="pagination-container" th:if="${prodData}">
		    
		        <span class="page-info" th:text="'頁面 ' + ${currentPage} + ' / ' + ${totalPages}">頁面 1 / 1</span>
		        
		        <div class="page-buttons">
					<a th:href="@{/product/listAllProduct(page=1)}" 
					   th:classappend="${currentPage == 1} ? 'disabled' : ''" 
					   class="page-item">« 首頁</a>
					
					<a th:href="@{/product/listAllProduct(page=${currentPage - 1})}" 
					   th:classappend="${currentPage == 1} ? 'disabled' : ''" 
					   class="page-item">‹ 上一頁</a>
					
					<a th:each="i : ${#numbers.sequence(1, totalPages == 0 ? 1 : totalPages)}" 
					   th:href="@{/product/listAllProduct(page=${i})}"
					   th:text="${i}"
					   th:classappend="${i == currentPage} ? 'active' : ''"
					   class="page-item"></a>
					
					<a th:href="@{/product/listAllProduct(page=${currentPage + 1})}" 
					   th:classappend="${currentPage == totalPages} ? 'disabled' : ''" 
					   class="page-item">下一頁 ›</a>
					
					<a th:href="@{/product/listAllProduct(page=${totalPages})}" 
					   th:classappend="${currentPage == totalPages} ? 'disabled' : ''"
					   class="page-item">末頁 »</a>
				</div>
		</div>
	</div>
	
	<script>
		// 抓出網頁上所有被隱藏的原始 JSON 欄位，與準備的空白容器
		const descTxts = document.querySelectorAll('.backend-desc-text');
		const formattedDivs = document.querySelectorAll('.backend-desc-formatted');
		
		// 用迴圈抓出來
		descTxts.forEach((el, index) => {
			const rawText = el.innerText.trim(); // 拿到原始文字
			const targetDiv = formattedDivs[index]; // 找到對應的空容器
			
			// 判斷：如果是大括號開頭，表示是我們新規格的 JSON 格式
			if (rawText.startsWith('{')) {
				try {
					const data = JSON.parse(rawText);
					
					// 配合後台表格比較窄的空間，用最緊湊的字體排版
					targetDiv.innerHTML = `
						<div style="font-size: 12px; color: #555; line-height: 1.4; text-align: left;">
							<div>📍 <b>地點:</b> ${data.address || '未填'}</div>	
							<div>🕒 <b>時間:</b> ${data.businessHours || '未填'}</div>
							<div>⏳ <b>期限:</b> ${data.expiry || '未填'}</div>
							<div style="color: gray; font-style: italic; margin-top: 2px;">📝 ${data.remark || '無備註'}</div>
						</div>
					`;
				} catch (e) {
					// 萬一解析失敗的防呆
					targetDiv.innerHTML = `<span style="font-size: 13px; color: gray;">${rawText}</span>`;
				}
			} else {
				// 如果不是大括號開頭，代表是舊有的純文字資料，相容性 100% 直接印出
				targetDiv.innerHTML = `<span style="font-size: 13px; color: gray;">${rawText}</span>`;
			}
		});
	</script>
	
</body>
</html>
