<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>商品管理首頁</title>
<link th:href="@{/css/backend-common.css}" rel="stylesheet">
<style>
	.error { 
		color: crimson;
		font-weight: bold; 
		margin: 15px 0; 
		font-size: 14px;
	}
	
	/* 首頁大卡片限制寬度並在網頁正中央 */
	.form-card {
		max-width: 650px;
		margin: 10px auto; 
	}
	
	/* 搜尋區塊卡片：在主卡片裡再隔出獨立小區塊 */
	.search-box { 
		background: whitesmoke;
		padding: 25px; 
		border-radius: 6px; 
		border: 1px solid lightgray;
		margin-bottom: 25px; 
	}
	
	/* 搜尋區塊的小標題（如：萬用複合搜尋） */
	.search-box h3 { 
		margin-top: 0; 
		margin-bottom: 20px;
		color: black; 
		font-size: 16px;
		border-left: 4px solid dodgerblue; /* 標題左邊邊條 */
		padding-left: 10px;
	}
	
	/* 欄位群組排版：垂直排隊設計 */
	.form-group { 
		display: flex;
		flex-direction: column;
		gap: 6px;
		margin-bottom: 18px; 
	}
	
	/* 欄位小標題 */
	.form-label {
		font-size: 14px;
		font-weight: 600;
		color: black;
	}
	
	/* 輸入框與下拉選單（Input / Select） */
	.form-control { 
		width: 100%;
		padding: 10px 12px; 
		border: 1px solid lightgray; 
		border-radius: 4px; 
		font-size: 14px;
		color: dimgray;
		box-sizing: border-box;
		background-color: white;
		transition: border-color 0.2s;
	}
	
	.form-control:focus {
		border-color: dodgerblue;
		outline: none;
	}
	
	/* 按鈕通用樣式 */
	.btn-submit { 
		background-color: dodgerblue; 
		color: white; 
		padding: 9px 18px; 
		border: 1px solid dodgerblue; 
		border-radius: 4px; 
		cursor: pointer; 
		font-size: 13px; 
		font-weight: bold;
		transition: all 0.2s;
	}
	
	.btn-submit:hover { 
		background-color: royalblue; 
		border-color: royalblue;
	}
	
	/* 頂部功能快捷按鈕（新增商品、商品總覽） */
	.action-header .page-item {
		display: inline-block;
		text-decoration: none;
		color: dimgray;
		padding: 8px 16px;
		border: 1px solid lightgray;
		border-radius: 4px;
		font-size: 13px;
		background-color: white;
		transition: all 0.2s;
	}
	
	.action-header .page-item:hover {
		border-color: dodgerblue;
		color: dodgerblue;
		background-color: whitesmoke;
	}
	
</style>
</head>
<body>

	<!-- 上方導覽列 -->
	<div class="navbar">
		<a class="navbar-brand" href="#">🏢 後台管理系統</a>
		<!-- href="#" 連結點選後會留在原地 -->
		<div class="navbar-nav">
			<a th:href="@{/supplier/select_page}">供應商管理</a>
			<a class="active" th:href="@{/product/select_page}">商品管理</a>
			<a th:href="@{/ap/select_page}">應付帳款</a>
			<a th:href="@{/orders/backend-list}">訂單管理</a>
		</div>
	</div>

	<div class="container-fluid">
		<div class="main-card form-card">
			
			<h3>📦 商品管理首頁</h3>
			
			<div class="error" th:if="${errorMsg}" th:text="${errorMsg}"></div>
			
			<div class="action-header" style="margin-bottom: 25px;">
				<a th:href="@{/product/addProduct}" 
					class="page-item active" 
					style="text-decoration: none;">
					➕ 新增商品
				</a>
				<a th:href="@{/product/listAllProduct}" 
					class="page-item"
					style="text-decoration: none; margin-left: 10px;">
					📋 商品總覽
				</a>
			</div>
			
			<div class="search-box">
				<h3>🔍 單筆商品查詢</h3>
				<form th:action="@{/product/getOne_For_Display}" method="post">
					<div class="form-group">
						<label class="form-label" for="pruductId">輸入商品編號:</label>
						<div style="display: flex; gap: 10px;">	
							<input type="number" class="form-control" id="productId" name="productId" placeholder="例如: 1" required style="max-width: 300px;">
							<button type="submit" class="btn-submit">送出查詢</button> 
						</div>
					</div>
				</form>
			</div>
			
			<div class="search-box">
				<h3>🎯 萬用複合搜尋</h3>
				<form th:action="@{/product/listProductByCompositeQuery}" method="post">
					<div class="form-group">
						<label class="form-label" for="productName">商品名稱關鍵字:</label>
						<input type="text" class="form-control" id="productName" name="productName" placeholder="請輸入商品名稱關鍵字..." style="max-width: 400px;">
					</div>
					
					<div class="form-group">
						<label class="form-label" for="supplierId">合作廠商名稱:</label>
						<select class="form-control" id="supplierId" name="supplierId" style="max-width: 400px; height: auto;">
							<option value="">-- 請選擇合作廠商 (選填) --</option>
							<option th:each="splr : ${supplierList}"
									th:value="${splr.supplierId}"
									th:text="${splr.supplierId} + ' - ' + ${splr.supplierName}">
							</option>
						</select>
					</div>
					
					<div style="margin-top: 20px;">
						<button type="submit" class="btn-submit" style="padding: 10px 24px;">🚀 開始萬用複合搜尋</button>
					</div>
				</form>
			</div>
		</div>
	</div>

</body>
</html>
