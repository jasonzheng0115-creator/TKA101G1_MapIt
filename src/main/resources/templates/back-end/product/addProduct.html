<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>上架新商品</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
<link href="/css/styles.css" rel="stylesheet" />
<style>
	
	:root {
		--primary-orange: #ff5722;
		--dark-blue: #0f172a;
	}
	
	* {
		box-sizing: border-box;
		margin: 0;
		padding: 0;
	}
	
	body {
		font-family: "Segoe UI", Arial, sans-serif;
		background-color: whitesmoke;
		color: dimgray;
		padding-top: 140px;
	}
	
	/* 導覽列 */
    .navbar-backend {
        background-color: white;
        border-bottom: 1px solid lightgray;
    }

    .sub-navbar-backend {
        background-color: white;
        border-bottom: 2px solid lightgray;
    }

    .sub-navbar-backend .nav-link {
        color: slategray;
        transition: color 0.2s;
        font-size: 0.95rem;
    }

    .sub-navbar-backend .nav-link:hover {
        color: var(--primary-orange);
    }
    
    
	/* 表單大卡片 */
	.form-card {
		max-width: 550px;
		margin: 12px auto 30px auto;
	}
	
	/* 表單頂部大標題 */
	.form-header h3 {
		margin: 0;
		font-size: 20px;
		color: black;
		border-bottom: 2px solid lightgray; /* 標題下方粗線 */
		padding-bottom: 15px;
		margin-bottom: 25px;
	}
	
	/* 標題與輸入框垂直 */
	.form-group {
		display: flex;
		flex-direction: column;  /* 垂直 */
		gap: 6px;
		margin-bottom: 18px;
	}
	
	/* 欄位小標題 */
	.form-label {
		font-size: 14px;
		font-weight: 600;
		color: black;
	}
	
	/* 輸入框與下拉選單（Input / Select） */
	.form-control {
		width: 100%;
		padding: 10px 12px;
		border: 1px solid lightgray;
		border-radius: 4px;
		font-size: 14px;
		color: dimgray;
		box-sizing: border-box;  /* 防止輸入框被 padding 撐開爆框 */
		background-color: white;
		transition: border-color 0.2s;
	}
	
	/* 滑鼠點擊（Focus）準備打字時 */
	.form-control:focus {
		border-color: #ff5722; 
		outline: none;            /* 移除預設黑粗框 */
	}
	
	.error {
		color: crimson;
		font-size: 13px;
		margin-top: 4px;
		font-weight: bold;
	}
	
	/* 底部按鈕區塊排版 */
	.form-actions {
		display: flex;
		justify-content: flex-end; /* 取消與送出按鈕靠右對齊 */
		align-items: center;
		gap: 12px;
		margin-top: 30px;
		border-top: 1px solid lightgray; /* 按鈕上方水平分界線 */
		padding-top: 20px;
	}
	
	/* 確認送出按鈕 */
	.btn-submit {
		padding: 7px 16px;
		background-color: #ff5722; 
		color: white;                 
		border: 1px solid #ff5722;
		border-radius: 4px;
		font-size: 13px;
		font-weight: bold;
		cursor: pointer;
		transition: all 0.2s;
	}
	
	.btn-submit:hover {
		background-color: royalblue;
		border-color: royalblue;
	}
	
	/* 取消返回按鈕 */
	.btn-back {
		margin-top: 0 !important;     /* 強制歸零，跟確認送出按鈕平齊 */
		text-decoration: none;
		color: gray;
		border: 1px solid lightgray;
		padding: 6px 14px;
		border-radius: 4px;
		font-size: 13px;
		transition: all 0.2s;
	}
	
	.btn-back:hover {
		background-color: whitesmoke;
		color: black;
		border-color: gray;
	}

</style>
</head>
<body>

	<!-- 組合式固定導覽列 -->
    <header class="fixed-top shadow-sm" style="z-index: 1030;">
        <!-- 主選單 (Top Bar) -->
        <nav class="navbar navbar-expand-lg navbar-light navbar-backend py-2">
            <div class="container-fluid px-4 px-lg-5">
                <a class="navbar-brand fw-bold fs-3" href="/manage" style="color: var(--primary-orange);">MapIt <span
                        class="fs-5 text-secondary">後台管理系統</span></a>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center" style="font-size: 0.9rem;">
                        <li class="nav-item" th:if="${session.loginEmp}">
                            <span class="nav-link text-secondary px-3">
                                <i class="bi bi-person-badge-fill text-dark"></i>
                                <span th:text="${session.loginEmp.empName} + ' 您好'">管理員 您好</span>
                            </span>
                        </li>
                        <li class="nav-item ms-lg-2">
                            <a class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold shadow-sm"
                                th:href="@{/emp/logout}">登出</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- 次選單 (功能導覽) -->
        <nav class="sub-navbar-backend py-1">
            <div class="container-fluid px-4 px-lg-5">
                <ul class="nav justify-content-center fw-bold">
                    
                    <li class="nav-item">
	                	<a class="nav-link active px-4" 
	                		style="color: #ff5722 !important; 
	                				font-weight: bold;
	                				border-bottom: 3px solid #ff5722;
	                				padding-bottom: 8px;
	                				margin-bottom: -1px;"
	                		th:href="@{/product/select_page}">
	                		商品管理
	                	</a>
	                </li>   
                    
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/orders/backend-list}">訂單管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/customer/empCustomerList}">會員管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/supplier/select_page}">廠商管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/ap/select_page}">應付帳款</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/emp/select_page}">員工管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/dept/listAllDept}">部門管理</a></li>
                </ul>
            </div>
        </nav>
    </header>
	
	<div class="container-fluid">
		<div class="main-card form-card">

		    <div class="form-header">
		        <h3>➕ 上架新商品</h3>
			</div>
		        
	        <form th:action="@{/product/insert}" method="post" th:object="${prodVO}" enctype="multipart/form-data">
	            
	            <div class="form-group">
	                <label class="form-label">選擇合作廠商：</label>
	                <select class="form-control" th:field="*{splrVO.supplierId}">
	                    <option value="">-- 請選擇廠商 --</option>
	                    <option th:each="supplier : ${supplierList}" 
	                            th:value="${supplier.supplierId}" 
	                            th:text="${supplier.supplierId} + ' - ' + ${supplier.supplierName}">
	                    </option>
	                </select>
	                <span th:if="${#fields.hasErrors('splrVO.supplierId')}" th:errors="*{splrVO.supplierId}" class="error"></span>
	            </div>
	
	            <div class="form-group">
	                <label class="form-label">商品名稱：</label>
	                <input type="text" class="form-control" th:field="*{productName}" placeholder="請輸入商品名稱" />
	                <span th:if="${#fields.hasErrors('productName')}" th:errors="*{productName}" class="error"></span>
	            </div>
				
				<!-- 原本只有一個文字框 -->
<!-- 	            <div class="form-group"> -->
<!-- 	                <label class="form-label">商品描述：</label> -->
<!-- 	                <input type="text" class="form-control" th:field="*{productDesc}" placeholder="請輸入商品描述短語" /> -->
<!-- 	                <span th:if="${#fields.hasErrors('productDesc')}" th:errors="*{productDesc}" class="error"></span> -->
<!-- 	            </div> -->
				<!-- 改為分成四個文字框(地址.營業時間.票券使用期限.補充資訊) 搭配JS -->
				<div class="form-group">
					<label class="form-label">📍 地址 / 集合地點：</label>
					<input type="text" class="form-control" id="desc_address" placeholder="例如：台北車站東三門" />
				</div>
				
				<div class="form-group">
					<label class="form-label">🕒 營業時間 / 接駁時間：</label>
					<input type="text" class="form-control" id="desc_businessHours" placeholder="例如：08:00-18:00" />
				</div>
				
				<div class="form-group">
					<label class="form-label">⏳ 票券使用期限：</label>
					<input type="text" class="form-control" id="desc_expiry" placeholder="例如：購買後6個月內有效" />
				</div>
				
				<div class="form-group">
					<label class="form-label">📝 補充說明：</label>
					<textarea class="form-control" id="desc_remark" rows="3" style="resize: vertical;" placeholder="例如：含市區導覽與景點接駁，記得帶雨具..."></textarea>
				</div>
				
				<div class="form-group" style="display: none;">
					<input type="text" id="real_productDesc" th:field="*{productDesc}" />
				</div>
				<span th:if="${#fields.hasErrors('productDesc')}" th:errors="*{productDesc}" class="error" style="display: block; margin-bottom: 15px;"></span>
				
				
	            <div class="form-group">
	                <label class="form-label">商品價格 ($)：</label>
	                <input type="number" class="form-control" th:field="*{productPrice}" min="0" placeholder="0" />
	                <span th:if="${#fields.hasErrors('productPrice')}" th:errors="*{productPrice}" class="error"></span>
	            </div>
	
	            <div class="form-group">
	                <label class="form-label">上架庫存數量：</label>
	                <input type="number" class="form-control" th:field="*{productQty}" min="0" placeholder="0" />
	                <span th:if="${#fields.hasErrors('productQty')}" th:errors="*{productQty}" class="error"></span>
	            </div>
	
	            <div class="form-group">
	                <label class="form-label">使用期限 (單位: 月數)：</label>
	                <input type="number" class="form-control" th:field="*{usePeriod}" min="0" placeholder="請輸入商品使用期限..." />
	                <span th:if="${#fields.hasErrors('usePeriod')}" th:errors="*{usePeriod}" class="error"></span>
	            </div>
	
	            <div class="form-group">
	                <label class="form-label">商品狀態：</label>
	                <select class="form-control" th:field="*{productStatus}">
	                    <option th:value="true">🟢 直接上架</option>
	                    <option th:value="false">🔴 暫不上架（下架暫存）</option>
	                </select>
	            </div>
	            
	            <div class="form-group">
	            	<label class="form-label">商品圖片 (必填)</label>
	            	<input type="file" class="form-control" id="productImgFile" name="productImgFile" accept="image/*" required/>
	            </div>
	            <!-- accept="image/*" 視窗會自動過濾非圖片檔 -->
	
	            <div class="form-actions">
	                <a th:href="@{/product/select_page}" class="btn-back">🔙 取消返回</a>
	            	<button type="submit" class="btn-submit">✅ 確認送出</button>
	            </div>
	        </form>
		    
		</div>
	</div>
	
	<script>
		// 監聽整個表單的送出事件 (submit)
		document.querySelector('form').addEventListener('submit', function(e) {
			
			// 抓取這 4 個獨立輸入框填寫的內容
			const addressVal = document.getElementById('desc_address').value.trim();
			const hoursVal = document.getElementById('desc_businessHours').value.trim();
			const expiryVal = document.getElementById('desc_expiry').value.trim();
			const remarkVal = document.getElementById('desc_remark').value.trim();
			
			// 組裝成跟資料庫 SQL 規格 100% 精準對齊的物件
			const descObj = {
				address: addressVal,
				businessHours: hoursVal,
				expiry: expiryVal,
				remark: remarkVal
			};
			
			// 將物件轉換成標準的 JSON 字串，並塞進被隱藏的真實欄位裡
			document.getElementById('real_productDesc').value = JSON.stringify(descObj);
		});
	</script>
	
</body>
</html>
