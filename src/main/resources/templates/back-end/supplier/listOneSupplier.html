<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>廠商詳細資料</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
<link href="/css/styles.css" rel="stylesheet" />
<style>

	:root {
		--primary-orange: #ff5722;
		--dark-blue: #0f172a;
	}
	
	* {
		box-sizing: border-box;
		margin: 0;
		padding: 0;
	}
	
	body {
		font-family: "Segoe UI", Arial, sans-serif;
		background-color: whitesmoke;
		color: dimgray;
		padding-top: 140px;
	}
	
	/* 導覽列 */
    .navbar-backend {
        background-color: white;
        border-bottom: 1px solid lightgray;
    }

    .sub-navbar-backend {
        background-color: white;
        border-bottom: 2px solid lightgray;
    }

    .sub-navbar-backend .nav-link {
        color: slategray;
        transition: color 0.2s;
        font-size: 0.95rem;
    }

    .sub-navbar-backend .nav-link:hover {
        color: var(--primary-orange);
    }
    
	/* 表單大卡片 */
	.form-card {
		max-width: 550px;        
		margin: 12px auto 30px auto; 
	}
	
	/* 表單頂部大標題 */
	.form-header h3 {
		margin: 0;
		font-size: 20px;
		color: black;
		border-bottom: 2px solid lightgray; 
		padding-bottom: 15px;
		margin-bottom: 25px;    
	}
	
	/*  明細欄位 */
	.detail-group { 
		display: flex;
		align-items: center;
		padding: 14px 0; 
		border-bottom: 1px solid whitesmoke;
		font-size: 14px; 
	}
	
	/* 讓最後一個欄位不要有下劃線 */
	.detail-group:last-child { 
		border-bottom: none; 
	}
	
	/* 欄位左側固定寬度，確保右側內容對齊一線 */
	.detail-label { 
		font-weight: 600; 
		color: black; 
		width: 120px; 
		flex-shrink: 0;
	}
	
	/* 欄位右側數值 */
	.detail-value { 
		color: dimgray; 
	}

	.error-box {
		color: crimson; 
		text-align: center; 
		font-weight: bold;
		margin: 30px 0;
		font-size: 15px;
	}
	
	/* 底部按鈕 */
	.form-actions {
		display: flex;
		justify-content: flex-end; 
		align-items: center;
		gap: 12px;
		margin-top: 30px;
		border-top: 1px solid lightgray; 
		padding-top: 20px;
	}
	
	.btn-back {
		text-decoration: none;        
		color: gray;
		border: 1px solid lightgray;
		padding: 6px 14px;
		border-radius: 4px;
		font-size: 13px;
		transition: all 0.2s;
	}
	
	.btn-back:hover {
		background-color: whitesmoke;
		color: black;
		border-color: gray;
	}
	
	.form-inline {
		display: inline;
	}
	
	/* 前往修改按鈕 */
	.btn-submit {
		padding: 7px 16px;
		background-color: white; 
		color: gray;                 
		border: 1px solid lightgray;
		border-radius: 4px;
		font-size: 13px;
		font-weight: bold;
		cursor: pointer;
		transition: all 0.2s;
	}
	
	.btn-submit:hover {
		background-color: snow;  
		border-color: royalblue;
		color: royalblue;
	}
	
	/* 刪除按鈕 */
	.btn-delete {
		padding: 6px 14px;
		background-color: white; 
		color: gray;                 
		border: 1px solid lightgray;
		border-radius: 4px;
		font-size: 13px;
		font-weight: bold;
		cursor: pointer;
		transition: all 0.2s;
	}
	
	.btn-delete:hover {
		background-color: snow;
		border-color: crimson;
		color: crimson;
	}

</style>
</head>
<body>

	<!-- 組合式固定導覽列 -->
    <header class="fixed-top shadow-sm" style="z-index: 1030;">
        <!-- 主選單 (Top Bar) -->
        <nav class="navbar navbar-expand-lg navbar-light navbar-backend py-2">
            <div class="container-fluid px-4 px-lg-5">
                <a class="navbar-brand fw-bold fs-3" href="/manage" style="color: var(--primary-orange);">MapIt <span
                        class="fs-5 text-secondary">後台管理系統</span></a>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center" style="font-size: 0.9rem;">
                        <li class="nav-item" th:if="${session.loginEmp}">
                            <span class="nav-link text-secondary px-3">
                                <i class="bi bi-person-badge-fill text-dark"></i>
                                <span th:text="${session.loginEmp.empName} + ' 您好'">管理員 您好</span>
                            </span>
                        </li>
                        <li class="nav-item ms-lg-2">
                            <a class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold shadow-sm"
                                th:href="@{/emp/logout}">登出</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- 次選單 (功能導覽) -->
        <nav class="sub-navbar-backend py-1">
            <div class="container-fluid px-4 px-lg-5">
                <ul class="nav justify-content-center fw-bold">
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/product/select_page}">商品管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/orders/backend-list}">訂單管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/customer/empCustomerList}">會員管理</a></li>
                    
                    <li class="nav-item">
	                	<a class="nav-link active px-4" 
	                		style="color: #ff5722 !important; 
	                				font-weight: bold;
	                				border-bottom: 3px solid #ff5722;
	                				padding-bottom: 8px;
	                				margin-bottom: -1px;"
	                		th:href="@{/supplier/select_page}">
	                		廠商管理
	                	</a>
	                </li>   
                    
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/ap/select_page}">應付帳款</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/emp/select_page}">員工管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/dept/listAllDept}">部門管理</a></li>
                </ul>
            </div>
        </nav>
    </header>
	
	<div class="container-fluid">
		<div class="main-card form-card">

			<div class="form-header">
				<h3>🔍 廠商詳細資料</h3>
			</div>
			
			<div th:if="${splrVO}" th:object="${splrVO}">
				<div class="detail-group">
					<span class="detail-label">🏢 廠商編號:</span> 
					<span class="detail-value" th:text="*{supplierId}"></span>
				</div>
				<div class="detail-group">
					<span class="detail-label">✨ 廠商名稱：</span>
					<span class="detail-value" th:text="*{supplierName}"></span>
				</div>
				<div class="detail-group">
					<span class="detail-label">👤 聯 絡 人：</span>
					<span class="detail-value" th:text="*{supplierContact}"></span>
				</div>
				<div class="detail-group">
					<span class="detail-label">📞 廠商電話：</span>
					<span class="detail-value" th:text="*{supplierTel}"></span>
				</div>
				<div class="detail-group">
					<span class="detail-label">✉️ 完整 Email：</span>
					<span class="detail-value" th:text="*{supplierEmail}"></span>
				</div>
				<div class="detail-group">
					<span class="detail-label">📍 廠商地址：</span>
					<span class="detail-value" th:text="*{supplierAddress}"></span>
				</div>
				
				<div th:unless="${splrVO}" class="error-box">
					❌ 找不到該廠商的詳細資料！
				</div>
				
				<div class="form-actions">
					<a th:href="@{/supplier/select_page}" class="btn-back">🔙 返回控制中心</a>
					
					<form th:action="@{/supplier/getOne_For_Update}" method="post" class="form-inline">
						<input type="hidden" name="supplierId" th:value="*{supplierId}">
						<button type="submit" class="btn-submit">✍️ 前往修改</button>
					</form>
					
					<form th:action="@{/supplier/delete}" method="post" class="form-inline" onsubmit="return confirm('警告：確定要刪除這家廠商嗎？此動作無法復原！');">
						<input type="hidden" name="supplierId" th:value="*{supplierId}">
						<button type="submit" class="btn-delete">🗑️ 刪除廠商</button>
					</form>
				</div>
			</div>
		</div>
	</div>
	
</body>
</html>
