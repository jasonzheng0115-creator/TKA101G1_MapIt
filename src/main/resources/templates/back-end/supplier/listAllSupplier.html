<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>所有廠商清單</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
<link href="/css/styles.css" rel="stylesheet" />
<style>
	
	:root {
		--primary-orange: #ff5722;
		--dark-blue: #0f172a;
	}
	
	* {
		box-sizing: border-box;
		margin: 0;
		padding: 0;
	}
	
	body {
		font-family: "Segoe UI", Arial, sans-serif;
		background-color: whitesmoke;
		color: dimgray;
		padding-top: 140px;
	}
	
	/* 導覽列 */
    .navbar-backend {
        background-color: white;
        border-bottom: 1px solid lightgray;
    }

    .sub-navbar-backend {
        background-color: white;
        border-bottom: 2px solid lightgray;
    }

    .sub-navbar-backend .nav-link {
        color: slategray;
        transition: color 0.2s;
        font-size: 0.95rem;
    }

    .sub-navbar-backend .nav-link:hover {
        color: var(--primary-orange);
    }
    
    
	table { 
		width: 100%;
		border-collapse: collapse; 
		text-align: left; 
		font-size: 14px; 
		table-layout: fixed;   /* 鎖定欄位寬度 */
		margin-top: 20px;
	}
	
	/* 表格最上面的標題列 */
	th { 
		background-color: whitesmoke;
		color: black; 
		font-weight: 600; 
		padding: 12px 10px; 
		border-bottom: 2px solid lightgray; /* 標題下方灰色水平線 */
	}
	
	/* 表格內每一格資料 */
	td { 
		padding: 12px 10px; 
		border-bottom: 1px solid lightgray; /* 只留上下水平的灰線，取消左右框線 */
		color: dimgray; 
	}
	
	tr:hover { 
		background-color: whitesmoke; 
	}
	
	/* 返回首頁按鈕 */
	.btn-back {
		display: inline-block;
		padding: 6px 12px;
		border: 1px solid gray;
		color: gray;
		text-decoration: none;
		border-radius: 4px;
		font-size: 13px;
		margin-top: 10px;
	}
	
	.btn-back:hover {
		background-color: whitesmoke;
		color: black;
	}
	
	/* 修改刪除按鈕 */
	/* 修改和刪除按鈕共通的設定 */
	.btn-action {
		padding: 5px 10px;
		border: 1px solid lightgray;
		border-radius: 4px;
		font-size: 12px;
		cursor: pointer;
		background-color: white;
		transition: all 0.2s;
	}
	
	/* 修改按鈕 */
	.btn-update:hover {
		border-color: #ff5722;
		color: #ff5722;
		background-color: whitesmoke;
	}
	
	/* 刪除按鈕 */
	.btn-delete:hover {
		border-color: crimson;
		color: crimson;
		background-color: snow;
	}
	
	/* 分頁 */
	.pagination-container {
		display: flex;
		justify-content: center; /* 垂直居中 */
		align-items: center;
		margin-top: 30px;
	}
	
	.page-info {
		font-size: 13px;
		color: gray;
		margin-right: 20px;
	}
	
	.page-buttons {
		display: flex;
		gap: 5px;
	}
	
	.page-item {
		display: inline-block;
		text-decoration: none;
		color: dimgray;
		padding: 6px 12px;
		border: 1px solid lightgray;
		border-radius: 4px;
		font-size: 13px;
		transition: all 0.2s;
	}
	
	.page-item:hover {
		border-color: #ff5722;
		color: #ff5722;
		background-color: whitesmoke;
	}
	
	/* 當前所在頁面的藍色狀態 */
	.page-item.active {
		background-color: #ff5722;
		border-color: #ff5722;
		color: white;
		font-weight: bold;
	}
	
	/* 當按鈕不能點選時變淡 */
	.page-item.disabled {
		color: lightgray;
		border-color: lightgray;
		pointer-events: none; /* 讓超連結失效，點了沒反應 */
	}
	
</style>
</head>
<body>
	
	<!-- 組合式固定導覽列 -->
    <header class="fixed-top shadow-sm" style="z-index: 1030;">
        <!-- 主選單 (Top Bar) -->
        <nav class="navbar navbar-expand-lg navbar-light navbar-backend py-2">
            <div class="container-fluid px-4 px-lg-5">
                <a class="navbar-brand fw-bold fs-3" href="/manage" style="color: var(--primary-orange);">MapIt <span
                        class="fs-5 text-secondary">後台管理系統</span></a>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center" style="font-size: 0.9rem;">
                        <li class="nav-item" th:if="${session.loginEmp}">
                            <span class="nav-link text-secondary px-3">
                                <i class="bi bi-person-badge-fill text-dark"></i>
                                <span th:text="${session.loginEmp.empName} + ' 您好'">管理員 您好</span>
                            </span>
                        </li>
                        <li class="nav-item ms-lg-2">
                            <a class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold shadow-sm"
                                th:href="@{/emp/logout}">登出</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- 次選單 (功能導覽) -->
        <nav class="sub-navbar-backend py-1">
            <div class="container-fluid px-4 px-lg-5">
                <ul class="nav justify-content-center fw-bold">
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/product/select_page}">商品管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/orders/backend-list}">訂單管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/customer/empCustomerList}">會員管理</a></li>
                    
                    <li class="nav-item">
	                	<a class="nav-link active px-4" 
	                		style="color: #ff5722 !important; 
	                				font-weight: bold;
	                				border-bottom: 3px solid #ff5722;
	                				padding-bottom: 8px;
	                				margin-bottom: -1px;"
	                		th:href="@{/supplier/select_page}">
	                		廠商管理
	                	</a>
	                </li>   
                    
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/ap/select_page}">應付帳款</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/emp/select_page}">員工管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/dept/listAllDept}">部門管理</a></li>
                </ul>
            </div>
        </nav>
    </header>
	
	<div class="container-fluid">
		
		<div class="main-card">
	
			<h3>📋 所有廠商清單資料</h3>	
			
			<!-- 提示框 -->
			<div th:if="${errorMsg}" style="color: white; background-color: crimson; padding: 12px; border-radius: 6px; margin: 15px 0; font-weight: bold; font-size: 14px;">
			    <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${errorMsg}"></span>
			</div>
			
			<div th:if="${successMsg}" style="color: white; background-color: green; padding: 12px; border-radius: 6px; margin: 15px 0; font-weight: bold; font-size: 14px;">
			    <i class="bi bi-check-circle-fill"></i> <span th:text="${successMsg}"></span>
			</div>
			
			
			<div>
				<a th:href="@{/supplier/select_page}" class="btn-back">🔙 返回首頁</a>
			</div>
			
			<table>
				<thead>
					<tr>
						<th>廠商編號</th>
						<th>廠商名稱</th>
						<th>聯絡人</th>
						<th>電話</th>
						<th>Email</th>
						<th>地址</th>
						<th>狀態</th>
						<th>操作功能</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="s : ${supplierListData}">
						<td th:text="${s.supplierId}"></td>
						<td th:text="${s.supplierName}"></td>
						<td th:text="${s.supplierContact}"></td>
						<td th:text="${s.supplierTel}"></td>
						<td th:text="${s.supplierEmail}"></td>
						<td th:text="${s.supplierAddress}"></td>
						
						<td>
							<span th:if="${s.supplierStatus}" style="color: green; font-weight: bold;">🟢 啟用中</span>
							<span th:if="${!s.supplierStatus}" style="color: red; font-weight: bold;">🔴 已停用</span>
						</td>
						
						<td>
							<form th:action="@{/supplier/getOne_For_Update}" method="post" style="display: inline;">
								<input type="hidden" name="supplierId" th:value="${s.supplierId}">
								<button type="submit" class="btn-action btn-update">✍️ 修改</button>
							</form>
							
							<form th:if="${s.supplierStatus}" th:action="@{/supplier/delete}" method="post" style="display: inline;">
								<input type="hidden" name="supplierId" th:value="${s.supplierId}">
								<input type="hidden" name="page" th:value="${currentPage}">
								<button type="submit" class="btn-action btn-delete" 
										onclick="return confirm('確定要停用此廠商嗎？');">🚫 停用</button>
							</form>
							
							<form th:if="${!s.supplierStatus}" th:action="@{/supplier/resume}" method="post" style="display: inline;">
								<input type="hidden" name="supplierId" th:value="${s.supplierId}">
								<button type="submit" class="btn-action btn-update" 
										style="border-color: green; color: green;"
										onclick="return confirm('確定要重新啟用此廠商嗎？');">⚡ 啟用</button>
							</form>
						</td>
						
					</tr>
				</tbody>
			</table>
			
			<div class="pagination-container">
    
			    <span class="page-info" th:text="'頁面 ' + ${currentPage} + ' / ' + ${totalPages}">頁面 1 / 1</span>
			
			    <div class="page-buttons">
			        <a th:href="@{/supplier/listAllSupplier(page=1)}" 
			           th:classappend="${currentPage == 1} ? 'disabled' : ''" 
			     	   class="page-item">« 首頁</a>
			        
			        <a th:href="@{/supplier/listAllSupplier(page=${currentPage - 1})}" 
			           th:classappend="${currentPage == 1} ? 'disabled' : ''" 
			           class="page-item">‹ 上一頁</a>
			        
			        <a th:each="i : ${#numbers.sequence(1, totalPages)}" 
			           th:href="@{/supplier/listAllSupplier(page=${i})}"
			           th:text="${i}"
			           th:classappend="${i == currentPage} ? 'active' : ''"
			           class="page-item">
			        </a>
			        
			        <a th:href="@{/supplier/listAllSupplier(page=${currentPage + 1})}" 
			           th:classappend="${currentPage == totalPages} ? 'disabled' : ''" 
			           class="page-item">下一頁 ›</a>
			        
			        <a th:href="@{/supplier/listAllSupplier(page=${totalPages})}" 
			           th:classappend="${currentPage == totalPages} ? 'disabled' : ''"
			           class="page-item">末頁 »</a>
			    </div>
			</div>
			
		</div>
	</div>
	

</body>
</html>
