<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8">

<title>廠商管理中心</title>
<style>

	.form-card-wrapper {
		max-width: 600px;
		margin: 35px auto;
	}

	* {
		box-sizing: border-box;
		margin: 0;
		padding: 0;
	}
    
	.main-card {
		margin-bottom: 25px;
	}

	.main-card ul {
		list-style: none; /* 移除原點 */
	}
	
	.main-card ul li a {
		display: inline-block; /* 讓行內元素<a>有block特性,padding才有效 */
		width: 100%;
		padding: 10px 15px;
		border: 1px solid lightgray;
		color: dimgray;
		text-decoration: none;
		border-radius: 4px;
		font-size: 14px;
    	transition: all 0.2s;
	}
	
	.main-card ul li a:hover {
		border-color: #ff5722;
		color: #ff5722;
		background-color: aliceblue;
	}
	
	/* 查詢輸入框（Input） */
	.main-card label {
		font-size: 13px;
	    color: gray;
	    display: block;
	    margin-bottom: 8px;
	}
	
	/* [type="text"] 是 屬性選擇器 */
	.main-card input[type="text"] {
		width: 100%;
		padding: 10px 12px;
	    border: 1px solid lightgray;
	    border-radius: 4px;
	    font-size: 14px;
	    margin-bottom: 15px;
	}
	
	/* 當滑鼠點進輸入框準備打字時 */
	.main-card input[type="text"]:focus {
		border-color: #ff5722;
		outline: 0; /* 取消預設的粗黑框 */
	}
	
	/* 送出查詢按鈕 */
	.main-card button[type="submit"] {
	    padding: 8px 22px;
		background-color: #ff5722;
		border: 1px solid #ff5722;
		color: white;
		border-radius: 4px;
		cursor: pointer; /* 滑鼠移過去變成手指 */
		font-size: 14px;
		float: right; /* 置右對齊 */
	}
	
	/* hover 滑鼠懸停狀態 */
	.main-card button[type="submit"]:hover {
		background-color: darkorange;
		border-color: darkorange;
	}

	.error-msg { color: red; font-size: 14px; }

	/* 限制寬度並與上方導覽列保持舒適間距 */
	.form-card-wrapper {
		max-width: 600px;
		margin: 35px auto; /* 往下推 35px 避開導覽列，並水平置中 */
	}
	
	/* 讓兩個卡片之間有適當的呼吸間距 */
	.main-card {
		margin-bottom: 25px;
	}
	
	.search-input-group {
		display: flex;
		gap: 10px; 
		align-items: center;
	}
	
	.search-input-group input[type="text"] {
		margin-bottom: 0; 
		flex: 1;   
	}
	
	.search-input-group button[type="submit"] {
		width: auto;          /* 覆蓋原本的 100% 寬度，改為內容自適應 */
		white-space: nowrap;  /* 防止按鈕文字折行 */
		padding: 10px 24px;
	}
	

</style>
</head>
<body>
	
		<!-- 引入共用後台導覽列片段 -->
	<header th:replace="~{layouts/backend :: backendHeader}"></header>

	
	<div class="container">
	
		<div class="form-card-wrapper">
	
			<div class="main-card">
				<h3>🏭 廠商管理中心</h3>
				<ul>
					<li><a th:href="@{/supplier/addSupplier}">➕ 新增廠商資料</a></li>
					<br>
					<li><a th:href="@{/supplier/listAllSupplier}">📋 列出所有廠商</a></li>
				</ul>
			</div>
		
		<div class="main-card">
			<h3>🔍 依廠商編號查詢</h3>
			<form th:action="@{/supplier/getOne_For_Display}" method="post">
				<label>請輸入廠商編號</label>
				<div class="search-input-group">
					<input type="text" name="supplierId" placeholder="請輸入編號..." th:value="${param.supplierId}" />
					<button type="submit">送出查詢</button>
				</div>
				<div class="error-msg" th:if="${errorMsg}" th:text="${errorMsg}"></div>
			</form>
		</div>
		
			<div class="main-card">
				<h3>🔍 依廠商名稱查詢</h3>
				<form th:action="@{/supplier/getByName_For_Display}" method="post">
					<label>請輸入廠商名稱關鍵字</label>
					<div class="search-input-group">
						<input type="text" name="supplierName" placeholder="例如：星辰..." />
						<button type="submit">送出查詢</button>
					</div>
					<div class="error-msg" th:if="${errorMsgName}" th:text="${errorMsgName}"></div>
				</form>
			</div>
		</div>
	</div>
	
</body>
</html>
