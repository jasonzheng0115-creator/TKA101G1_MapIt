<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">

<title>廠商管理中心</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
<link href="/css/styles.css" rel="stylesheet" />
<style>

	:root {
		--primary-orange: #ff5722;
		--dark-blue: #0f172a;
	}
	
	* {
		box-sizing: border-box;
		margin: 0;
		padding: 0;
	}
	
	body {
		font-family: "Segoe UI", Arial, sans-serif;
		background-color: whitesmoke;
		color: dimgray;
	}
    
	/* 常用功能 */
	.main-card ul {
		list-style: none; /* 移除原點 */
	}
	
	.main-card ul li a {
		display: inline-block; /* 讓行內元素<a>有block特性,padding才有效 */
		width: 100%;
		padding: 10px 15px;
		border: 1px solid lightgray;
		color: dimgray;
		text-decoration: none;
		border-radius: 4px;
		font-size: 14px;
    	transition: all 0.2s;
	}
	
	.main-card ul li a:hover {
		border-color: #ff5722;
		color: #ff5722;
		background-color: aliceblue;
	}
	
	/* 查詢輸入框（Input） */
	.main-card label {
		font-size: 13px;
	    color: gray;
	    display: block;
	    margin-bottom: 8px;
	}
	
	/* [type="text"] 是 屬性選擇器 */
	.main-card input[type="text"] {
		width: 100%;
		padding: 10px 12px;
	    border: 1px solid lightgray;
	    border-radius: 4px;
	    font-size: 14px;
	    margin-bottom: 15px;
	}
	
	/* 當滑鼠點進輸入框準備打字時 */
	.main-card input[type="text"]:focus {
		border-color: #ff5722;
		outline: 0; /* 取消預設的粗黑框 */
	}
	
	/* 送出查詢按鈕 */
	.main-card button[type="submit"] {
		width: 100%;
	    padding: 10px;
	    background-color: #ff5722;
	    border: 1px solid #ff5722;
	    color: white;
	    border-radius: 4px;
	    cursor: pointer;    /* 滑鼠移過去變成手指 */
	    font-size: 15px;
	}
	
	/* hover 滑鼠懸停狀態 */
	.main-card button[type="submit"]:hover {
		background-color: darkorange;
		border-color: darkorange;
	}

	.error-msg { color: red; font-size: 14px; }

</style>
</head>
<body>
	
		<!-- 引入共用後台導覽列片段 -->
	<header th:replace="~{layouts/backend :: backendHeader}"></header>

	
	<div class="container">
	
		<div class="main-card">
			<h3>🏭 廠商管理中心</h3>
			<ul>
				<li><a th:href="@{/supplier/addSupplier}">➕ 新增廠商資料</a></li>
				<br>
				<li><a th:href="@{/supplier/listAllSupplier}">📋 列出所有廠商</a></li>
			</ul>
		</div>
		
		<div class="main-card">
			<h3>🔍 依廠商編號查詢</h3>
			<form th:action="@{/supplier/getOne_For_Display}" method="post">
				<label>請輸入廠商編號</label>
				<input type="text" name="supplierId" placeholder="請輸入編號..." th:value="${param.supplierId}" />
				<button type="submit">送出查詢</button>
				<div class="error-msg" th:if="${errorMsg}" th:text="${errorMsg}"></div>
			</form>
		</div>
		
	</div>
	
</body>
</html>
