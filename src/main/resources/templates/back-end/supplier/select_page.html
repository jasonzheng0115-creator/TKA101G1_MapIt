<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">

<title>廠商管理首頁</title>
<!-- <link th:href="@{/css/backend-common.css}" rel="stylesheet"> -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
<link href="/css/styles.css" rel="stylesheet" />
<style>

	:root {
		--primary-orange: #ff5722;
		--dark-blue: #0f172a;
	}
	
	* {
		box-sizing: border-box;
		margin: 0;
		padding: 0;
	}
	
	body {
		font-family: "Segoe UI", Arial, sans-serif;
		background-color: whitesmoke;
		color: dimgray;
		padding-top: 140px;
	}
	
	/* 導覽列 */
    .navbar-backend {
        background-color: white;
        border-bottom: 1px solid lightgray;
    }

    .sub-navbar-backend {
        background-color: white;
        border-bottom: 2px solid lightgray;
    }

    .sub-navbar-backend .nav-link {
        color: slategray;
        transition: color 0.2s;
        font-size: 0.95rem;
    }

    .sub-navbar-backend .nav-link:hover {
        color: var(--primary-orange);
    }
    
	/* 常用功能 */
	.main-card ul {
		list-style: none; /* 移除原點 */
	}
	
	.main-card ul li a {
		display: inline-block; /* 讓行內元素<a>有block特性,padding才有效 */
		width: 100%;
		padding: 10px 15px;
		border: 1px solid lightgray;
		color: dimgray;
		text-decoration: none;
		border-radius: 4px;
		font-size: 14px;
    	transition: all 0.2s;
	}
	
	.main-card ul li a:hover {
		border-color: dodgerblue;
		color: dodgerblue;
		background-color: aliceblue;
	}
	
	/* 查詢輸入框（Input） */
	.main-card label {
		font-size: 13px;
	    color: gray;
	    display: block;
	    margin-bottom: 8px;
	}
	
	/* [type="text"] 是 屬性選擇器 */
	.main-card input[type="text"] {
		width: 100%;
		padding: 10px 12px;
	    border: 1px solid lightgray;
	    border-radius: 4px;
	    font-size: 14px;
	    margin-bottom: 15px;
	}
	
	/* 當滑鼠點進輸入框準備打字時 */
	.main-card input[type="text"]:focus {
		border-color: dodgerblue;
		outline: 0; /* 取消預設的粗黑框 */
	}
	
	/* 送出查詢按鈕 */
	.main-card button[type="submit"] {
		width: 100%;
	    padding: 10px;
	    background-color: dodgerblue;
	    border: 1px solid dodgerblue;
	    color: white;
	    border-radius: 4px;
	    cursor: pointer;    /* 滑鼠移過去變成手指 */
	    font-size: 15px;
	}
	
	/* hover 滑鼠懸停狀態 */
	.main-card button[type="submit"]:hover {
		background-color: royalblue;
		border-color: royalblue;
	}

	.error-msg { color: red; font-size: 14px; }

</style>
</head>
<body>
	
	<!-- 組合式固定導覽列 -->
    <header class="fixed-top shadow-sm" style="z-index: 1030;">
        <!-- 主選單 (Top Bar) -->
        <nav class="navbar navbar-expand-lg navbar-light navbar-backend py-2">
            <div class="container-fluid px-4 px-lg-5">
                <a class="navbar-brand fw-bold fs-3" href="/manage" style="color: var(--primary-orange);">MapIt <span
                        class="fs-5 text-secondary">後台管理系統</span></a>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center" style="font-size: 0.9rem;">
                        <li class="nav-item" th:if="${session.loginEmp}">
                            <span class="nav-link text-secondary px-3">
                                <i class="bi bi-person-badge-fill text-dark"></i>
                                <span th:text="${session.loginEmp.empName} + ' 您好'">管理員 您好</span>
                            </span>
                        </li>
                        <li class="nav-item ms-lg-2">
                            <a class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold shadow-sm"
                                th:href="@{/emp/logout}">登出</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- 次選單 (功能導覽) -->
        <nav class="sub-navbar-backend py-1">
            <div class="container-fluid px-4 px-lg-5">
                <ul class="nav justify-content-center fw-bold">
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/product/select_page}">商品管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/orders/backend-list}">訂單管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/customer/empCustomerList}">會員管理</a></li>
                    
                    <li class="nav-item">
	                	<a class="nav-link active px-4" 
	                		style="color: #ff5722 !important; 
	                				font-weight: bold;
	                				border-bottom: 3px solid #ff5722;
	                				padding-bottom: 8px;
	                				margin-bottom: -1px;"
	                		th:href="@{/supplier/select_page}">
	                		廠商管理
	                	</a>
	                </li>   
                    
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/ap/select_page}">應付帳款</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/emp/select_page}">員工管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/dept/listAllDept}">部門管理</a></li>
                </ul>
            </div>
        </nav>
    </header>
	<!-- 上方導覽列 -->
<!-- 	<div class="navbar"> -->
<!-- 		<a class="navbar-brand" href="#">🏢 後台管理系統</a> -->
<!-- 		<!-- href="#" 連結點選後會留在原地 --> -->
<!-- 		<div class="navbar-nav"> -->
<!-- 			<a class="active" th:href="@{/supplier/select_page}">供應商管理</a> -->
<!-- 			<a th:href="@{/product/select_page}">商品管理</a> -->
<!-- 			<a th:href="@{/ap/select_page}">應付帳款</a> -->
<!-- 			<a th:href="@{/orders/backend-list}">訂單管理</a> -->
<!-- 		</div> -->
<!-- 	</div> -->
	
	<div class="container">
	
		<div class="main-card">
			<h3>常用功能</h3>
			<ul>
				<li><a th:href="@{/supplier/addSupplier}">➕ 新增廠商資料</a></li>
				<br>
				<li><a th:href="@{/supplier/listAllSupplier}">📋 列出所有廠商</a></li>
			</ul>
		</div>
		
		<div class="main-card">
			<h3>🔍 依廠商編號查詢</h3>
			<form th:action="@{/supplier/getOne_For_Display}" method="post">
				<label>請輸入廠商編號</label>
				<input type="text" name="supplierId" placeholder="請輸入編號..." th:value="${param.supplierId}" />
				<button type="submit">送出查詢</button>
				<div class="error-msg" th:if="${errorMsg}" th:text="${errorMsg}"></div>
			</form>
		</div>
		
	</div>
	
</body>
</html>
