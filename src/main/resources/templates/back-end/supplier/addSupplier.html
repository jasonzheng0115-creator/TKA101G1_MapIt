<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>新增廠商資料</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
<link href="/css/styles.css" rel="stylesheet" />
<style>
	
	:root {
		--primary-orange: #ff5722;
		--dark-blue: #0f172a;
	}
	
	* {
		box-sizing: border-box;
		margin: 0;
		padding: 0;
	}
	
	body {
		font-family: "Segoe UI", Arial, sans-serif;
		background-color: whitesmoke;
		color: dimgray;
		padding-top: 140px;
	}
	
	/* 導覽列 */
    .navbar-backend {
        background-color: white;
        border-bottom: 1px solid lightgray;
    }

    .sub-navbar-backend {
        background-color: white;
        border-bottom: 2px solid lightgray;
    }

    .sub-navbar-backend .nav-link {
        color: slategray;
        transition: color 0.2s;
        font-size: 0.95rem;
    }

    .sub-navbar-backend .nav-link:hover {
        color: var(--primary-orange);
    }
	/* 表單卡片 */
	.form-card {
		max-width: 550px;
		margin: 20px auto;
	}
	
	/* 表單小標題 */
	.form-header h3 {
		margin: 0;
		font-size: 20px;
		color: black;
		border-bottom: 2px solid lightgray; /* 標題下方的粗細線 */
		padding-bottom: 15px;
		margin-bottom: 25px;    /* 與下面的第一個輸入框保持距離 */
	}
	
	/* 欄位群組 「標題」與「輸入框」變成垂直 */
	.form-group {
		display: flex;
		flex-direction: column;  /* 上下垂直 */
		gap: 6px;
		margin-bottom: 18px;
	}
	
	/* 欄位小標題 */
	.form-label {
		font-size: 14px;
		font-weight: 600;
		color: black;
	}
	
	/* 輸入框（Input） */
	.form-control {
		width: 100%;
		padding: 10px 12px;
		border: 1px solid lightgray;
		border-radius: 4px;
		font-size: 14px;
		color: dimgray;
		box-sizing: border-box;  /* 防止輸入框被 padding 撐開到大卡片外面爆掉 */
		transition: border-color 0.2s; 
	}
	
	/* 滑鼠點擊（Focus）準備打字時 */
	.form-control:focus {
		border-color: #ff5722; 
		outline: none;            /* 刪除預設黑框 */
	}
	
	/* 底部按鈕區塊排版 */
	.form-actions {
		display: flex;
		justify-content: flex-end; /* 讓取消與送出按鈕靠右對齊 */
		align-items: center;
		gap: 12px;
		margin-top: 30px;
		border-top: 1px solid lightgray; /* 按鈕上方分界線 */
		padding-top: 20px;
	}
	
	/* 確認送出按鈕 */
	.btn-submit {
		padding: 7px 16px;
		background-color: #ff5722; 
		color: white;                 
		border: 1px solid #ff5722;
		border-radius: 4px;
		font-size: 13px;
		font-weight: bold;
		cursor: pointer;
		transition: all 0.2s;
	}
	
	.btn-submit:hover {
		background-color: royalblue;
		border-color: royalblue;
	}
	
	/* 取消返回按鈕 */
	.btn-back {
		margin-top: 0 !important;     /* 強制歸零，跟確認送出按鈕完美平齊 */
	}
	
</style>
</head>
<body>

	<!-- 組合式固定導覽列 -->
    <header class="fixed-top shadow-sm" style="z-index: 1030;">
        <!-- 主選單 (Top Bar) -->
        <nav class="navbar navbar-expand-lg navbar-light navbar-backend py-2">
            <div class="container-fluid px-4 px-lg-5">
                <a class="navbar-brand fw-bold fs-3" href="/manage" style="color: var(--primary-orange);">MapIt <span
                        class="fs-5 text-secondary">後台管理系統</span></a>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center" style="font-size: 0.9rem;">
                        <li class="nav-item" th:if="${session.loginEmp}">
                            <span class="nav-link text-secondary px-3">
                                <i class="bi bi-person-badge-fill text-dark"></i>
                                <span th:text="${session.loginEmp.empName} + ' 您好'">管理員 您好</span>
                            </span>
                        </li>
                        <li class="nav-item ms-lg-2">
                            <a class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold shadow-sm"
                                th:href="@{/emp/logout}">登出</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- 次選單 (功能導覽) -->
        <nav class="sub-navbar-backend py-1">
            <div class="container-fluid px-4 px-lg-5">
                <ul class="nav justify-content-center fw-bold">
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/product/select_page}">商品管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/orders/backend-list}">訂單管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/customer/empCustomerList}">會員管理</a></li>
                    
                    <li class="nav-item">
	                	<a class="nav-link active px-4" 
	                		style="color: #ff5722 !important; 
	                				font-weight: bold;
	                				border-bottom: 3px solid #ff5722;
	                				padding-bottom: 8px;
	                				margin-bottom: -1px;"
	                		th:href="@{/supplier/select_page}">
	                		廠商管理
	                	</a>
	                </li>   
                    
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/ap/select_page}">應付帳款</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/emp/select_page}">員工管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/dept/listAllDept}">部門管理</a></li>
                </ul>
            </div>
        </nav>
    </header>
    
	<div class="container-fluid">
		<div class="main-card form-card"> 
			<div class="form-header">
				<h3>新增廠商資料</h3>
			</div>

			<form th:action="@{/supplier/insert}" th:object="${splrVO}" method="post">
				<div class="form-group">
					<label class="form-label">廠商名稱:</label>
					<input type="text" class="form-control" th:field="*{supplierName}" placeholder="請輸入廠商名稱" />
					<span style="color: red;" th:if="${#fields.hasErrors('supplierName')}" th:errors="*{supplierName}">名稱錯誤</span>
				</div>
				
				<div class="form-group">
					<label class="form-label">聯絡人:</label>
					<input type="text" class="form-control" th:field="*{supplierContact}" placeholder="請輸入聯絡人資料" />
					<span style="color: red;" th:if="${#fields.hasErrors('supplierContact')}" th:errors="*{supplierContact}">聯絡人資料錯誤</span>
				</div>
				
				<div class="form-group">
					<label class="form-label">廠商電話:</label>
					<input type="text" class="form-control" th:field="*{supplierTel}" placeholder="請輸入廠商電話" />
					<span style="color: red;" th:if="${#fields.hasErrors('supplierTel')}" th:errors="*{supplierTel}">廠商電話錯誤</span>
				</div>
				
				<div class="form-group">
					<label class="form-label">廠商 Email:</label>
					<input type="text" class="form-control" th:field="*{supplierEmail}" placeholder="請輸入廠商Email" />
					<span style="color: red;" th:if="${#fields.hasErrors('supplierEmail')}" th:errors="*{supplierEmail}">廠商Email錯誤</span>
				</div>
				
				<div class="form-group">
					<label class="form-label">廠商地址:</label>
					<input type="text" class="form-control" th:field="*{supplierAddress}" placeholder="請輸入廠商地址" />
					<span style="color: red;" th:if="${#fields.hasErrors('supplierAddress')}" th:errors="*{supplierAddress}">廠商地址錯誤</span>
				</div>
				
				<div class="form-actions">
					<a th:href="@{/supplier/select_page}" class="btn-back">🔙 取消返回</a>
					<button type="submit" class="btn-submit">✅ 確認送出</button>
				</div>
			</form>
		</div>
	</div>

</body>
</html>
