<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8">
<title>訂單管理中心</title>
<style>
	
	* {
		box-sizing: border-box;
		margin: 0;
		padding: 0;
	}
    
	.order-table {
		width: 100%;
		border-collapse: collapse;
		margin-top: 15px;
		font-size: 14px;
	}
	.order-table th, .order-table td {
		padding: 12px;
		text-align: left;
		border-bottom: 1px solid lightgray;
	}
	.order-table th {
		background-color: whitesmoke;
		color: black;
		font-weight: 600;
	}
	
	.btn-cancel-order {
		background-color: crimson;
		color: white;
		padding: 6px 14px;
		border: 1px solid crimson;
		border-radius: 4px;
		cursor: pointer;
		font-size: 12px;
		font-weight: bold;
		transition: all 0.2s;
	}
	.btn-cancel-order:hover {
		background-color: firebrick;
		border-color: firebrick;
	}
</style>

</head>
<body>
	
		<!-- 引入共用後台導覽列片段 -->
	<header th:replace="~{layouts/backend :: backendHeader}"></header>


	<div class="container-fluid">
		<div class="main-card">
			
			<h3>📋 全站訂單管理中心</h3>
			
			<p style="color: gray; font-size: 13px; margin-bottom: 15px;">
				💡 提示：管理員可在此即時監控所有消費者的下單紀錄。若遇客戶要求退款，可點擊「強制取消」按鈕一鍵發動逆向退庫存流程。
			</p>
			
			<!-- 關鍵字 -->
			<div style="margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center;">
				<div style="display: flex; align-items: center; gap: 5px;">
				    <input type="text" id="orderSearchInput" placeholder="輸入編號或商品關鍵字..." 
				           style="width: 300px; padding: 8px 12px; border: 1px solid lightgray; border-radius: 4px; font-size: 14px;">
				    <button type="button" id="searchBtn" 
				            style="padding: 8px 15px; background-color: whitesmoke; border: 1px solid lightgray; border-radius: 4px; cursor: pointer; font-size: 14px; color: black;">
				        <i class="bi bi-search"></i> 搜尋
				    </button>
				</div>
				
				<!-- 會員編號搜尋 -->
				<form th:action="@{/orders/backend-list}" method="GET" style="display: flex; align-items: center; gap: 5px; margin: 0;">
					<input type="number" name="custId" th:value="${custId}" placeholder="輸入會員編號搜尋..." required
						   style="width: 180px; padding: 8px 12px; border: 1px solid lightgray; border-radius: 4px; font-size: 14px;">
					<button type="submit" 
							style="padding: 8px 15px; background-color: #ff5722; border: 1px solid #ff5722; border-radius: 4px; cursor: pointer; font-size: 14px; color: white; font-weight: bold;">
						<i class="bi bi-person-search"></i> 搜尋會員
					</button>
					<!-- 若正在搜尋狀態，顯示清除條件按鈕 -->
					<a th:href="@{/orders/backend-list}" th:if="${custId != null}"
					   style="padding: 8px 15px; background-color: whitesmoke; border: 1px solid lightgray; border-radius: 4px; text-decoration: none; font-size: 14px; color: dimgray; display: inline-flex; align-items: center;">
						清除搜尋
					</a>
				</form>
			</div>


			<div style="overflow-x: auto;">
				<table class="order-table">
					<thead>
						<tr>
							<th>訂單編號</th>
							<th>會員編號</th>
							<th>成立時間</th>
							<th>總金額</th>
							<th>訂單明細</th>
							<th>當前狀態</th>
							<th>取消原因備註</th>
							<th style="text-align: center;">後台權限操作</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="order : ${allOrdersList}" th:id="'order-row-' + ${order.orderId}">
							<td th:text="${order.orderId}">10025</td>
							<td th:text="${order.custVO.custId}">1</td>
							<td th:text="${order.orderTimestamp}">2026-06-27 00:15:00</td>
							<td th:text="'NT$ ' + ${order.orderPrice}" style="font-weight: bold; color: black;">NT$ 999</td>
							
							<td>
							    <div th:each="item : ${order.orderItems}" style="margin-bottom: 4px;">
							        <span th:text="${item.prodVO.productName}" style="font-weight: 500;">商品名稱</span>
							        <span th:text="' x ' + ${item.itemQty} + ' 張'" style="color: gray;"> x 1 張</span>
							    </div>
							</td>
							
							<td th:id="'status-text-' + ${order.orderId}" 
								th:text="${order.orderStatus}" 
								th:style="${order.orderStatus == '已取消' ? 'color: crimson; font-weight: bold;' : 'color: dodgerblue; font-weight: bold;'}">
								已付款
							</td>
							
							<td th:id="'cancel-text-' + ${order.orderId}" 
								th:text="${order.orderCancel != null ? order.orderCancel : '—'}" 
								style="color: gray; font-style: italic;">
								—
							</td>
							
							<td style="text-align: center;">
								<button th:id="'cancel-btn-' + ${order.orderId}"
										th:if="${order.orderStatus != '已取消'}"
										th:onclick="'executeBackendCancel(' + ${order.orderId} + ')'"
										class="btn-cancel-order">
									❌ 取消訂單
								</button>
								<span th:if="${order.orderStatus == '已取消'}" style="color: silver; font-size: 13px;">🚫 權限已關閉</span>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
			
		</div>
	</div>

	<script>
	function executeBackendCancel(orderId) {
		const reason = prompt("請輸入後台強制取消此訂單的原因（該原因將同步反映至消費者前台）：");
		
		if (reason === null) return; // 點擊取消
		if (reason.trim() === "") {
			alert("⚠️ 操作失敗：必須輸入原因才能執行逆向退庫存流程！");
			return;
		}
		
		// 發動非同步請求，去叩動後台第二條 Java 水管
		fetch('/orders/backend-cancel', {
			method: 'POST',
			headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
			body: new URLSearchParams({
				'orderId': orderId,
				'cancelReason': reason
			})
		})
		.then(response => {
			if (response.ok) return response.json();
			return response.text().then(text => { throw new Error(text); });
		})
		.then(data => {
			// 局部刷新，畫面一秒響應
			alert('該訂單已失效，商品庫存與累積銷量已更改！');
			
			document.getElementById('status-text-' + orderId).innerText = '已取消';
			document.getElementById('status-text-' + orderId).style.color = 'crimson';
			document.getElementById('cancel-text-' + orderId).innerText = reason;
			
			const btn = document.getElementById('cancel-btn-' + orderId);
			if (btn) {
				btn.parentNode.innerHTML = '<span style="color: silver; font-size: 13px;">🚫 權限已關閉</span>';
			}
		})
		.catch(error => {
			alert('❌ 後台操作異常：' + error.message);
		});
	}
	
	
	// 監聽「搜尋按鈕」的點擊事件
	window.onload = function() {

		document.getElementById('searchBtn').addEventListener('click', function() {
		    const filterText = document.getElementById('orderSearchInput').value.toLowerCase().trim();
		    const rows = document.querySelectorAll('.order-table tbody tr');
	
		    rows.forEach(row => {
		        const orderId = row.cells[0].textContent.toLowerCase();
		        const memberId = row.cells[1].textContent.toLowerCase();
		        const items = row.cells[4].textContent.toLowerCase();
	
		        if (orderId.includes(filterText) || memberId.includes(filterText) || items.includes(filterText)) {
		            row.style.display = ''; 
		        } else {
		            row.style.display = 'none'; 
		        }
		    });
		});
	
		// 在輸入框按「Enter鍵」也能觸發搜尋
		document.getElementById('orderSearchInput').addEventListener('keypress', function(e) {
		    if (e.key === 'Enter') {
		        document.getElementById('searchBtn').click();
		    }
		});
	}
	
	</script>

</body>
</html>
