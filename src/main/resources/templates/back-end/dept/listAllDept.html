<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>MapIt 後台 - 部門管理中心</title>
    <!-- 引入與前台一致的 Bootstrap 5 與圖標樣式 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="/css/styles.css" rel="stylesheet" />
    <style>
        :root {
            --primary-orange: #ff5722;
            --primary-orange-hover: #e64a19;
            --dark-blue: #0f172a;
        }

        body {
            background-color: #f8fafc;
            color: #334155;
            padding-top: 120px;
            /* 預留給固定頂部雙導覽列的空間 */
        }

        /* 後台專用 Top Bar */
        .navbar-backend {
            background-color: white;
            border-bottom: 1px solid #e2e8f0;
        }

        /* 後台功能次選單 */
        .sub-navbar-backend {
            background-color: white;
            border-bottom: 2px solid #e2e8f0;
        }

        .sub-navbar-backend .nav-link {
            color: #475569;
            transition: color 0.2s;
            font-size: 0.95rem;
        }

        .sub-navbar-backend .nav-link:hover {
            color: var(--primary-orange);
        }

        .sub-navbar-backend .nav-link.active {
            color: var(--primary-orange);
            border-bottom: 3px solid var(--primary-orange);
            margin-bottom: -2px;
        }

        /* 列表卡片樣式 */
        .admin-card {
            background-color: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .admin-card h3 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--dark-blue);
            border-left: 5px solid var(--primary-orange);
            padding-left: 10px;
            margin-bottom: 1.5rem;
        }

        /* 按鈕樣式 */
        .btn-orange {
            background-color: var(--primary-orange);
            color: white;
            font-weight: 600;
            border-radius: 6px;
            border: none;
            transition: background-color 0.2s;
        }

        .btn-orange:hover {
            background-color: var(--primary-orange-hover);
            color: white;
        }

        .btn-outline-orange {
            border: 1.5px solid var(--primary-orange);
            color: var(--primary-orange);
            font-weight: 600;
            border-radius: 6px;
            background: transparent;
            transition: all 0.2s;
        }

        .btn-outline-orange:hover {
            background-color: var(--primary-orange);
            color: white;
        }

        /* 表格字型微調 */
        .table {
            font-size: 0.95rem;
        }

        .table th {
            background-color: #f1f5f9;
            color: #1e293b;
            font-weight: 700;
        }

        .form-control:focus {
            border-color: var(--primary-orange);
            box-shadow: 0 0 0 3px rgba(255, 87, 34, 0.15);
        }
    </style>
</head>

<body>

    <!-- 組合式固定導覽列 (與前台首頁結構一致) -->
    <header class="fixed-top shadow-sm" style="z-index: 1030;">
        <!-- 主選單 (Top Bar) -->
        <nav class="navbar navbar-expand-lg navbar-light navbar-backend py-2">
            <div class="container-fluid px-4 px-lg-5">
                <a class="navbar-brand fw-bold fs-3" th:href="@{/manage}" style="color: var(--primary-orange);">MapIt
                    <span class="fs-5 text-secondary">後台管理系統</span></a>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center" style="font-size: 0.9rem;">
                        <li class="nav-item" th:if="${session.loginEmp}">
                            <span class="nav-link text-secondary px-3">
                                <i class="bi bi-person-badge-fill text-dark"></i>
                                <span th:text="${session.loginEmp.empName} + ' 您好'">管理員 您好</span>
                            </span>
                        </li>
                        <li class="nav-item ms-lg-2">
                            <a class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold shadow-sm"
                                th:href="@{/emp/logout}">登出</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- 次選單 (後台功能選單) -->
        <nav class="sub-navbar-backend py-1">
            <div class="container-fluid px-4 px-lg-5">
                <ul class="nav justify-content-center fw-bold">
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/product/select_page}">商品管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/orders/backend-list}">訂單管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/customer/empCustomerList}">會員管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/supplier/select_page}">廠商管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/ap/select_page}">應付帳款</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/emp/select_page}">員工管理</a></li>
                    <li class="nav-item"><a class="nav-link active px-4" th:href="@{/dept/listAllDept}">部門管理</a></li>
                    <li class="nav-item"><a class="nav-link px-4" th:href="@{/emp/message/send}">通知發送</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- 主要內容區 -->
    <div class="container px-4 px-lg-5 mt-5">

        <!-- 頁面頂部標題與功能欄 -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold m-0"><i class="bi bi-diagram-3-fill text-dark"></i> 公司部門管理</h2>
        </div>

        <!-- 錯誤訊息提示區 -->
        <div class="alert alert-danger shadow-sm mb-4" role="alert" th:if="${errorMsg}" th:text="${errorMsg}"></div>

        <div class="row g-4">
            <!-- 👉 部門列表 (寬度 12/12 滿版) -->
            <div class="col-md-12">
                <div class="admin-card">
                    <!-- 卡片上方區塊 -->
                    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                        <div class="d-flex align-items-center">
                            <h3 class="fw-bold m-0 text-dark"><i class="bi bi-list-task text-orange"></i> 部門列表</h3>
                            <!-- 新增按鈕：只有在非編輯模式下顯示 -->
                            <button th:if="${deptVO.deptId == null}" id="btnShowAddForm" class="btn btn-orange btn-sm ms-3">
                                <i class="bi bi-plus-circle"></i> 新增部門
                            </button>
                        </div>
                        <div class="text-end text-muted small">
                            共 <span class="fw-bold text-dark" th:text="${deptList.size()}">0</span> 個部門
                        </div>
                    </div>

                    <!-- 🎯 新增/編輯部門輸入框區塊 (預設隱藏，點擊按鈕或編輯時顯示) -->
                    <div id="deptFormContainer" 
                         th:class="'card bg-light p-3 mb-4 ' + (${deptVO.deptId == null && errorMsg == null} ? 'd-none' : '')">
                        <h4 class="fs-6 fw-bold mb-3">
                            <span th:text="${deptVO.deptId == null} ? '➕ 新增部門' : '📝 編輯部門'">部門設定</span>
                        </h4>
                        <form method="post" th:object="${deptVO}" 
                              th:action="${deptVO.deptId == null} ? @{/dept/insert} : @{/dept/update}">
                            
                            <!-- 編輯模式下，必須帶入部門ID的隱藏欄位 -->
                            <input type="hidden" th:field="*{deptId}">

                            <div class="row g-3 align-items-end">
                                <div class="col-md-6 col-lg-4">
                                    <label for="deptName" class="form-label fw-bold small">部門名稱 :</label>
                                    <input type="text" class="form-control py-2" id="deptName" th:field="*{deptName}"
                                           placeholder="請輸入部門名稱 (如: 財務部)" required maxlength="20">
                                    <span class="text-danger small fw-bold mt-1 d-block" 
                                          th:if="${#fields.hasErrors('deptName')}" th:errors="*{deptName}"></span>
                                </div>
                                <div class="col-md-6 col-lg-4 d-flex gap-2">
                                    <button type="submit" class="btn btn-orange px-4 py-2">
                                        <span th:text="${deptVO.deptId == null} ? '確認新增' : '儲存修改'">送出</span>
                                    </button>
                                    <!-- 新增模式的取消按鈕 (JS 隱藏) -->
                                    <button type="button" th:if="${deptVO.deptId == null}" id="btnCancelAdd" class="btn btn-outline-secondary px-4 py-2">
                                        取消
                                    </button>
                                    <!-- 編輯模式的取消編輯按鈕 (GET 重導向) -->
                                    <a th:unless="${deptVO.deptId == null}" th:href="@{/dept/listAllDept}" class="btn btn-outline-secondary px-4 py-2 text-decoration-none text-center">
                                        取消編輯
                                    </a>
                                </div>
                            </div>
                        </form>
                    </div>

                    <!-- 資料表格 -->
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle">
                            <thead>
                                <tr class="text-center">
                                    <th style="width: 30%;">部門編號</th>
                                    <th style="width: 50%;">部門名稱</th>
                                    <th style="width: 20%;">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="dept : ${deptList}" class="text-center">
                                    <td th:text="${dept.deptId}" class="fw-bold text-dark">1</td>
                                    <td th:text="${dept.deptName}">資訊部</td>
                                    <td>
                                        <!-- 編輯按鈕：透過 POST 發送 deptId 回 Controller 切換為編輯狀態 -->
                                        <form method="post" th:action="@{/dept/getOne_For_Update}" class="d-inline">
                                            <input type="hidden" name="deptId" th:value="${dept.deptId}">
                                            <button type="submit" class="btn btn-outline-orange btn-sm px-3 py-1">
                                                <i class="bi bi-pencil-square"></i> 編輯
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 💡 控制「新增部門」輸入框展開與縮合的 JavaScript -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const btnShowAddForm = document.getElementById("btnShowAddForm");
            const deptFormContainer = document.getElementById("deptFormContainer");
            const btnCancelAdd = document.getElementById("btnCancelAdd");

            if (btnShowAddForm && deptFormContainer) {
                btnShowAddForm.addEventListener("click", function() {
                    // 切換 d-none 樣式來顯示/隱藏表單
                    deptFormContainer.classList.toggle("d-none");
                    if (!deptFormContainer.classList.contains("d-none")) {
                        const deptNameInput = document.getElementById("deptName");
                        if (deptNameInput) {
                            deptNameInput.focus();
                        }
                    }
                });
            }

            if (btnCancelAdd && deptFormContainer) {
                btnCancelAdd.addEventListener("click", function() {
                    deptFormContainer.classList.add("d-none");
                });
            }
        });
    </script>
</body>

</html>
