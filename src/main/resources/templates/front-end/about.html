<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關於我們 - 旅圖 MapIt</title>
    <!-- Google Fonts Outfit & Noto Sans TC -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <style>
        body {
            background: linear-gradient(135deg, #fff5f2 0%, #eefbf1 100%);
            color: #333;
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* 裝飾性背景漸變圓球 */
        .bg-shape-1 {
            position: absolute;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,87,34,0.08) 0%, rgba(255,87,34,0) 70%);
            top: -150px;
            right: -100px;
            z-index: -1;
        }

        .bg-shape-2 {
            position: absolute;
            width: 550px;
            height: 550px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(52,168,83,0.07) 0%, rgba(52,168,83,0) 70%);
            bottom: -200px;
            left: -150px;
            z-index: -1;
        }

        /* 毛玻璃內容容器卡片 */
        .about-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.03);
            width: 100%;
        }

        .back-btn {
            color: #666;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            color: #ff5722;
            transform: translateX(-3px);
        }

        /* ==========================================================
           橫幅 Banner 樣式 (複製使用者附圖效果)
           ========================================================== */
        .about-banner {
            display: flex;
            height: 380px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            position: relative;
            margin-bottom: 35px;
        }

        /* 左側白色區域 */
        .banner-left {
            width: 38%;
            background: white;
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 點點裝飾背板 */
        .dots-pattern {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 110px;
            height: 180px;
            background-image: radial-gradient(#d3c2b0 2.5px, transparent 2.5px);
            background-size: 14px 14px;
            opacity: 0.8;
            z-index: 1;
        }

        /* 核心白圓盤 */
        .circle-card {
            width: 230px;
            height: 230px;
            border-radius: 50%;
            background: white;
            border: 1px solid #dcd1c4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute;
            right: -115px; /* 剛好跨越左右分界線的一半 */
            top: 50%;
            transform: translateY(-50%);
            z-index: 3;
            box-shadow: 5px 5px 20px rgba(0, 0, 0, 0.02);
        }

        /* 同心外白線圈 (覆蓋在右側圖片上) */
        .circle-card::after {
            content: '';
            position: absolute;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.85);
            top: -11px;
            left: -11px;
            pointer-events: none;
            z-index: 4;
        }

        .circle-title {
            color: #2b5a37; /* 質感深綠 */
            font-size: 2.1rem;
            font-weight: bold;
            letter-spacing: 4px;
            margin-bottom: 5px;
            font-family: 'Noto Sans TC', sans-serif;
        }

        .circle-subtitle {
            color: #4a8c54; /* 質感中綠 */
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 0;
            font-family: 'Outfit', sans-serif;
        }

        /* 右側圖片區 */
        .banner-right {
            width: 62%;
            background-size: cover;
            background-position: center;
            position: relative;
            z-index: 1;
        }

        /* ==========================================================
           綠色文字內容卡片
           ========================================================== */
        .info-card {
            background-color: #e8f5e9; /* 淺綠色背景 */
            border: 1px solid #c8e6c9;
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            text-align: justify;
        }

        .quote-box {
            border-left: 4px solid #ff5722;
            padding-left: 15px;
            margin-bottom: 20px;
        }

        .quote-text {
            font-size: 1.1rem;
            color: #555;
            font-weight: 600;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <!-- 裝飾性背景 -->
    <div class="bg-shape-1"></div>
    <div class="bg-shape-2"></div>

    <div class="container py-5" style="max-width: 1000px;">
        
        <!-- 毛玻璃主容器 -->
        <div class="about-card">
            
            <!-- 左上角 回到首頁按鈕 -->
            <div class="mb-4">
                <a href="/" class="text-decoration-none back-btn d-inline-flex align-items-center">
                    <i class="bi bi-arrow-left fs-5 me-2"></i> 回到首頁
                </a>
            </div>

            <!-- 橫幅 Banner (左：點點與白圓，右：約會相片) -->
            <div class="about-banner">
                <!-- 左半部 -->
                <div class="banner-left">
                    <div class="dots-pattern"></div>
                    <div class="circle-card">
                        <div class="circle-title">關於我們</div>
                        <div class="circle-subtitle">About us</div>
                    </div>
                </div>
                <!-- 右半部 (Spring 讀取 @{/images/about-team.jpg}) -->
                <div class="banner-right" th:style="'background-image: url(' + @{/images/about-team.jpg} + ');'" style="background-image: url('/images/about-team.jpg');"></div>
            </div>

            <!-- 下方文案 -->
            <div class="row">
                <div class="col-12">
                    <div class="quote-box">
                        <p class="quote-text">
                            旅行應該是去威尼斯餵鴿子，<br>而不是在電腦前對著 Google Map 餵蚊子。
                        </p>
                    </div>

                    <!-- 綠色圓角文字區塊 -->
                    <div class="info-card">
                        <p class="fs-6 mb-4" style="line-height: 1.8; text-indent: 2em;">
                            我們發現，台灣擁有極其豐富的自然與文化景觀，但散落在政府開放資料中的美景，往往難以轉化為流暢的旅行體驗。因此，我們開發了這個整合平台，將全台各地的景點資訊進行數位化整合，為你省去搜尋的時間。
                        </p>
                        <p class="fs-6 mb-0" style="line-height: 1.8; text-indent: 2em;">
                            在這裡，你不僅能一鍵收藏心儀景點，更能透過直覺的「拖拉式」介面，輕鬆排列出最順暢的行蹤。我們深知旅行是群體的記憶，因此特別規劃了「旅遊群組功能」，讓你與好友能一同編輯、規劃行程。從景點評論到交通導覽，我們致力於打破規劃行程的繁瑣藩籬，讓「旅圖」成為你探索台灣的最佳助手。
                        </p>
                    </div>
                </div>
            </div> <!-- End Row -->
            
        </div> <!-- End About Card -->

    </div>

</body>
</html>
