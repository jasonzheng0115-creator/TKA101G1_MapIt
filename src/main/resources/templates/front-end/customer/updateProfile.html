<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改個人資料</title>
    <style>
        body { 
        font-family: 'Segoe UI', Tahoma, sans-serif; 
        background-color: #f4f7f6; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
        margin: 0; }
        
        .profile-card {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.05);
        width: 100%;
        max-width: 400px; 
        }
        h2 { text-align: center; color: #333; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; }
        label {  display: block;  margin-bottom: 8px; color: #555; font-weight: bold; }
        input { 
        width: 100%; 
        padding: 12px; 
        border: 1px solid #ddd; 
        border-radius: 6px; 
        box-sizing: border-box; }
        
        .radio-group {
            display: flex;
            gap: 15px;
            padding: 8px 0;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            font-weight: normal;
            margin-bottom: 0;
            cursor: pointer;
        }
        .radio-group input[type="radio"] {
            width: auto; 
            margin: 0 5px 0 0;
        }
        
        .btn-submit { 
        width: 100%; 
        padding: 14px; 
        background-color: #4a90e2; 
        color: white; border: none; 
        border-radius: 6px; 
        font-weight: bold; 
        cursor: pointer; }
        
        .btn-cancel { 
        width: 100%; 
        padding: 14px; 
        background-color: #f1f1f1; 
        color: #333; border: none; 
        border-radius: 6px; 
        font-weight: bold; 
        cursor: pointer; 
        margin-top: 10px; 
        display: block; 
        text-align: center; 
        text-decoration: none; 
        box-sizing: border-box;}
        
        .field-error {color: #d9534f; font-size: 12px; margin-top: 5px;display: block;}
		
		.error-message { 
		color: #d9534f; 
		background-color: #fdf2f2; 
		padding: 10px; 
		border-radius: 6px; 
		margin-bottom: 20px; 
		text-align: center; 
		font-size: 14px;}
		/* 會員頭貼 */
		.avatar-container {
		 margin-bottom: 15px;
		 text-align: center;
		}
		.avatar-preview{
    	width: 100px;
    	height: 100px;
    	border-radius: 50%;
    	object-fit: cover;
    	border: 2px solid #ddd;		
		}
		
    </style>
    
</head>
<body>
    <div class="profile-card">
        <h2>✏️ 修改個人資料</h2>

        <!-- th:action 去找 Controller，以及 th:object 綁定資料箱子 -->
        <form th:action="@{/customer/updateProfile}" method="post" th:object="${loginCust}" enctype="multipart/form-data">
	        <!-- 放一次即可，因為使用者不能修改帳號密碼，所以讓舊資料原封不動送進SQL檢查 -->
			<input type="hidden" th:field="*{cust_account}">
			<input type="hidden" th:field="*{cust_password}">     
            <div class="error-message" th:if="${errorMsg != null}" th:text="${errorMsg}"></div>
         	
         	<div class="form-group">
         	<label>上傳頭像：</label>
         	<div class="avatar-container">
         		<!-- 靠th:src判斷，如果資料庫裡有路徑就顯示，否則顯示預設頭像 -->
         		<img id="avatarPreview" class="avatar-preview"
         			 th:src="${loginCust.cust_img != null ? loginCust.cust_img:'/images/default_custAvatar.jpg'}">
         	</div>
         	<!-- 檔案上傳按鈕 
	   		accept="image/*":限制只能選取圖片檔案
			onchange:瀏覽器事件，選好照片按下確定，值改變後觸發
			previewImage(this):觸發後去呼叫JS函數(previewImage)，並把this(上傳按鈕本身)當作硬幣投入函數中，讓JS知道要去讀取圖片檔案 -->
         	<input type="file" name="cust_img_file" id="cust_img_file" accept="image/*" onchange="previewImage(this)">
         	<input type="hidden" id="remove_img_flag" name="remove_img_flag" value="false">
         	<button type="button" id="btnDeleteAvatar" onclick="removeAvatar()">刪除頭像</button>
         	</div>
				
            <div class="form-group">
                <label>姓名：</label>
                <input type="text" th:field="*{cust_name}" placeholder="請輸入姓名">
                <span class="field-error" th:if="${#fields.hasErrors('cust_name')}" th:errors="*{cust_name}"></span>
				       
            </div>

            <div class="form-group">
                <label>性別：</label>
                <div class="radio-group">
                    <label><input type="radio" th:field="*{cust_sex}" value="M"> 男性</label>
                    <label><input type="radio" th:field="*{cust_sex}" value="F"> 女性</label>
                    <label><input type="radio" th:field="*{cust_sex}" value="不透露"> 不透露</label>
                </div>
                <span class="field-error" th:if="${#fields.hasErrors('cust_sex')}" th:errors="*{cust_sex}"></span>          
            </div>
			
			<div class="form-group">
                <label>電話：</label>
                <input type="text" th:field="*{cust_tel}" placeholder="請輸入手機號碼">  
                <span class="field-error" th:if="${#fields.hasErrors('cust_tel')}" th:errors="*{cust_tel}"></span>
            </div>
            
            <div class="form-group">
                <label>電子信箱：</label>
                <input type="text" th:field="*{cust_email}" placeholder="請輸入電子信箱">   
                <span class="field-error" th:if="${#fields.hasErrors('cust_email')}" th:errors="*{cust_email}"></span>    
            </div>
            
            <div class="form-group">
                <label>身分證字號：</label>
                <input type="text" th:field="*{cust_id_card}" placeholder="請輸入身分證字號">     
                <span class="field-error" th:if="${#fields.hasErrors('cust_id_card')}" th:errors="*{cust_id_card}"></span>     
            </div>
            
            <div class="form-group">
                <label>生日：</label>
                <input type="text" th:field="*{cust_birthday}" placeholder="請輸入生日">
                <span class="field-error" th:if="${#fields.hasErrors('cust_birthday')}" th:errors="*{cust_birthday}"></span>               
            </div>
            
            <div class="form-group">
                <label>信用卡號：</label>
                <input type="text" th:field="*{cust_card}" placeholder="請輸入信用卡號">
                <span class="field-error" th:if="${#fields.hasErrors('cust_card')}" th:errors="*{cust_card}"></span>   
            </div>
            
            <div class="form-group">
                <label>聯絡地址：</label>
                <input type="text" th:field="*{cust_address}" placeholder="請輸入聯絡地址">
                <span class="field-error" th:if="${#fields.hasErrors('cust_address')}" th:errors="*{cust_address}"></span>             
            </div>
			
			
            <button type="submit" class="btn-submit">💾 儲存修改</button>
            <a th:href="@{/customer/loginSuccess}" class="btn-cancel">取消返回</a>
        </form>
    </div>
    
    <script>
    	/* 接html裡previewImage(this)，this=input=上傳的照片 */
	    function previewImage(input){
    		/* 只要使用者選照片了，就把值改為false */
    		document.getElementById("remove_img_flag").value = "false"
	    	if(input.files && input.files[0]){
	    		var reader = new FileReader(); /* 建立檔案讀取器 */
	    		/* reader.onload(當圖片讀取完成)，就觸發產生event(事件)*/
	    		reader.onload = function(event){ /* target:讀取器，把result(讀取結果)拿出來 */
	    			document.getElementById("avatarPreview").src = event.target.result;
	    		}
	    		/* 將reader用JS內建的方法將圖片的二進位轉換成Base64文字網址，再把網址給th:src還原 */
	    		reader.readAsDataURL(input.files[0]);
	    	}
	    }
    	
    	function removeAvatar(){
    		//將畫面的預覽圖換成預設頭像
    		document.getElementById("avatarPreview").src="/images/default_custAvatar.jpg";
    		//清空檔案上傳按鈕裡面的選取檔案
    		document.getElementById("cust_img_file").value="";
    		//將隱藏信封改為true
    		document.getElementById("remove_img_flag").value="true";
    		
    	}
    </script>
    
</body>
</html>
