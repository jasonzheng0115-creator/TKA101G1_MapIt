<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的通知匣</title>
    <!-- 同首頁的導覽列樣式 -->
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="/css/styles.css" rel="stylesheet" />
    
    <style>
        :root {
            --primary-color: #ff5722;
            --bg-gradient: linear-gradient(135deg, #fff5f2 0%, #f4f7f6 100%);
            --card-bg: #ffffff;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg-gradient);
            padding: 160px 20px 40px;
            min-height: 100vh; 
        }
        
        /* 手動控制下拉選單 */
        .nav-item.dropdown .dropdown-menu { display: none; margin-top: 8px; }
        .nav-item.dropdown .dropdown-menu.show { display: block; }
        .dropdown-item { transition: background-color 0.2s, color 0.2s; }
        .dropdown-item:hover { background-color: #fff5f2 !important; color: #ff5722 !important; }
        .dropdown-item:hover i { color: #ff5722 !important; }

        /* 通知卡片設計 */
        .message-container {
            max-width: 800px;
            margin: auto;
        }
        .message-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            border-left: 5px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .message-card.unread {
            border-left-color: var(--primary-color);
            background-color: #fffdfc;
        }
        .message-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 87, 34, 0.1);
        }
        .msg-pic {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            object-fit: cover;
            margin-right: 20px;
            border: 2px solid #feede8;
        }
        .msg-content {
            flex-grow: 1;
        }
        .msg-headline {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
        }
        .msg-badge {
            background-color: var(--primary-color);
            color: white;
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 12px;
            margin-left: 12px;
            font-weight: normal;
        }
        .msg-text {
            color: #666;
            margin-bottom: 5px;
            font-size: 1rem;
        }
        .msg-time {
            font-size: 0.85rem;
            color: #999;
        }
        .unread-count-badge {
            background-color: #dc3545;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 0.7rem;
            position: relative;
            top: -2px;
        }
    </style>
</head>
<body>
    <!-- 固定導覽列 -->
<!-- 組合式固定導覽列 (整合主選單與次選單) -->
	<header th:replace="~{layouts/frontend :: navbar}"></header>

    <!-- 通知匣主內容 -->
    <div class="message-container">
        <h2 class="mb-4 text-center fw-bold" style="color: #1f2937;">🔔 我的通知匣</h2>
        
        <!-- 當沒有通知時顯示 -->
        <div th:if="${#lists.isEmpty(messageList)}" class="text-center p-5" style="background: white; border-radius: 15px;">
            <i class="bi bi-inbox text-muted" style="font-size: 3rem;"></i>
            <p class="mt-3 text-muted">目前沒有任何通知</p>
        </div>

        <!-- 迴圈印出通知卡片 -->
        <div th:each="msg : ${messageList}" 
             th:class="'message-card ' + (${msg.msgStatus == 0} ? 'unread' : '')"
             th:attr="onclick='markAsRead(this, ' + ${msg.msgId} + ')'">
            
            <img th:if="${msg.msgPic != null && msg.msgPic != ''}" 
                 th:src="@{/customer/message/image/{id}(id=${msg.msgId})}" 
                 class="msg-pic" 
                 onerror="this.src='/custDefaultAvatar/default_custAvatar.jpg'">
            
            <div class="msg-content">
                <div class="msg-headline">
                    <span th:text="${msg.msgHeadline}">系統公告</span>
                    <span class="msg-badge" th:if="${msg.msgStatus == 0}">New!</span>
                </div>
                <div class="msg-text" th:text="${msg.msgContent}">通知內文...</div>
                <div class="msg-time" th:text="${#dates.format(msg.msgDatetime, 'yyyy-MM-dd HH:mm')}">2026-06-30 12:00</div>
            </div>
        </div>
    </div>

    <!-- Bootstrap core JS-->
    <th:block th:replace="~{layouts/frontend :: scripts}"></th:block>
    
    <!-- 通知互動邏輯 -->
    <script>
        function markAsRead(element, msgId) {
            // 1. 防呆：如果已經讀過了 (沒有 unread 樣式)，就不用再發 API 浪費資源
            if (!element.classList.contains('unread')) {
                return; 
            }

            // 2. 在背景偷偷向後端發送「已讀」請求
            fetch('/customer/message/read/' + msgId, {
                method: 'POST'
            })
            .then(response => response.text())
            .then(result => {
                if (result === 'success') {
                    // 3. 【外觀變化】拔掉 unread 類別，讓左邊的亮橘色粗線與微橘背景消失
                    element.classList.remove('unread');
                    
                    // 4. 【外觀變化】找出卡片裡面的 "New!" 徽章，並把它隱藏起來
                    const badge = element.querySelector('.msg-badge');
                    if (badge) {
                        badge.style.transition = "opacity 0.3s ease";
                        badge.style.opacity = "0"; // 漸隱動畫
                        setTimeout(() => badge.style.display = 'none', 300); // 動畫結束後移除空間
                    }

                    // 5. （選擇性）為了讓視覺更明顯，我們把已讀的文字稍微調暗一點
                    element.querySelector('.msg-headline').style.color = '#6c757d';
                    element.querySelector('.msg-text').style.color = '#adb5bd';
                }
            })
            .catch(error => console.log('標記已讀失敗:', error));
        }
    </script>
</body>
</html>
