<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員註冊</title>
    <!-- 同首頁的導覽列 -->
	<link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
	<link href="/css/styles.css" rel="stylesheet" />
	<!-- ========== -->
    <style>
    
        :root {
            --primary-color: #ff5722;
            --primary-hover: #e64a19;
            --bg-gradient: linear-gradient(135deg, #fff5f2 0%, #f4f7f6 100%);
            --card-bg: #ffffff;
            --error-color: #ef4444;
        }
        body {
            margin: 0;
            padding: 120px 20px 40px;
            display: flex;
            justify-content: center;
            /* align-items: center; 移除了垂直置中，避免表單過長時頂部被切掉 */
            min-height: 100vh;
            background: var(--bg-gradient);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-sizing: border-box;
        }
        .register-card {
            background: var(--card-bg);
            padding: 3rem 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 87, 34, 0.08);
            border: 1px solid #feede8;
            width: 100%;
            max-width: 520px;
            /* 讓表單在高度足夠時居中，高度不夠時正常捲動 */
            margin: auto; 
        }
        .register-card h2 {
            margin-top: 0;
            color: #1f2937;
            font-size: 2.2rem;
            margin-bottom: 2rem;
            text-align: center;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            color: #4b5563;
            font-size: 1.1rem;
            font-weight: 600;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 1rem;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(255, 87, 34, 0.15);
        }
        /* 性別 Radio 群組樣式 */
        .radio-group {
            display: flex;
            gap: 1.5rem;
            padding: 0.5rem 0;
        }
        .radio-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: #4b5563;
        }
        .radio-option input {
            width: auto;
            cursor: pointer;
        }
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            margin-top: 2rem;
            letter-spacing: 1px;
        }
        .submit-btn:hover {
            background-color: var(--primary-hover);
        }
        .submit-btn:active {
            transform: scale(0.98);
        }
        /* 欄位下方的紅字錯誤提示 */
        .error-text {
            color: var(--error-color);
            font-size: 0.8rem;
            margin-top: 0.25rem;
            display: block;
        }
        /* 整張表單上方的全域錯誤（例如：帳號重複） */
        .global-error {
            color: var(--error-color);
            background-color: #fef2f2;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            text-align: center;
        }
        .login-link {
            text-align: center;
            margin-top: 2rem;
            font-size: 1.1rem;
        }
        .login-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
	<!-- 同首頁的導覽列 -->
	<header class="fixed-top bg-white shadow-sm" style="z-index: 1030;">
	    <nav class="navbar navbar-expand-lg navbar-light border-bottom py-2">
	        <div class="container px-4 px-lg-5">
	            <a class="navbar-brand fw-bold fs-3" href="/" style="color: #ff5722;">旅圖 | MapIt</a>
	            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
	                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
	                aria-expanded="false" aria-label="Toggle navigation">
	                <span class="navbar-toggler-icon"></span>
	            </button>
	            <div class="collapse navbar-collapse" id="navbarSupportedContent">
	                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center" style="font-size: 0.9rem;">
	
	                    <li class="nav-item" th:if="${userName}">
	                        <a class="nav-link text-secondary px-3" th:href="@{/customer/updateProfile}">
	                            <i class="bi bi-person-circle"></i> <span th:text="${userName} + ' 你好'">會員中心</span>
	                        </a>
	                    </li>
	
	                    <li class="nav-item">
	                        <a class="nav-link text-secondary px-3" th:href="@{/cart/show}">
	                            <i class="bi bi-cart3"></i> 購物車
	                        </a>
	                    </li>
	
	                    <li class="nav-item ms-lg-2" th:if="${userName}">
	                        <a class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold shadow-sm"
	                            th:href="@{/customer/logout}">登出</a>
	                    </li>
	
	                    <li class="nav-item ms-lg-2" th:unless="${userName}">
	                        <a class="btn btn-sm rounded-pill px-3 fw-bold shadow-sm" style="background-color: #ff5722; color: white; border: none;"
	                            th:href="@{/customer/login}">註冊 / 登入</a>
	                    </li>
	                </ul>
	            </div>
	        </div>
	    </nav>
	
	    <nav class="sub-navbar bg-white py-1">
	        <div class="container px-4 px-lg-5">
	            <ul class="nav justify-content-center fw-bold">
	                <li class="nav-item"><a class="nav-link text-dark px-4" href="/">首頁</a></li>
	                <li class="nav-item"><a class="nav-link text-dark px-4" href="#!">關於我們</a></li>
	                <li class="nav-item"><a class="nav-link text-dark px-4" href="@{/frontend/product/listAll}">商城</a></li>
	                <li class="nav-item"><a class="nav-link text-dark px-4" href="/front/attr/search">景點探索</a></li>
	                <li class="nav-item"><a class="nav-link text-dark px-4" href="#!">主題推薦</a></li>
	                <li class="nav-item"><a class="nav-link text-dark px-4" th:href="@{/trip/my-trips}">我的行程</a></li>
	                <li class="nav-item"><a class="nav-link text-dark px-4" href="/front/favorite/list">我的收藏</a></li>
	                <li class="nav-item"><a class="nav-link text-dark px-4" href="#!">客服中心</a></li>
	            </ul>
	        </div>
	    </nav>
	</header>
	<!-- ================= -->
	
	
    <div class="register-card">
        <h2>會員註冊</h2>
        
        <!-- 全域錯誤訊息提示（像是 Service 拋出的帳號重複） -->
        <div class="global-error" th:if="${errorMsg != null}" th:text="${errorMsg}"></div>

        <!-- 🎯 th:object="${custVO}"：綁定 Controller 傳過來的會員物件 -->
        <form th:action="@{/customer/register}" th:object="${newCust}" method="post">
            
            <!-- 帳號 -->
            <div class="form-group">
                <label for="custAccount">會員帳號</label>
                <!-- 🎯 th:field="*{custAccount}" 等同於 id="custAccount" name="custAccount" 並且會自動帶入舊值 -->
                <input type="text" th:field="*{custAccount}" placeholder="請輸入 3~32 碼大小寫英文或數字">
                <!-- 🎯 如果此欄位有驗證錯誤，則印出 VO 內的 message -->
                <span class="error-text" th:if="${#fields.hasErrors('custAccount')}" th:errors="*{custAccount}"></span>
            </div>

            <!-- 密碼 -->
            <div class="form-group">
                <label for="custPassword">會員密碼</label>
                <div class="password-wrapper"></div> <!-- 新增wrapper外框，方便做定位 -->
                <input type="password" th:field="*{custPassword}" placeholder="8~20碼，必須包含大小寫英文字母">
                <span class="error-text" th:if="${#fields.hasErrors('custPassword')}" th:errors="*{custPassword}"></span>
            </div>

            <!-- 姓名 -->
            <div class="form-group">
                <label for="custName">真實姓名</label>
                <input type="text" th:field="*{custName}" placeholder="請輸入您的姓名">
                <span class="error-text" th:if="${#fields.hasErrors('custName')}" th:errors="*{custName}"></span>
            </div>

            <!-- 性別 -->
            <div class="form-group">
                <label>性別</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" th:field="*{custSex}" value="M"> 男
                    </label>
                    <label class="radio-option">
                        <input type="radio" th:field="*{custSex}" value="F"> 女
                    </label>
                    <label class="radio-option">
                        <input type="radio" th:field="*{custSex}" value="不透露"> 不透露
                    </label>
                </div>
                <span class="error-text" th:if="${#fields.hasErrors('custSex')}" th:errors="*{custSex}"></span>
            </div>

            <!-- 電話 -->
            <div class="form-group">
                <label for="custTel">手機號碼</label>
                <input type="tel" th:field="*{custTel}" placeholder="例如: 0912345678">
                <span class="error-text" th:if="${#fields.hasErrors('custTel')}" th:errors="*{custTel}"></span>
            </div>

            <!-- 電子郵件 -->
            <div class="form-group">
                <label for="custEmail">電子郵件 (Email)</label>
                <input type="text" th:field="*{custEmail}" placeholder="例如: user@example.com">
                <span class="error-text" th:if="${#fields.hasErrors('custEmail')}" th:errors="*{custEmail}"></span>
            </div>

            <!-- 身分證字號 -->
            <div class="form-group">
                <label for="custIdCard">身分證字號</label>
                <input type="text" th:field="*{custIdCard}" placeholder="例如: A123456789">
                <span class="error-text" th:if="${#fields.hasErrors('custIdCard')}" th:errors="*{custIdCard}"></span>
            </div>

            <!-- 生日 -->
            <div class="form-group">
                <label for="custBirthday">出生日期</label>
                <input type="date" th:field="*{custBirthday}">
                <span class="error-text" th:if="${#fields.hasErrors('custBirthday')}" th:errors="*{custBirthday}"></span>
            </div>

            <!-- 地址 -->
            <div class="form-group">
                <label for="custAddress">聯絡地址</label>
                <input type="text" th:field="*{custAddress}" placeholder="請輸入您的地址(選填)">
                <span class="error-text" th:if="${#fields.hasErrors('custAddress')}" th:errors="*{custAddress}"></span>
            </div>

            <button type="submit" class="submit-btn">立即註冊</button>
        </form>

        <div class="login-link">
            已有帳號？ <a th:href="@{/customer/login}">立即登入</a>
        </div>
    </div>

    <!-- Bootstrap core JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
