<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員註冊</title>
    <!-- 同首頁的導覽列 -->
	<link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
	<link href="/css/styles.css" rel="stylesheet" />
	<!-- 加入 Flatpickr 日期選擇器的 CSS -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
	<!-- ========== -->
    <style>
    
        :root {
            --primary-color: #ff5722;
            --primary-hover: #e64a19;
            --bg-gradient: linear-gradient(135deg, #fff5f2 0%, #f4f7f6 100%);
            --card-bg: #ffffff;
            --error-color: #ef4444;
        }
        body {
            margin: 0;
            padding: 120px 20px 40px;
            display: flex;
            justify-content: center;
            /* align-items: center; 移除了垂直置中，避免表單過長時頂部被切掉 */
            min-height: 100vh;
            background: var(--bg-gradient);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-sizing: border-box;
        }
        .register-card {
            background: var(--card-bg);
            padding: 3rem 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 87, 34, 0.08);
            border: 1px solid #feede8;
            width: 100%;
            max-width: 520px;
            /* 讓表單在高度足夠時居中，高度不夠時正常捲動 */
            margin: auto; 
        }
        .register-card h2 {
            margin-top: 0;
            color: #1f2937;
            font-size: 2.2rem;
            margin-bottom: 2rem;
            text-align: center;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            color: #4b5563;
            font-size: 1.1rem;
            font-weight: 600;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 1rem;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(255, 87, 34, 0.15);
        }
        /* 性別 Radio 群組樣式 */
        .radio-group {
            display: flex;
            gap: 1.5rem;
            padding: 0.5rem 0;
        }
        .radio-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: #4b5563;
        }
        .radio-option input {
            width: auto;
            cursor: pointer;
        }
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            margin-top: 2rem;
            letter-spacing: 1px;
        }
        .submit-btn:hover {
            background-color: var(--primary-hover);
        }
        .submit-btn:active {
            transform: scale(0.98);
        }
        /* 密碼顯示/隱藏圖示樣式 */
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 40px;
        }
        .eye-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            user-select: none;
            color: #64748b;
            font-size: 1.2rem;
            transition: color 0.2s;
        }
        .eye-icon:hover {
            color: var(--primary-color);
        }
        /* 欄位下方的紅字錯誤提示 */
        .error-text {
            color: var(--error-color);
            font-size: 0.8rem;
            margin-top: 0.25rem;
            display: block;
        }
        /* 整張表單上方的全域錯誤（例如：帳號重複） */
        .global-error {
            color: var(--error-color);
            background-color: #fef2f2;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            text-align: center;
        }
        .login-link {
            text-align: center;
            margin-top: 2rem;
            font-size: 1.1rem;
        }
        .login-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
	<!-- 同首頁的導覽列 -->
	<!-- 組合式固定導覽列 (整合主選單與次選單) -->
	<header th:replace="~{layouts/frontend :: navbar}"></header>
	<!-- ================= -->
	
	
    <div class="register-card">
        <h2>會員註冊</h2>
        
        <!-- 全域錯誤訊息提示（像是 Service 拋出的帳號重複） -->
        <div class="global-error" th:if="${errorMsg != null}" th:text="${errorMsg}"></div>

        <!-- 🎯 th:object="${custVO}"：綁定 Controller 傳過來的會員物件 -->
        <form th:action="@{/customer/register}" th:object="${newCust}" method="post">
            
            <!-- 帳號 -->
            <div class="form-group">
                <label for="custAccount">會員帳號</label>
                <!-- 🎯 th:field="*{custAccount}" 等同於 id="custAccount" name="custAccount" 並且會自動帶入舊值 -->
                <input type="text" th:field="*{custAccount}" placeholder="請輸入 3~32 碼大小寫英文或數字">
                <!-- 🎯 如果此欄位有驗證錯誤，則印出 VO 內的 message -->
                <span class="error-text" th:if="${#fields.hasErrors('custAccount')}" th:errors="*{custAccount}"></span>
            </div>

            <!-- 密碼 -->
            <div class="form-group">
                <label for="custPassword">會員密碼</label>
                <div class="password-wrapper">
                    <input type="password" th:field="*{custPassword}" placeholder="8~20碼，必須包含大小寫英文字母">
                    <i id="togglePassword" class="bi bi-eye eye-icon"></i>
                </div>
                <span class="error-text" th:if="${#fields.hasErrors('custPassword')}" th:errors="*{custPassword}"></span>
            </div>

            <!-- 姓名 -->
            <div class="form-group">
                <label for="custName">真實姓名</label>
                <input type="text" th:field="*{custName}" placeholder="請輸入您的姓名">
                <span class="error-text" th:if="${#fields.hasErrors('custName')}" th:errors="*{custName}"></span>
            </div>

            <!-- 性別 -->
            <div class="form-group">
                <label>性別</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" th:field="*{custSex}" value="M"> 男
                    </label>
                    <label class="radio-option">
                        <input type="radio" th:field="*{custSex}" value="F"> 女
                    </label>
                    <label class="radio-option">
                        <input type="radio" th:field="*{custSex}" value="不透露"> 不透露
                    </label>
                </div>
                <span class="error-text" th:if="${#fields.hasErrors('custSex')}" th:errors="*{custSex}"></span>
            </div>

            <!-- 電話 -->
            <div class="form-group">
                <label for="custTel">手機號碼</label>
                <input type="tel" th:field="*{custTel}" placeholder="例如: 0912345678">
                <span class="error-text" th:if="${#fields.hasErrors('custTel')}" th:errors="*{custTel}"></span>
            </div>

            <!-- 電子郵件 -->
            <div class="form-group">
                <label for="custEmail">電子郵件 (Email)</label>
                <input type="text" th:field="*{custEmail}" placeholder="例如: user@example.com">
                <span class="error-text" th:if="${#fields.hasErrors('custEmail')}" th:errors="*{custEmail}"></span>
            </div>

            <!-- 身分證字號 -->
            <div class="form-group">
                <label for="custIdCard">身分證字號</label>
                <input type="text" th:field="*{custIdCard}" placeholder="例如: A123456789">
                <span class="error-text" th:if="${#fields.hasErrors('custIdCard')}" th:errors="*{custIdCard}"></span>
            </div>

            <!-- 生日 -->
            <div class="form-group">
                <label for="custBirthday">出生日期</label>
                <!-- 改成 type="text" 並加上 placeholder，讓使用者可以自己打 -->
                <input type="text" id="custBirthdayInput" th:field="*{custBirthday}" placeholder="例如: 1990-01-01">
                <span class="error-text" th:if="${#fields.hasErrors('custBirthday')}" th:errors="*{custBirthday}"></span>
            </div>

            <!-- 地址 -->
            <div class="form-group">
                <label for="custAddress">聯絡地址</label>
                <input type="text" th:field="*{custAddress}" placeholder="請輸入您的地址(選填)">
                <span class="error-text" th:if="${#fields.hasErrors('custAddress')}" th:errors="*{custAddress}"></span>
            </div>

            <button type="submit" class="submit-btn">立即註冊</button>
        </form>

        <div class="login-link">
            已有帳號？ <a th:href="@{/customer/login}">立即登入</a>
        </div>
    </div>

    <!-- Bootstrap core JS-->
    <th:block th:replace="~{layouts/frontend :: scripts}"></th:block>
    
    <!-- 加入 Flatpickr 日期選擇器的 JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        // 初始化生日欄位的日期選擇器
        flatpickr("#custBirthdayInput", {
            dateFormat: "Y-m-d", // 規定送出的格式為 YYYY-MM-DD
            allowInput: true     // 開啟「允許手動打字輸入」功能！
        });
    </script>
    <!-- 密碼顯示/隱藏切換功能 -->
    <script>
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('custPassword');

        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', function () {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                this.classList.toggle('bi-eye');
                this.classList.toggle('bi-eye-slash');
            });
        }
    </script>
</body>
</html>
