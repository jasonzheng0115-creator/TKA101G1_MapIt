<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員登入</title>
    <!-- 同首頁的導覽列 -->
	<link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
	<link href="/css/styles.css" rel="stylesheet" />
	<!-- ========== -->
    <style>
        
        :root {
            --primary-color: #ff5722;
            --primary-hover: #e64a19;
            --bg-gradient: linear-gradient(135deg, #fff5f2 0%, #f4f7f6 100%);
            --card-bg: #ffffff;
        }
        body {
            margin: 0;
            padding: 120px 20px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            box-sizing: border-box;
        }
        .login-card {
            background: var(--card-bg);
            padding: 3rem 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 87, 34, 0.08);
            border: 1px solid #feede8;
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        .login-card h2 {
            margin-top: 0;
            color: #1f2937;
            font-size: 2.2rem;
            margin-bottom: 2rem;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            color: #4b5563;
            font-size: 1.1rem;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            margin-top: 1.5rem;
            letter-spacing: 1px;
        }
        .submit-btn:hover {
            background-color: var(--primary-hover);
        }
        .submit-btn:active {
            transform: scale(0.98);
        }
        .error-message {
            color: #ef4444;
            background-color: #fef2f2;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            /* 預設讓他顯示，寫好 Thymeleaf 判斷後，沒有錯誤時就會隱藏 */
        }
        .register-link { /* 註冊連結容器的樣式 */
            text-align: center;
            margin-top: 2rem;
            font-size: 1.1rem;
        }
        .register-link a { /* 容器內的超連結樣式 */
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
        .register-link a:hover { /* 滑鼠懸停在超連結上的效果 */
            text-decoration: underline;
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 40px;
        }
        .eye-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            user-select: none;
            color: #64748b;
            font-size: 1.2rem;
            transition: color 0.2s;
        }
        .eye-icon:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>
	<!-- 首頁非會員狀態導覽列 -->
	<!-- 組合式固定導覽列 (整合主選單與次選單) -->
	<header th:replace="~{layouts/frontend :: navbar}"></header>
	
    <div class="login-card">
        <h2>會員登入</h2>
        
        <!--在這裡加上 Thymeleaf 的 th:action 對齊 Controller -->
        <form action="#" method="post" th:action="@{/customer/loginCheck}">
            
            <!--在這裡加上 Thymeleaf 判斷 model 裡的 "error" 字串是否存在，並印出內容 -->
            <div class="error-message" th:if="${errorMsg != null}" th:text="${errorMsg}"></div>
            
            <!-- 只有在帳號未驗證 (showResendBtn 為 true) 時才會顯示 -->
            <div th:if="${showResendBtn}" style="text-align: center; margin-bottom: 1.5rem;">
                <a th:href="@{/customer/resendVerify}" class="btn btn-outline-danger rounded-pill px-4 fw-bold shadow-sm" style="text-decoration: none;">
                    <i class="bi bi-envelope-check-fill"></i> 點擊此處重新發送驗證信
                </a>
            </div>

            <div class="form-group">
                <label for="custAccount">帳號</label>
                <!-- 注意：name 屬性必須跟 Controller 裡的 @RequestParam 完全一致 -->
                <input type="text" id="custAccount" name="custAccount" placeholder="請輸入帳號">
            </div>

            <div class="form-group">
                <label for="custPassword">密碼</label>
                <div class="password-wrapper">
                    <input type="password" id="custPassword" name="custPassword" placeholder="請輸入密碼">
                    <i id="togglePassword" class="bi bi-eye eye-icon"></i>
                </div>
                <!-- 忘記密碼連結 -->
                <div style="text-align: right; margin-top: 0.5rem;">
                    <a th:href="@{/customer/forgotPassword}" style="color: var(--primary-color); text-decoration: none; font-size: 0.95rem;">忘記密碼？</a>
                </div>
            </div>

            <button type="submit" class="submit-btn">會員登入</button>
            <!-- 待完成的功能 -->
           <!--  <button type="submit" class="submit-btn">第三方登入-待完成</button> -->
            
            <div
            style="text-align: center; margin-top: 2rem; font-size: 1.1rem;">
   			 還沒有帳號？ <a th:href="@{/customer/register}" style="color: var(--primary-color); text-decoration: none; font-weight: 600; hover: underline;">立即註冊</a>
			</div>
			
        </form>
    </div>
    <script>
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('custPassword');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });
    </script>
    <!-- Bootstrap core JS-->
    <th:block th:replace="~{layouts/frontend :: scripts}"></th:block>
</body>
</html>
