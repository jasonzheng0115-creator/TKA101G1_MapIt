<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員登入</title>
    <!-- 同首頁的導覽列 -->
	<link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
	<link href="/css/styles.css" rel="stylesheet" />
	<!-- ========== -->
    <style>
        
        :root {
            --primary-color: #ff5722;
            --primary-hover: #e64a19;
            --bg-gradient: linear-gradient(135deg, #fff5f2 0%, #f4f7f6 100%);
            --card-bg: #ffffff;
        }
        body {
            margin: 0;
            padding: 120px 20px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            box-sizing: border-box;
        }
        .login-card {
            background: var(--card-bg);
            padding: 3rem 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 87, 34, 0.08);
            border: 1px solid #feede8;
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        .login-card h2 {
            margin-top: 0;
            color: #1f2937;
            font-size: 2.2rem;
            margin-bottom: 2rem;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            color: #4b5563;
            font-size: 1.1rem;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            margin-top: 1.5rem;
            letter-spacing: 1px;
        }
        .submit-btn:hover {
            background-color: var(--primary-hover);
        }
        .submit-btn:active {
            transform: scale(0.98);
        }
        .error-message {
            color: #ef4444;
            background-color: #fef2f2;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            /* 預設讓他顯示，寫好 Thymeleaf 判斷後，沒有錯誤時就會隱藏 */
        }
        .register-link { /* 註冊連結容器的樣式 */
            text-align: center;
            margin-top: 2rem;
            font-size: 1.1rem;
        }
        .register-link a { /* 容器內的超連結樣式 */
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
        .register-link a:hover { /* 滑鼠懸停在超連結上的效果 */
            text-decoration: underline;
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 40px;
        }
        .eye-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            user-select: none;
            font-size: 1.25rem;
            color: #6b7280;
        }
    </style>
</head>
<body>
	<!-- 首頁非會員狀態導覽列 -->
	<header class="fixed-top bg-white shadow-sm" style="z-index: 1030;">
	    <nav class="navbar navbar-expand-lg navbar-light border-bottom py-2">
	        <div class="container px-4 px-lg-5">
	            <a class="navbar-brand fw-bold fs-3" href="/" style="color: #ff5722;">旅圖 | MapIt</a>
	            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
	                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
	                aria-expanded="false" aria-label="Toggle navigation">
	                <span class="navbar-toggler-icon"></span>
	            </button>
	            <div class="collapse navbar-collapse" id="navbarSupportedContent">
	                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center" style="font-size: 0.9rem;">
	
	                    <li class="nav-item">
	                        <a class="nav-link text-secondary px-3" th:href="@{/cart/show}">
	                            <i class="bi bi-cart3"></i> 購物車
	                        </a>
	                    </li>
	
	                    <li class="nav-item ms-lg-2">
	                        <a class="btn btn-warning btn-sm rounded-pill px-3 fw-bold shadow-sm" style="background-color: #ff5722; color: white; border: none;"
	                            th:href="@{/customer/login}">註冊 / 登入</a>
	                    </li>
	                </ul>
	            </div>
	        </div>
	    </nav>
	
	    <nav class="sub-navbar bg-white py-1">
	        <div class="container px-4 px-lg-5">
	            <ul class="nav justify-content-center fw-bold">
	                <li class="nav-item"><a class="nav-link text-dark px-4" href="/">首頁</a></li>
	                <li class="nav-item"><a class="nav-link text-dark px-4" href="#!">關於我們</a></li>
	                <li class="nav-item"><a class="nav-link text-dark px-4" th:href="@{/frontend/product/listAll}">商城</a></li>
	                <li class="nav-item"><a class="nav-link text-dark px-4" href="/front/attr/search">景點探索</a></li>
	                <li class="nav-item"><a class="nav-link text-dark px-4" href="#!">主題推薦</a></li>
	                <li class="nav-item"><a class="nav-link text-dark px-4" th:href="@{/trip/my-trips}">我的行程</a></li>
	                <li class="nav-item"><a class="nav-link text-dark px-4" href="/front/favorite/list">我的收藏</a></li>
	                <li class="nav-item"><a class="nav-link text-dark px-4" href="/contact">客服中心</a></li>
	            </ul>
	        </div>
	    </nav>
	</header>
	
    <div class="login-card">
        <h2>會員登入</h2>
        
        <!--在這裡加上 Thymeleaf 的 th:action 對齊 Controller -->
        <form action="#" method="post" th:action="@{/customer/loginCheck}">
            
            <!--在這裡加上 Thymeleaf 判斷 model 裡的 "error" 字串是否存在，並印出內容 -->
            <div class="error-message" th:if="${errorMsg != null}" th:text="${errorMsg}">
                
            </div>

            <div class="form-group">
                <label for="custAccount">帳號</label>
                <!-- 注意：name 屬性必須跟 Controller 裡的 @RequestParam 完全一致 -->
                <input type="text" id="custAccount" name="custAccount" placeholder="請輸入帳號">
            </div>

            <div class="form-group">
                <label for="custPassword">密碼</label>
                <div class="password-wrapper">
                    <input type="password" id="custPassword" name="custPassword" placeholder="請輸入密碼">
                    <span id="togglePassword" class="eye-icon">😐</span>
                </div>
            </div>

            <button type="submit" class="submit-btn">會員登入</button>
            <!-- 待完成的功能 -->
            <button type="submit" class="submit-btn">第三方登入-待完成</button>
            
            <div
            style="text-align: center; margin-top: 2rem; font-size: 1.1rem;">
   			 還沒有帳號？ <a th:href="@{/customer/register}" style="color: var(--primary-color); text-decoration: none; font-weight: 600; hover: underline;">立即註冊</a>
			</div>
			
        </form>
    </div>
    <script>
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('custPassword');

        togglePassword.onclick = function() {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            this.textContent = type === 'password' ? '😐' : '😑';
        };
    </script>
    <!-- Bootstrap core JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
