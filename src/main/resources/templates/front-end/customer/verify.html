<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信箱驗證</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="/css/styles.css" rel="stylesheet" />
    <style>
        :root {
            --primary-color: #ff5722;
            --primary-hover: #e64a19;
            --bg-gradient: linear-gradient(135deg, #fff5f2 0%, #f4f7f6 100%);
            --card-bg: #ffffff;
        }
        body {
            margin: 0;
            padding: 120px 20px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .login-card {
            background: var(--card-bg);
            padding: 3rem 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 87, 34, 0.08);
            border: 1px solid #feede8;
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        .login-card h2 {
            margin-top: 0;
            color: #1f2937;
            font-size: 2.2rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }
        .subtitle {
            color: #6b7280;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 2rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
            text-align: center;
            letter-spacing: 0.8rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(255, 87, 34, 0.1);
        }
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        .submit-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 87, 34, 0.2);
        }
        .error-message {
            color: #ef4444;
            background-color: #fef2f2;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border: 1px solid #fee2e2;
        }
    </style>
</head>
<body>

	<!-- 首頁非會員狀態導覽列 -->
	<!-- 組合式固定導覽列 (整合主選單與次選單) -->
	<header th:replace="~{layouts/frontend :: navbar}"></header>

    <div class="login-card">
        <h2>信箱驗證</h2>
        <p class="subtitle">我們已經將 6 位數驗證碼寄到您的信箱：<br>
            <strong style="color: var(--primary-color);" th:text="${session.verifyEmail}"></strong><br>
            請在下方輸入驗證碼以啟用帳號
        </p>
        
        <!-- 表單送出時，用POST傳/customer/verify -->
        <form method="post" th:action="@{/customer/verify}">
            <!-- 用來顯示錯誤訊息 -->
            <div class="error-message" 
            	 th:if="${errorMsg != null}" th:text="${errorMsg}">
            </div>

            <div class="form-group">
                <!-- name="code"，是Controller接收的變數名稱 -->
                <input type="text" id="code" name="code" placeholder="000000" maxlength="6" required autocomplete="off">
            </div>
            <button type="submit" class="submit-btn">送出驗證碼</button>
        </form>
    </div>

    <!-- Bootstrap core JS-->
    <th:block th:replace="~{layouts/frontend :: scripts}"></th:block>
</body>
</html>
