<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>編輯行程 - 行程排版區</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(160deg, #E8ECF1 0%, #F5F3F0 50%, #EAE8E4 100%);
            min-height: 100vh;
            color: #3D4F5F;
            padding: 24px;
        }

        /* ===== 頂部資訊列 ===== */
        .header {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(123, 143, 161, 0.12);
            border-radius: 16px;
            padding: 24px 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(90, 122, 138, 0.06);
        }

        .trip-info h2 {
            font-size: 20px;
            font-weight: 500;
            color: #4A6274;
            margin-bottom: 6px;
        }

        .trip-info p {
            font-size: 13px;
            font-weight: 300;
            color: #8C9DAA;
        }

        .trip-info .status-tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 400;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        /* ===== 按鈕共用 ===== */
        .btn {
            display: inline-block;
            padding: 10px 20px;
            font-size: 13px;
            font-family: 'Noto Sans TC', sans-serif;
            font-weight: 400;
            text-decoration: none;
            border-radius: 20px;
            border: 1.5px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            color: white;
        }

        .btn-add {
            background: #7B8FA1;
            border-color: #7B8FA1;
        }

        .btn-add:hover {
            background: #6A7F91;
            box-shadow: 0 4px 16px rgba(123, 143, 161, 0.2);
            transform: translateY(-1px);
        }

        .btn-back {
            background: transparent;
            color: #8C9DAA;
            border-color: rgba(123, 143, 161, 0.25);
        }

        .btn-back:hover {
            background: rgba(123, 143, 161, 0.08);
            border-color: #7B8FA1;
            color: #5A7A8A;
        }

        /* ===== 主要內容區：左右分割 ===== */
        .main-container {
            display: flex;
            gap: 20px;
            height: 70vh;
        }

        .left-panel {
            flex: 1;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(123, 143, 161, 0.1);
            border-radius: 16px;
            padding: 24px;
            overflow-y: auto;
            box-shadow: 0 4px 20px rgba(90, 122, 138, 0.06);
        }

        .left-panel h3 {
            font-size: 15px;
            font-weight: 500;
            color: #4A6274;
            margin-bottom: 16px;
        }

        .right-panel {
            flex: 1;
            background: rgba(123, 143, 161, 0.06);
            border: 1px dashed rgba(123, 143, 161, 0.2);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #B4BCC3;
            font-size: 15px;
            font-weight: 300;
        }

        /* ===== 彈出視窗 (Modal) ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(61, 79, 95, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(123, 143, 161, 0.12);
            border-radius: 20px;
            padding: 32px;
            width: 540px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 12px 48px rgba(90, 122, 138, 0.15);
        }

        .modal-content h3 {
            font-size: 18px;
            font-weight: 500;
            color: #4A6274;
            margin-bottom: 20px;
        }

        .close-btn {
            position: absolute;
            top: 18px;
            right: 24px;
            font-size: 22px;
            cursor: pointer;
            color: #B4BCC3;
            transition: color 0.2s;
            background: none;
            border: none;
            font-family: inherit;
        }

        .close-btn:hover {
            color: #8B6060;
        }

        /* 搜尋框 */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 16px;
            font-size: 14px;
            font-family: 'Noto Sans TC', sans-serif;
            color: #3D4F5F;
            background: rgba(255, 255, 255, 0.7);
            border: 1.5px solid rgba(123, 143, 161, 0.2);
            border-radius: 10px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: #7B8FA1;
            box-shadow: 0 0 0 3px rgba(123, 143, 161, 0.1);
        }

        .search-box input::placeholder {
            color: #B4BCC3;
            font-weight: 300;
        }

        .btn-search {
            padding: 10px 20px;
            font-size: 13px;
            font-family: 'Noto Sans TC', sans-serif;
            font-weight: 400;
            color: #FFFFFF;
            background: #7B8FA1;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-search:hover {
            background: #6A7F91;
        }

        .search-results {
            margin-top: 15px;
            border-top: 1px solid rgba(123, 143, 161, 0.1);
            padding-top: 15px;
        }

        /* 拖拉景點卡片時的虛線佔位符樣式 */
        .sortable-ghost {
            opacity: 0.4;
            background-color: #E2E8F0 !important;
            border: 2px dashed #7B8FA1 !important;
        }
    </style>
</head>

<body>

    <!-- ====== 頂部資訊列 ====== -->
    <div class="header">
        <div class="trip-info">
            <div style="display: flex; gap: 12px; align-items: center; margin-bottom: 8px;">
                <!-- 行程名稱輸入框 -->
                <input type="text" id="tripNameInput" th:value="${trip.tripName}"
                    style="font-size: 20px; font-weight: 500; color: #4A6274; border: 1px solid #D1D8DD; background: rgba(255,255,255,0.5); padding: 4px 10px; border-radius: 6px; width: 300px; outline: none;">
                <!-- 儲存修改按鈕 -->
                <button class="btn btn-add" onclick="updateTripBasicInfo()"
                    style="padding: 6px 14px; font-size: 13px; border-radius: 6px;">💾 儲存行程</button>
            </div>
            <div style="display: flex; gap: 16px; align-items: center; font-size: 13px; color: #8C9DAA;">
                <div>
                    出發日期：
                    <!-- 日期輸入框 -->
                    <input type="date" id="tripDateInput" th:value="${trip.tripDate}"
                        style="padding: 4px; border: 1px solid #D1D8DD; border-radius: 4px; color: #4A6274; outline: none;">
                </div>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn btn-back" onclick="openCollabModal()"
                style="border-color: rgba(123, 143, 161, 0.25); color: #5A7A8A;">👥 旅遊群組管理</button>
            <button class="btn btn-add" onclick="openModal()">＋ 加入新景點</button>
            <a th:href="@{/trip/my-trips}" class="btn btn-back">← 返回列表</a>
        </div>

    </div>


    <!-- ====== 左右分割主內容 ====== -->
    <div class="main-container">
        <div class="left-panel">
            <h3>📍 行程明細</h3>
            <div id="tripItemList">
                <p style="color: #B4BCC3; font-weight: 300; text-align: center; padding: 40px 0;">
                    目前還沒有加入任何景點，請點擊上方按鈕開始搜尋
                </p>
            </div>
        </div>

        <div class="right-panel"
            style="padding: 0; display: block; overflow: hidden; border: none; background: transparent;">
            <!-- 🗺️ 實體地圖容器，設定寬高為 100% 撐滿右側面板 -->
            <div id="map"
                style="width: 100%; height: 100%; border-radius: 16px; box-shadow: 0 4px 20px rgba(90, 122, 138, 0.06);">
            </div>
        </div>

    </div>

    <!-- ====== 搜尋景點彈出視窗 ====== -->
    <div id="searchModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3>🔍 搜尋景點</h3>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="輸入景點關鍵字（例如：台北、台北101觀景台）">
                <button class="btn-search" onclick="searchAttractions()">搜尋</button>
            </div>

            <div id="searchResults" class="search-results">
                <p style="color: #B4BCC3; text-align: center; font-weight: 300;">請輸入關鍵字開始搜尋...</p>
            </div>
        </div>
    </div>

    <!-- ====== 👥 協作者管理彈出視窗 ====== -->
    <div id="collabModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="closeCollabModal()">&times;</span>
            <h3>👥 旅遊群組管理</h3>

            <!-- 🛠️ 新增協作者區塊 (只有擁有者可見，預設隱藏，由 JS 動態控制顯示) -->
            <!-- 🛠️ 新增協作者區塊 (只有擁有者可見，預設隱藏，由 JS 動態控制顯示) -->
            <div id="addCollabSection" style="margin-bottom: 20px; display: none;">
                <label style="font-size: 13px; color: #8C9DAA; display: block; margin-bottom: 8px;">🆕 邀請好友加入</label>
                <div class="search-box">
                    <div style="position: relative; flex: 1;">
                        <input type="text" id="collabAccountInput" placeholder="輸入好友的帳號 (Account)" autocomplete="off"
                            style="width: 100%;">
                        <!-- 下拉自動完成清單 -->
                        <div id="collabSuggestions"
                            style="display: none; position: absolute; top: 100%; left: 0; width: 100%; background: #ffffff; border: 1px solid rgba(123, 143, 161, 0.2); border-radius: 8px; box-shadow: 0 4px 12px rgba(90, 122, 138, 0.15); z-index: 1010; max-height: 200px; overflow-y: auto; margin-top: 4px;">
                        </div>
                    </div>
                    <button class="btn-search" onclick="addCollaborator()">新增</button>
                </div>
            </div>


            <!-- 協作者列表顯示區 -->
            <div style="border-top: 1px solid rgba(123, 143, 161, 0.1); padding-top: 15px;">
                <h4 style="font-size: 14px; color: #4A6274; margin-bottom: 12px;">群組成員列表</h4>
                <div id="collabList">
                    <p style="color: #B4BCC3; text-align: center; font-weight: 300;">⏳ 載入中，請稍候...</p>
                </div>
            </div>
        </div>
    </div>


    <!-- ====== JavaScript（加入 th:inline="javascript"，這樣才能在 JavaScript 中直接讀取 Thymeleaf 變數） ====== -->
    <script th:inline="javascript">
        const modal = document.getElementById('searchModal');
        const searchInput = document.getElementById('searchInput');

        // 💾 新增：定義地圖、標記與連線的全域變數
        let map = null;
        let markers = [];
        let polyline = null;
        let directionsRenderer = null;
        let directionsService = null;

        searchInput.addEventListener('keypress', function (event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                searchAttractions();
            }
        });

        function openModal() {
            modal.style.display = 'flex';
            searchInput.focus();
        }

        function closeModal() {
            modal.style.display = 'none';
            searchInput.value = '';
            document.getElementById('searchResults').innerHTML = '<p style="color: #B4BCC3; text-align: center; font-weight: 300;">請輸入關鍵字開始搜尋...</p>';
        }


        // 💡 取得當前使用者是否為行程擁有者的 boolean 值 (透過 Thymeleaf 傳遞進來)
        const isOwner = [[${ trip.custVO.custId == loginCustId }]];

        // ===== 👥 協作者管理彈出視窗控制 =====
        const collabModal = document.getElementById('collabModal');

        function openCollabModal() {
            collabModal.style.display = 'flex';
            // 動態判斷：如果是行程擁有者，才顯示「新增協作者區塊」
            if (isOwner) {
                document.getElementById('addCollabSection').style.display = 'block';
            }
            loadCollaborators(); // 載入協作者列表
        }

        function closeCollabModal() {
            collabModal.style.display = 'none';
            document.getElementById('collabAccountInput').value = '';
            document.getElementById('collabList').innerHTML = '<p style="color: #B4BCC3; text-align: center; font-weight: 300;">⏳ 載入中，請稍候...</p>';
        }

        // 💡 監聽整個視窗的點擊事件，當使用者點擊彈出視窗外面時，自動關閉該視窗
        window.onclick = function (event) {
            if (event.target == modal) {
                closeModal();
            } else if (event.target == collabModal) {
                closeCollabModal();
            }
        }

        // 1. 撈取該行程的成員清單 (GET)
        function loadCollaborators() {
            const urlParts = window.location.pathname.split('/');
            const tripId = urlParts[urlParts.length - 1];

            fetch(`/api/collabs/${tripId}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error("無法取得群組成員清單");
                    }
                    return response.json();
                })
                .then(data => {
                    const listDiv = document.getElementById('collabList');

                    if (data.length === 0) {
                        listDiv.innerHTML = '<p style="color: #B4BCC3; text-align: center; font-weight: 300; padding: 15px 0;">目前尚無其他成員加入此行程</p>';
                        return;
                    }

                    let html = '<ul style="list-style: none; padding: 0; margin: 0;">';
                    data.forEach(collab => {
                        html += `
                            <li style="display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(123, 143, 161, 0.08);">
                                <div>
                                    <span style="font-weight: 500; color: #4A6274;">${collab.custName}</span>
                                    <span style="font-size: 12px; color: #8C9DAA; margin-left: 8px;">(@${collab.custAccount})</span>
                                </div>
                        `;
                        // 💡 只有行程擁有者，才渲染出垃圾桶「移除」按鈕
                        if (isOwner) {
                            html += `
                                <button onclick="removeCollaborator(${collab.collabId})" 
                                        style="background: transparent; border: none; font-size: 16px; cursor: pointer; color: #c95c5c; padding: 4px;" 
                                        title="移除成員">🗑️</button>
                            `;
                        }
                        html += `</li>`;
                    });
                    html += '</ul>';
                    listDiv.innerHTML = html;
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('collabList').innerHTML = '<p style="color: #8B6060; text-align: center;">系統異常，載入失敗！</p>';
                });
        }

        // 2. 新增協作者 (POST)
        function addCollaborator() {
            const urlParts = window.location.pathname.split('/');
            const tripId = urlParts[urlParts.length - 1];
            const accountInput = document.getElementById('collabAccountInput');
            const custAccount = accountInput.value.trim();

            if (!custAccount) {
                alert("⚠️ 請輸入朋友的帳號！");
                return;
            }

            // 發送非同步 POST 請求，傳遞 JSON 包裹給後端 CollabApiController
            fetch(`/api/collabs/${tripId}/add`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    custAccount: custAccount
                })
            })
                .then(response => {
                    if (response.ok) {
                        alert("🎉 新增好友成功！");
                        accountInput.value = ''; // 新增成功後，將輸入欄位清空
                        document.getElementById('collabSuggestions').style.display = 'none'; // 💾 隱藏選單
                        loadCollaborators(); // 重新撈取名單以重新渲染畫面
                    } else {
                        // 若失敗，取得後端傳過來的文字訊息 (如：找不到此帳號) 並拋出錯誤
                        return response.text().then(text => { throw new Error(text) });
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert("❌ 新增失敗：" + error.message);
                });
        }

        // 3. 移除協作者 (DELETE)
        function removeCollaborator(collabId) {
            if (!confirm("⚠️ 確定要將此會員從成員名單中移除嗎？")) {
                return;
            }

            // 發送非同步 DELETE 請求給後端 CollabApiController
            fetch(`/api/collabs/${collabId}`, {
                method: 'DELETE'
            })
                .then(response => {
                    if (response.ok) {
                        alert("🗑️ 成員已成功移除！");
                        loadCollaborators(); // 重新撈取名單以重新渲染畫面
                    } else {
                        return response.text().then(text => { throw new Error(text) });
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert("❌ 移除失敗：" + error.message);
                });
        }



        function searchAttractions() {
            const keyword = document.getElementById('searchInput').value;
            const resultsDiv = document.getElementById('searchResults');

            if (!keyword.trim()) {
                resultsDiv.innerHTML = '<p style="color: #8B6060; text-align: center;">請輸入關鍵字！</p>';
                return;
            }

            resultsDiv.innerHTML = '<p style="color: #8C9DAA; text-align: center; font-weight: 300;">⏳ 搜尋中，請稍候...</p>';

            fetch(`/api/attractions/search?keyword=${keyword}`)
                .then(response => response.json())
                .then(data => {
                    if (data.length === 0) {
                        resultsDiv.innerHTML = '<p style="color: #8C9DAA; text-align: center; font-weight: 300;">找不到相關景點，換個關鍵字試試看？</p>';
                        return;
                    }

                    let html = '<ul style="list-style: none; padding: 0; margin: 0;">';

                    data.forEach(attr => {
                        const openTimeHtml = getOpenStatusHtml(attr.openTime);

                        html += `
                        <li style="border-bottom: 1px solid rgba(123,143,161,0.1); padding: 16px 0; display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <h4 style="margin: 0 0 5px 0; color: #4A6274; font-weight: 500; font-size: 15px;">
                                    ${attr.attrName}
                                    <span style="font-size: 12px; color: #C4A35A;">⭐ ${attr.avgStars} (${attr.attrVotes}人評分)</span>
                                </h4>
                                <p style="margin: 0; font-size: 13px; color: #8C9DAA; font-weight: 300;">📍 ${attr.regionId} | ${attr.categoryId}</p>
                                <p style="margin: 4px 0 0 0; font-size: 12px; color: #B4BCC3; font-weight: 300;">${attr.attrAddress}</p>
                                <p style="margin: 4px 0 0 0; font-size: 12px;">🕒 ${openTimeHtml}</p>
                            </div>
                            <button class="btn btn-add" style="padding: 7px 16px; font-size: 12px;"
                                    onclick="addArrcToTrip(${attr.attrId})">加入</button>
                        </li>
                    `;
                    });

                    html += '</ul>';
                    resultsDiv.innerHTML = html;
                })
                .catch(error => {
                    console.error('Error:', error);
                    resultsDiv.innerHTML = '<p style="color: #8B6060; text-align: center;">系統發生異常，請稍後再試！</p>';
                });
        }

        function addArrcToTrip(attrId) {
            const urlParts = window.location.pathname.split('/');
            const tripId = urlParts[urlParts.length - 1];

            const formData = new FormData();
            formData.append('tripId', tripId);
            formData.append('attrId', attrId);

            fetch('/api/trip-items/add', {
                method: 'POST',
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        closeModal();
                        loadTripItems();
                    } else {
                        alert("❌ 發生錯誤：" + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert("❌ 連線異常，請稍後再試！");
                });
        }

        function loadTripItems() {
            const urlParts = window.location.pathname.split('/');
            const tripId = urlParts[urlParts.length - 1];

            fetch(`/api/trip-items/${tripId}`)
                .then(response => response.json())
                .then(data => {
                    const listDiv = document.getElementById('tripItemList');

                    if (data.length === 0) {
                        listDiv.innerHTML = '<p style="color: #B4BCC3; font-weight: 300; text-align: center; padding: 40px 0;">目前還沒有加入任何景點，請點擊上方按鈕開始搜尋</p>';
                        return;
                    }

                    let html = '';
                    data.forEach((item, index) => {
                        html += `
                        <div class="trip-item-card" data-id="${item.itemId}" style="background: rgba(255,255,255,0.55); border: 1px solid rgba(123,143,161,0.12); padding: 18px 20px; margin-bottom: 12px; border-left: 4px solid #7B8FA1; border-radius: 12px; transition: all 0.3s ease; display: flex; flex-direction: column;">
                            
                            <!-- 1. 到達時間 (最上層) -->
                            <div style="margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
                                <span style="font-size: 12px; color: #8C9DAA; min-width: 65px; font-weight: 500;">🕒 到達時間</span>

        let sortableInstance = null;
        function initSortable() {
            const listDiv = document.getElementById('tripItemList');
            // 如果原本已經有 Sortable 實體，先銷毀它以防重複綁定產生衝突
            if (sortableInstance) {
                sortableInstance.destroy();
            }

            // 初始化拖拉功能
            sortableInstance = Sortable.create(listDiv, {
                animation: 250, // 卡片滑移的動畫速度 (毫秒)
                handle: '.drag-handle', // 限制只有按在數字圓圈上才能拖拉，防範誤觸
                ghostClass: 'sortable-ghost', // 套用拖曳時的虛線外觀樣式
                onEnd: function () {
                    // 當使用者拖曳結束放開滑鼠時，立刻向後端發送最新排序
                    saveNewOrder();
                }
            });
        }

        function saveNewOrder() {
            const listDiv = document.getElementById('tripItemList');
            const cards = listDiv.getElementsByClassName('trip-item-card');
            const itemIds = [];

            // 依據目前網頁卡片的可見順序，收集所有 itemId
            for (let card of cards) {
                itemIds.push(parseInt(card.getAttribute('data-id'), 10));
            }

            // 發送非同步 POST 請求至後端 Controller 更新 seqNo
            fetch('/api/trip-items/reorder', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(itemIds)
            })
                .then(response => {
                    if (response.ok) {
                        // 排序儲存成功，重新載入明細，自動刷新圓圈的 seqNo 數字
                        loadTripItems();
                    } else {
                        return response.text().then(text => { throw new Error(text) });
                    }
                })
                .catch(error => {
                    console.error('Error saving order:', error);
                    alert("❌ 儲存排序失敗：" + error.message);
                    loadTripItems(); // 若失敗，重載以復原卡片原本位置
                });
        }

            })
                .then(response => {

                        loadTripItems();

                    }

        function onArrivalChange(itemId) {
            const arrInput = document.getElementById("arr_" + itemId);
            const depInput = document.getElementById("dep_" + itemId);
            if (arrInput && depInput) {
                // 自動預設同步
                depInput.value = arrInput.value;
                // 執行防呆校驗
                validateTimes(itemId);
            }
        }
        // 💾 步驟 4-A 新增：當離開時間被使用者手動修改時，進行防呆檢核

        // 💾 步驟 4-A 新增：時間防呆校驗核心邏輯 (檢核、變色、顯示警告)
        function validateTimes(itemId) {
            const arrInput = document.getElementById("arr_" + itemId);
            const depInput = document.getElementById("dep_" + itemId);
            if (!arrInput || !depInput) return true;
            const arrVal = arrInput.value;
            const depVal = depInput.value;
            const depLabel = depInput.previousElementSibling; // 取得 🕒 離開時間 的標題元素
            // 尋找是否已經有警告標語存在
            let warnSpan = document.getElementById("warn_" + itemId);
            // 檢查：離開時間不可早於到達時間
            if (arrVal && depVal && depVal < arrVal) {
                // 變更為紅色警告樣式
                depInput.style.borderColor = "#c95c5c";
                depInput.style.color = "#c95c5c";
                if (depLabel) {
                    depLabel.style.color = "#c95c5c";
                }
                // 如果還沒有顯示警告字眼，就動態建立一個
                if (!warnSpan) {
                    warnSpan = document.createElement("span");
                    warnSpan.id = "warn_" + itemId;
                    warnSpan.className = "time-warning-text";
                    warnSpan.style.color = "#c95c5c";
                    warnSpan.style.fontSize = "11px";
                    warnSpan.style.marginLeft = "8px";
                    warnSpan.style.fontWeight = "bold";
                    warnSpan.textContent = "⚠️ 離開時間不可早於到達時間！";
                    depInput.parentNode.appendChild(warnSpan);
                }
                return false;
            } else {
                // 恢復為原本正常的灰藍色樣式
                depInput.style.borderColor = "#D1D8DD";
                depInput.style.color = "#4A6274";
                if (depLabel) {
                    depLabel.style.color = "#8C9DAA";
                }
                // 移除警告標語
                if (warnSpan) {
                    warnSpan.remove();
                }
                return true;
            }
        }

        function getOpenStatusHtml(openTimeStr) {
            if (!openTimeStr) {
                return `<span style="color: #B4BCC3;">無營業時間資訊</span>`;
            }
            if (openTimeStr === '24小時開放') {
                return `<span style="color: #5A8A9E;">24小時開放</span>`;
            }
            if (openTimeStr === '已歇業') {
                return `<span style="color: #8B6060; font-weight: 500;">已歇業</span>`;
            }

            const timeRegex = /^(\d{2}):(\d{2})-(\d{2}):(\d{2})$/;
            const match = openTimeStr.match(timeRegex);

            if (match) {
                const now = new Date();
                const nowMin = now.getHours() * 60 + now.getMinutes();
                const startH = parseInt(match[1], 10);
                const startM = parseInt(match[2], 10);
                let endH = parseInt(match[3], 10);
                const endM = parseInt(match[4], 10);
                const startMin = startH * 60 + startM;
                let endMin = endH * 60 + endM;

                if (endH === 0 && endM === 0) {
                    endMin = 24 * 60;
                }

                let isOpen = false;
                if (startMin < endMin) {
                    isOpen = (nowMin >= startMin && nowMin < endMin);
                } else {
                    isOpen = (nowMin >= startMin || nowMin < endMin);
                }

                if (isOpen) {
                    return `<span style="color: #5A8A9E; font-weight: 500;">營業中</span> <span style="color: #5A8A9E;">${openTimeStr}</span>`;
                } else {
                    return `<span style="color: #8B6060; font-weight: 500;">已打烊</span> <span style="color: #8B6060;">${openTimeStr}</span>`;
                }
            }

            return `<span style="color: #B4BCC3;">${openTimeStr}</span>`;
        }

        // ===== 🗺️ Google Map 初始化方法 =====
        function initMap() {
            console.log("🗺️ Google Maps SDK 載入成功！");

            // 1. 建立 Google Map 物件
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 25.033964, lng: 121.564472 },
                zoom: 12,
                mapTypeControl: false,
                streetViewControl: false,
                styles: [
                    { featureType: "poi", stylers: [{ visibility: "off" }] },
                    { featureType: "transit", stylers: [{ visibility: "off" }] },
                    { featureType: "road", elementType: "labels.icon", stylers: [{ visibility: "off" }] },
                    { featureType: "road", elementType: "geometry", stylers: [{ color: "#EAEAEA" }] },
                    { featureType: "water", elementType: "geometry", stylers: [{ color: "#C9DDF2" }] },
                    { featureType: "landscape", elementType: "geometry", stylers: [{ color: "#F7F7F7" }] }
                ]
            });

            // 2. 💾 步驟 5-B 新增：初始化導航服務與渲染器，設定線條顏色不與地圖混色
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({
                map: map,
                suppressMarkers: true, // ⚠️ 非常重要：隱藏 Google 預設的 A、B 標記，因為我們要自己畫帶數字的標記！
                preserveViewport: false, // 讓地圖在載入導航線後自動縮放到最適合的範圍
                polylineOptions: {
                    strokeColor: "#4F46E5", // 使用高對比靛藍色，清晰明瞭
                    strokeOpacity: 0.85,
                    strokeWeight: 5
                }
            });

            // 3. 確定地圖與導航服務建立完畢，才去抓後端景點明細
            loadTripItems();
        }


        // ===== 🗺️ 步驟 4 新增：更新地圖標記與實際導航路線 =====
        function updateMapState(data) {
            // 1. 清除地圖上舊的標記 (Markers)
            markers.forEach(marker => marker.setMap(null));
            markers = [];

            // 2. 清除地圖上舊的導航路線
            if (directionsRenderer) {
                directionsRenderer.setDirections({ routes: [] });
            }

            if (!data || data.length === 0) {
                return;
            }

            // 3. 遍歷景點明細，建立我們的自訂數字標記 (Markers)
            const bounds = new google.maps.LatLngBounds();
            const points = []; // 用來存所有景點的 LatLng 格式座標

            data.forEach(item => {
                const position = {
                    lat: parseFloat(item.latitude),
                    lng: parseFloat(item.longitude)
                };
                points.push(position);
                bounds.extend(position);

                // 建立自訂數字標記
                const marker = new google.maps.Marker({
                    position: position,
                    map: map,
                    title: item.attrName,
                    label: {
                        text: String(item.seqNo), // 數字序號 (1, 2, 3...)
                        color: "#FFFFFF",
                        fontWeight: "bold",
                        fontSize: "14px"
                    }
                });
                markers.push(marker);
            });

            // 4. 根據景點數量，計算並繪製實際開車導航路線
            if (data.length === 1) {
                // 只有一個景點：地圖直接置中該景點
                map.setCenter(points[0]);
                map.setZoom(15);
            } else if (data.length >= 2) {
                // 兩個以上景點：準備導航請求
                const origin = points[0]; // 起點是第一個景點
                const destination = points[points.length - 1]; // 終點是最後一個景點
                const waypoints = []; // 中途景點陣列

                // 將第 2 個到倒數第 2 個景點塞入中途點 (Waypoints)
                for (let i = 1; i < points.length - 1; i++) {
                    waypoints.push({
                        location: points[i],
                        stopover: true // 指明這是一個必須停靠的站點，而不是路過
                    });
                }

                // 送出路網導航請求
                directionsService.route({
                    origin: origin,
                    destination: destination,
                    waypoints: waypoints,
                    travelMode: google.maps.TravelMode.DRIVING // 規劃開車路線
                }, function (response, status) {
                    if (status === google.maps.DirectionsStatus.OK) {
                        // 規劃成功：讓渲染器把美麗的靛藍色導航線畫在地圖上
                        directionsRenderer.setDirections(response);

                        // ==========================================
                        // 💾 步驟 2 新增：讀取各路段 (legs) 的車程時間並更新卡片資訊
                        // ==========================================
                        const legs = response.routes[0].legs; // 取得所有路段的車程陣列
                        for (let i = 0; i < legs.length; i++) {
                            const durationText = legs[i].duration.text; // 取得像是 "15 分鐘" 或 "約 53 分" 的字串

                            // 尋找對應索引的 HTML 容器並更新文字
                            const container = document.getElementById("transit_time_" + i);
                            if (container) {
                                const textSpan = container.querySelector(".transit-time-text");
                                if (textSpan) {
                                    textSpan.textContent = "約 " + durationText;
                                }
                            }
                        }
                        // ==========================================

                    } else {
                        console.error("導航路線規劃失敗，原因：" + status);
                        // 備用方案：若導航失敗，則用地圖邊界縮放，至少保證地圖顯示正常
                        map.fitBounds(bounds);

                        // ==========================================
                        // 💾 步驟 2 新增：若導航失敗，將所有時間改為「無法取得車程」
                        // ==========================================
                        const containers = document.querySelectorAll(".transit-time-container");
                        for (let i = 0; i < containers.length; i++) {
                            const textSpan = containers[i].querySelector(".transit-time-text");
                            if (textSpan) {
                                textSpan.textContent = "無法取得車程時間";
                            }
                        }
                        // ==========================================
                    }
                });

            }
        }
