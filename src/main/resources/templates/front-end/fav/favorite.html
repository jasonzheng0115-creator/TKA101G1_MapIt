<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
    <head>
        <th:block th:replace="~{layouts/frontend :: head}"></th:block>
        <title>我的收藏 - MapIt 旅遊平台</title>
        <style>
            .search-header {
                background: linear-gradient(135deg, #ffc107 0%, #ffb300 100%);
                color: white;
                padding: 1.25rem 2rem;
                border-radius: 12px;
                text-shadow: 0 1px 2px rgba(0,0,0,0.1);
            }
            
            .filter-card {
                background: white;
                border-radius: 12px;
                padding: 1.5rem;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                margin-bottom: 2rem;
            }
            
            .result-count {
                font-size: 1.1rem;
                color: #d39e00;
                font-weight: bold;
            }

            /* 覆蓋 Bootstrap 主要按鈕 (篩選、查看詳情) 的藍色 */
            .btn-primary {
                background-color: #ffc107 !important;
                border-color: #ffc107 !important;
                color: #212529 !important;
                font-weight: bold;
            }
            .btn-primary:hover, .btn-primary:focus, .btn-primary:active {
                background-color: #e0a800 !important;
                border-color: #e0a800 !important;
                color: #212529 !important;
                box-shadow: 0 4px 12px rgba(255, 193, 7, 0.2) !important;
            }

            /* 覆蓋分頁按鈕 */
            .page-link {
                color: #d39e00 !important;
                border-color: #dee2e6 !important;
            }
            .page-link:hover {
                color: #b38600 !important;
                background-color: #fffde7 !important;
                border-color: #dee2e6 !important;
            }
            .page-item.active .page-link {
                background-color: #ffc107 !important;
                border-color: #ffc107 !important;
                color: #212529 !important;
                font-weight: bold;
            }
            .page-item.disabled .page-link {
                color: #6c757d !important;
                background-color: #fff !important;
                border-color: #dee2e6 !important;
            }

            /* 手動控制會員下拉選單 */
            .nav-item.dropdown .dropdown-menu {
                display: none;
                margin-top: 8px;
            }
            .nav-item.dropdown .dropdown-menu.show {
                display: block;
            }
            .dropdown-item {
                transition: background-color 0.2s, color 0.2s;
            }
            .dropdown-item:hover {
                background-color: #fff5f2 !important;
                color: #ff5722 !important;
            }
            .dropdown-item:hover i {
                color: #ff5722 !important;
            }

            /* 巨型選單 (Megamenu) 樣式 */
            .sub-navbar {
                position: relative;
            }
            .megamenu-nav-item {
                position: static;
            }
            .megamenu-nav-item.position-relative {
                position: relative;
            }
            .megamenu-dropdown {
                width: 100%;
                left: 0;
                right: 0;
                top: 100%;
                display: none;
                position: absolute;
                background: white;
                box-shadow: 0 10px 30px rgba(0,0,0,0.12);
                border-top: 1px solid #f0f0f0;
                border-bottom: 4px solid #ff5722;
                padding: 20px 0;
                z-index: 1050;
            }
            .megamenu-nav-item:hover .megamenu-dropdown {
                display: block;
                animation: megamenuFade 0.25s ease-out;
            }
            @keyframes megamenuFade {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .megamenu-grid {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
                gap: 15px;
            }
            .megamenu-card {
                display: block;
                border-radius: 8px;
                overflow: hidden;
                background: #fafafa;
                border: 1px solid #eef0f2;
                transition: all 0.3s ease;
                text-align: center;
            }
            .megamenu-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 6px 15px rgba(0,0,0,0.1);
                border-color: #ff5722;
            }
            .megamenu-img-wrapper {
                width: 100%;
                height: 90px;
                overflow: hidden;
            }
            .megamenu-img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                transition: transform 0.5s ease;
            }
            .megamenu-card:hover .megamenu-img {
                transform: scale(1.08);
            }
            .megamenu-title {
                padding: 8px 5px;
                font-size: 0.9rem;
                font-weight: bold;
                color: #333;
                transition: color 0.3s ease;
            }
            .megamenu-card:hover .megamenu-title {
                color: #ff5722;
            }
            .region-link {
                transition: all 0.2s ease;
                font-size: 0.95rem;
                display: inline-block;
            }
            .region-link:hover {
                color: #ff5722 !important;
                transform: translateX(6px);
            }
        </style>
    </head>
    <body>
        <!-- 引用共用的前台導覽列 -->
        <header th:replace="~{layouts/frontend :: navbar}"></header>

        <!-- Header Container with Spacing to prevent overlap -->
        <div class="container" style="margin-top: 140px; margin-bottom: 2rem;">
            <div class="search-header">
                <h2 class="fw-bold mb-0" style="font-size: 1.75rem;">
                    <i class="bi bi-heart-fill"></i> 我的收藏
                </h2>
                <p class="lead mb-0 mt-2" style="font-size: 1.05rem; opacity: 0.9;">
                    您收藏的景點清單
                </p>
            </div>
        </div>

        <!-- ========== 收藏景點清單區塊 ========== -->
        <section class="py-5">
            <div class="container px-4 px-lg-5 mt-5">
                <!-- 如果沒有收藏景點，顯示提示訊息 -->
                <div th:if="${favoriteList == null || #lists.isEmpty(favoriteList)}" class="text-center py-5">
                    <i class="bi bi-heart" style="font-size: 5rem; color: #dee2e6;"></i>
                    <h3 class="mt-4 text-muted">目前沒有收藏的景點</h3>
                    <p class="text-muted">快去探索並收藏您喜歡的景點吧！</p>
                    <a href="/" class="btn btn-primary mt-3">
                        <i class="bi bi-house-door"></i> 回到首頁
                    </a>
                </div>

                <!-- 收藏景點卡片列表 -->
                <div class="row gx-4 gx-lg-5 row-cols-2 row-cols-md-3 row-cols-xl-4 justify-content-center">
    <div class="col mb-5 favorite-card-item" th:each="item : ${favoriteList}">
        <div class="card h-100" style="position: relative;">
            
            <div th:if="${item.attrVO?.avgStars != null && item.attrVO.avgStars >= 4.5}" 
                 class="badge bg-dark text-white position-absolute" 
                 style="top: 0.5rem; right: 0.5rem; z-index: 10;">熱門</div>
            
            <!-- 圖片顯示優先級：線上 imageUrl → 本地 imagePath → 預設圖 -->
            <img class="card-img-top" 
                 th:src="${item.attrVO.images != null && !#lists.isEmpty(item.attrVO.images)} 
                          ? (${item.attrVO.images.iterator().next().imageUrl != null && !#strings.isEmpty(item.attrVO.images.iterator().next().imageUrl)} 
                             ? ${item.attrVO.images.iterator().next().imageUrl} 
                             : (${item.attrVO.images.iterator().next().imagePath != null && !#strings.isEmpty(item.attrVO.images.iterator().next().imagePath)} 
                                ? '/attraction_images/' + ${item.attrVO.images.iterator().next().imagePath} 
                                : 'https://dummyimage.com/450x300/dee2e6/6c757d.jpg')) 
                          : 'https://dummyimage.com/450x300/dee2e6/6c757d.jpg'"
                 th:alt="${item.attrVO?.attrName}"
                 style="height: 300px; object-fit: cover;"
                 onerror="this.onerror=null; this.src='https://dummyimage.com/450x300/dee2e6/6c757d.jpg';" />
            
            <div class="card-body p-4">
                <div class="text-center">
                    <h5 class="fw-bolder" th:text="${item.attrVO?.attrName != null ? item.attrVO.attrName : '未命名景點'}">景點名稱</h5>
                    
                    <div th:if="${item.attrVO?.avgStars != null}" 
                         class="d-flex justify-content-center small text-warning mb-2">
                         <span th:text="'平均評分: ' + ${item.attrVO.avgStars}">0.0</span>
                    </div>
                    
                    <span th:text="${item.attrVO?.regionVO != null ? item.attrVO.regionVO.regionName : '未分類'}">地區</span>
                    <span> · </span>
                    <span th:text="${item.attrVO?.categoryVO != null ? item.attrVO.categoryVO.categoryName : '未分類'}">類別</span>
                </div>
            </div>
            
            <div class="card-footer p-4 pt-0 border-top-0 bg-transparent">
                <div class="text-center">
                    <a class="btn btn-primary mt-auto me-2" 
                       th:href="${item.attrVO?.attrId != null} ? '/front/attr/detail/' + ${item.attrVO.attrId} : '#'">
                        <i class="bi bi-eye"></i> 查看詳情
                    </a>
                    <button class="btn btn-danger mt-auto" 
                            th:attr="data-attr-id=${item.attrVO?.attrId}"
                            onclick="removeFromFavorite(this.getAttribute('data-attr-id'))">
                        <i class="bi bi-heart-fill"></i> 移除收藏
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

                <!-- Pagination Container -->
                <div id="favPaginationContainer" class="pagination-container"></div>
        </section>

        <!-- ========== 頁尾 (Footer) - 完全照抄 index.html ========== -->
        <footer class="py-5 bg-dark">
            <div class="container"><p class="m-0 text-center text-white">Copyright &copy; MapIt 2026 - TKA101G1</p></div>
        </footer>

        <!-- ========== JavaScript 區域 ========== -->
        <!-- 引用共用的前台 scripts -->
        <th:block th:replace="~{layouts/frontend :: scripts}"></th:block>
        
        <!-- 移除收藏功能的 JavaScript -->
        <script>
            /**
             * 移除收藏功能
             * @param {number} attrId - 景點 ID
             */
            function removeFromFavorite(attrId) {
                if (!attrId) {
                    console.error('❌ 景點 ID 不存在');
                    return;
                }
                
                // 確認是否要移除
                if (!confirm('確定要移除此景點的收藏嗎？')) {
                    return;
                }
                
                // 發送 POST 請求到後端
                fetch('/front/favorite/remove', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: 'attrId=' + attrId
                })
                .then(response => {
                    if (response.ok) {
                        alert('✅ 已成功移除收藏！');
                        // 重新載入頁面以更新清單
                        window.location.reload();
                    } else {
                        alert('❌ 移除收藏失敗，請稍後再試。');
                    }
                })
                .catch(error => {
                    console.error('❌ 發生錯誤:', error);
                    alert('❌ 發生錯誤，請稍後再試。');
                });
            }

            // 會員選單的專屬點擊控制與前端分頁實作
            document.addEventListener('DOMContentLoaded', function() {
                // 2. 我的收藏 - 前端分頁實作
                const itemsPerPage = 12; // 每頁顯示 12 筆景點
                const cards = document.querySelectorAll('.favorite-card-item');
                const totalItems = cards.length;
                const totalPages = Math.ceil(totalItems / itemsPerPage);
                let currentPage = 1;

                // 如果只有一頁或沒有資料，就不展示分頁元件
                const paginationContainer = document.getElementById('favPaginationContainer');
                if (totalPages <= 1) {
                    if (paginationContainer) paginationContainer.style.display = 'none';
                    return;
                }

                function showPage(page) {
                    currentPage = page;
                    const start = (page - 1) * itemsPerPage;
                    const end = start + itemsPerPage;

                    cards.forEach((card, idx) => {
                        if (idx >= start && idx < end) {
                            card.style.setProperty('display', 'block', 'important');
                        } else {
                            card.style.setProperty('display', 'none', 'important');
                        }
                    });

                    renderButtons();
                    // 點選頁碼時，平滑捲動回列表頂部
                    window.scrollTo({
                        top: document.querySelector('.search-header').offsetTop - 140,
                        behavior: 'smooth'
                    });
                }

                function renderButtons() {
                    paginationContainer.innerHTML = '';

                    // 頁面資訊
                    const infoSpan = document.createElement('span');
                    infoSpan.className = 'page-info';
                    infoSpan.innerText = `頁面 ${currentPage} / ${totalPages}`;
                    paginationContainer.appendChild(infoSpan);

                    // 按鈕列
                    const btnDiv = document.createElement('div');
                    btnDiv.className = 'page-buttons';
                    btnDiv.style.display = 'flex';

                    // 首頁
                    const btnFirst = document.createElement('a');
                    btnFirst.className = `page-item ${currentPage === 1 ? 'disabled' : ''}`;
                    btnFirst.innerText = '« 首頁';
                    btnFirst.addEventListener('click', (e) => { e.preventDefault(); showPage(1); });
                    btnDiv.appendChild(btnFirst);

                    // 上一頁
                    const btnPrev = document.createElement('a');
                    btnPrev.className = `page-item ${currentPage === 1 ? 'disabled' : ''}`;
                    btnPrev.innerText = '‹ 上一頁';
                    btnPrev.addEventListener('click', (e) => { e.preventDefault(); showPage(currentPage - 1); });
                    btnDiv.appendChild(btnPrev);

                    // 頁碼按鈕
                    for (let i = 1; i <= totalPages; i++) {
                        const btnPage = document.createElement('a');
                        btnPage.className = `page-item ${i === currentPage ? 'active' : ''}`;
                        btnPage.innerText = i;
                        btnPage.addEventListener('click', (e) => { e.preventDefault(); showPage(i); });
                        btnDiv.appendChild(btnPage);
                    }

                    // 下一頁
                    const btnNext = document.createElement('a');
                    btnNext.className = `page-item ${currentPage === totalPages ? 'disabled' : ''}`;
                    btnNext.innerText = '下一頁 ›';
                    btnNext.addEventListener('click', (e) => { e.preventDefault(); showPage(currentPage + 1); });
                    btnDiv.appendChild(btnNext);

                    // 末頁
                    const btnLast = document.createElement('a');
                    btnLast.className = `page-item ${currentPage === totalPages ? 'disabled' : ''}`;
                    btnLast.innerText = '末頁 »';
                    btnLast.addEventListener('click', (e) => { e.preventDefault(); showPage(totalPages); });
                    btnDiv.appendChild(btnLast);

                    paginationContainer.appendChild(btnDiv);
                }

                // 啟始顯示第一頁
                showPage(1);
            });
        </script>
    </body>
</html>
