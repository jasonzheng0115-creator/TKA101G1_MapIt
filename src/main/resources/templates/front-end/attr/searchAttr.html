<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layouts/frontend :: head}"></th:block>
    <title>搜尋結果 - MapIt 旅遊平台</title>
    <style>
        .search-header {
            background: linear-gradient(135deg, #ffc107 0%, #ffb300 100%);
            color: #212529;
            padding: 1.25rem 2rem;
            border-radius: 12px;
        }
        
        .filter-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }
        
        .result-count {
            font-size: 1.1rem;
            color: #d39e00;
            font-weight: bold;
        }

        /* 覆蓋 Bootstrap 主要按鈕 (篩選、查看詳情) 的藍色 */
        .btn-primary {
            background-color: #ffc107 !important;
            border-color: #ffc107 !important;
            color: #212529 !important;
            font-weight: bold;
        }
        .btn-primary:hover, .btn-primary:focus, .btn-primary:active {
            background-color: #e0a800 !important;
            border-color: #e0a800 !important;
            color: #212529 !important;
            box-shadow: 0 4px 12px rgba(255, 193, 7, 0.2) !important;
        }

        /* 覆蓋分頁按鈕 */
        .page-link {
            color: #d39e00 !important;
            border-color: #dee2e6 !important;
        }
        .page-link:hover {
            color: #b38600 !important;
            background-color: #fffde7 !important;
            border-color: #dee2e6 !important;
        }
        .page-item.active .page-link {
            background-color: #ffc107 !important;
            border-color: #ffc107 !important;
            color: #212529 !important;
            font-weight: bold;
        }
        .page-item.disabled .page-link {
            color: #6c757d !important;
            background-color: #fff !important;
            border-color: #dee2e6 !important;
        }
        
        /* 收藏按鈕樣式 */
        .favorite-btn {
            position: absolute;
            top: 0.5rem;
            left: 0.5rem;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 10;
        }
        
        .favorite-btn:hover {
            background: rgba(255, 255, 255, 1);
            transform: scale(1.1);
        }
        
        .favorite-btn i {
            font-size: 1.2rem;
            color: #dc3545;
        }
        
        .favorite-btn.favorited i {
            color: #dc3545;
        }

        /* ==========================================================
           手動控制下拉選單 (Disk)
           ========================================================== */
        .nav-item.dropdown .dropdown-menu {
            display: none;
            margin-top: 8px;
        }
        /* 當 JS 加上 .show 類別時展開選單 */
        .nav-item.dropdown .dropdown-menu.show {
            display: block;
        }
        /* 替下拉選單的選項加上 MapIt 專屬的 Hover 效果 */
        .dropdown-item {
            transition: background-color 0.2s, color 0.2s;
        }
        .dropdown-item:hover {
            background-color: #fff5f2 !important;
            color: #ff5722 !important;
        }
        .dropdown-item:hover i {
            color: #ff5722 !important;
        }

        /* ==========================================================
           巨型選單 (Megamenu) 樣式
           ========================================================== */
        /* 設定次選單為相對定位，做為下拉選單的錨點 */
        .sub-navbar {
            position: relative;
        }

        /* 觸發選單的導覽項目 */
        .megamenu-nav-item {
            position: static; /* 靜態定位可讓下拉選單滿寬 */
        }
        
        /* 若選單項有指定 position-relative，則下拉選單改為相對於該項目定位 */
        .megamenu-nav-item.position-relative {
            position: relative;
        }

        /* 巨型下拉選單本體 */
        .megamenu-dropdown {
            width: 100%;
            left: 0;
            right: 0;
            top: 100%;
            display: none;
            position: absolute;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            border-top: 1px solid #f0f0f0;
            border-bottom: 4px solid #ff5722;
            padding: 20px 0;
            z-index: 1050;
        }

        /* 滑鼠移入時顯示選單並套用平滑動畫 */
        .megamenu-nav-item:hover .megamenu-dropdown {
            display: block;
            animation: megamenuFade 0.25s ease-out;
        }

        @keyframes megamenuFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 7 個主題的網格布局 */
        .megamenu-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 15px;
        }

        /* 主題卡片樣式 */
        .megamenu-card {
            display: block;
            border-radius: 8px;
            overflow: hidden;
            background: #fafafa;
            border: 1px solid #eef0f2;
            transition: all 0.3s ease;
            text-align: center;
        }

        .megamenu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            border-color: #ff5722;
        }

        /* 圖片容器 */
        .megamenu-img-wrapper {
            width: 100%;
            height: 90px;
            overflow: hidden;
        }

        .megamenu-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .megamenu-card:hover .megamenu-img {
            transform: scale(1.08);
        }

        /* 標題字體 */
        .megamenu-title {
            padding: 8px 5px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #333;
            transition: color 0.3s ease;
        }

        .megamenu-card:hover .megamenu-title {
            color: #ff5722;
        }

        /* ==========================================================
           地區選單連結動畫
           ========================================================== */
        .region-link {
            transition: all 0.2s ease;
            font-size: 0.95rem;
            display: inline-block;
        }
        .region-link:hover {
            color: #ff5722 !important;
            transform: translateX(6px);
        }
    </style>
</head>
<body>
    <!-- 引用共用的前台導覽列 -->
    <header th:replace="~{layouts/frontend :: navbar}"></header>

    <!-- Filter Card Container -->
    <div class="container" style="margin-top: 130px; margin-bottom: 2rem;">
        <!-- Filter Card -->
        <div class="filter-card mb-0">
            <form action="/front/attr/search" method="get" class="row g-3">
                <div class="col-md-4">
                    <label for="keyword" class="form-label">關鍵字</label>
                    <input type="text" class="form-control" id="keyword" name="keyword" th:value="${keyword}" placeholder="輸入景點名稱...">
                </div>
                <div class="col-md-3">
                    <label for="regionId" class="form-label">地區</label>
                    <select class="form-select" id="regionId" name="regionId">
                        <option value="">全部地區</option>
                        <option th:each="region : ${regions}" 
                                th:value="${region.regionId}" 
                                th:text="${region.regionName}"
                                th:selected="${regionId != null && regionId == region.regionId}">
                        </option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="categoryId" class="form-label">類別</label>
                    <select class="form-select" id="categoryId" name="categoryId">
                        <option value="">全部類別</option>
                        <option th:each="category : ${categories}" 
                                th:value="${category.categoryId}" 
                                th:text="${category.categoryName}"
                                th:selected="${categoryId != null && categoryId == category.categoryId}">
                        </option>
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-funnel"></i> 篩選
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Search Header -->
    <div class="container mb-4">
        <div class="search-header">
            <h2 class="fw-bold mb-0" style="font-size: 1.75rem;">
                <i class="bi bi-search"></i> 搜尋結果
            </h2>
            <p class="lead mb-0 mt-2" th:if="${keyword != null && !keyword.isEmpty()}" style="font-size: 1.05rem; opacity: 0.9;">
                關鍵字：「<span th:text="${keyword}"></span>」
            </p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container mb-5">
        <!-- Result Count -->
        <div class="mb-3">
            <p class="result-count">
                <i class="bi bi-pin-map-fill"></i> 
                找到 <span th:text="${attrPage.totalElements}">0</span> 個景點
            </p>
        </div>

        <!-- Results Grid -->
        <div class="row gx-4 gx-lg-5 row-cols-2 row-cols-md-3 row-cols-xl-4 justify-content-center">
    <div class="col mb-5" th:each="item : ${attrWithImages}">
        <div class="card h-100 shadow-sm">
            <img class="card-img-top" 
                 th:src="${item['imageUrl'] != null && !#strings.isEmpty(item['imageUrl'])} 
                         ? ${item['imageUrl']} 
                         : (${item['imagePath'] != null && !#strings.isEmpty(item['imagePath'])} 
                            ? '/attraction_images/' + ${item['imagePath']} 
                            : 'https://dummyimage.com/450x300/dee2e6/6c757d.jpg')" 
                 alt="景點圖片" style="height: 200px; object-fit: cover;"
                 onerror="this.onerror=null; this.src='https://dummyimage.com/450x300/dee2e6/6c757d.jpg';">
            
            <div class="card-body p-4">
                <h5 class="fw-bold" th:text="${item.attr.attrName}">景點名稱</h5>
                <p class="text-muted small" th:text="${item.attr.attrAddress}">地址</p>
            </div>
            
            <div class="card-footer p-4 pt-0 border-top-0 bg-transparent">
                <div class="d-grid">
                    <a class="btn btn-primary" 
                       th:href="@{/front/attr/detail/{id}(id=${item.attr.attrId})}">查看詳情</a>
                </div>
            </div>
        </div>
    </div>
</div>

        <!-- Pagination -->
        <div class="pagination-container" th:if="${attrPage != null and attrPage.totalPages > 1}">
            <!-- 左側的頁面資訊 -->
            <span class="page-info" th:text="'頁面 ' + ${attrPage.number + 1} + ' / ' + ${attrPage.totalPages}">頁面 1 / 1</span>
            
            <!-- 右側的分頁按鈕 -->
            <div class="page-buttons" style="display: flex;">
                <a th:href="@{/front/attr/search(keyword=${keyword}, regionId=${regionId}, area=${area}, categoryId=${categoryId}, page=0)}" 
                   th:classappend="${attrPage.first} ? 'disabled' : ''" 
                   class="page-item">« 首頁</a>
                
                <a th:href="@{/front/attr/search(keyword=${keyword}, regionId=${regionId}, area=${area}, categoryId=${categoryId}, page=${attrPage.number - 1})}" 
                   th:classappend="${attrPage.first} ? 'disabled' : ''" 
                   class="page-item">‹ 上一頁</a>
                
                <a th:each="i : ${#numbers.sequence(0, attrPage.totalPages - 1)}" 
                   th:href="@{/front/attr/search(keyword=${keyword}, regionId=${regionId}, area=${area}, categoryId=${categoryId}, page=${i})}"
                   th:text="${i + 1}"
                   th:classappend="${i == attrPage.number} ? 'active' : ''"
                   class="page-item"></a>
                
                <a th:href="@{/front/attr/search(keyword=${keyword}, regionId=${regionId}, area=${area}, categoryId=${categoryId}, page=${attrPage.number + 1})}" 
                   th:classappend="${attrPage.last} ? 'disabled' : ''" 
                   class="page-item">下一頁 ›</a>
                
                <a th:href="@{/front/attr/search(keyword=${keyword}, regionId=${regionId}, area=${area}, categoryId=${categoryId}, page=${attrPage.totalPages - 1})}" 
                   th:classappend="${attrPage.last} ? 'disabled' : ''"
                   class="page-item">末頁 »</a>
            </div>
        </div>

        <!-- No Results Message -->
        <div th:if="${attrPage.totalElements == 0}" class="text-center py-5">
            <i class="bi bi-search" style="font-size: 4rem; color: #ccc;"></i>
            <h3 class="mt-3 text-muted">找不到符合條件的景點</h3>
            <p class="text-muted">請嘗試調整搜尋條件或關鍵字</p>
            <a href="/" class="btn btn-primary mt-3">返回首頁</a>
        </div>
    </div>

    <!-- Footer-->
    <footer class="py-5 bg-dark">
        <div class="container"><p class="m-0 text-center text-white">Copyright &copy; MapIt 2026 - TKA101G1</p></div>
    </footer>

    <!-- 引用共用的前台 scripts -->
    <th:block th:replace="~{layouts/frontend :: scripts}"></th:block>
    
    <!-- 收藏功能 JavaScript -->
    <script>
        /**
         * 切換收藏狀態
         * @param {HTMLElement} button - 被點擊的收藏按鈕
         */
        /**
         * 加入收藏（與 index.html 邏輯一致）
         * 呼叫後端 /front/favorite/add，使用 form-urlencoded 格式
         */
        function addToFavorite(attrId) {
            if (!attrId) return;
            fetch('/front/favorite/add', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'attrId=' + attrId
            })
            .then(response => {
                if (response.ok) {
                    showToast('成功加入收藏！', 'success');
                } else {
                    showToast('加入收藏失敗，請稍後再試', 'danger');
                }
            })
            .catch(error => {
                console.error('收藏操作錯誤:', error);
                showToast('收藏操作失敗，請稍後再試', 'danger');
            });
        }
        
        /**
         * 顯示提示訊息
         * @param {string} message - 提示訊息內容
         * @param {string} type - 訊息類型 (success, danger, info, warning)
         */
        function showToast(message, type) {
            // 創建 Toast 容器（如果不存在）
            let toastContainer = document.getElementById('toastContainer');
            if (!toastContainer) {
                toastContainer = document.createElement('div');
                toastContainer.id = 'toastContainer';
                toastContainer.style.position = 'fixed';
                toastContainer.style.top = '20px';
                toastContainer.style.right = '20px';
                toastContainer.style.zIndex = '9999';
                document.body.appendChild(toastContainer);
            }
            
            // 創建 Toast 元素
            const toast = document.createElement('div');
            toast.className = `alert alert-${type} alert-dismissible fade show`;
            toast.role = 'alert';
            toast.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            `;
            
            toastContainer.appendChild(toast);
            
            // 3 秒後自動移除
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 150);
            }, 3000);
        }


    </script>
</body>
</html>
