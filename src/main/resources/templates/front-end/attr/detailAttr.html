<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layouts/frontend :: head}"></th:block>
    <title th:text="${attr.attrName} + ' - 景點詳情'">景點詳情 - MapIt 旅遊平台</title>
    <style>
        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background-color: #f8f9fa;
        }
        
        /* 頁面標題區 */
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            margin-top: 130px; /* 避免固定雙導覽列遮擋內容 */
        }
        
        /* 手動控制會員下拉選單 */
        .nav-item.dropdown .dropdown-menu {
            display: none;
            margin-top: 8px;
        }
        .nav-item.dropdown .dropdown-menu.show {
            display: block;
        }
        .dropdown-item {
            transition: background-color 0.2s, color 0.2s;
        }
        .dropdown-item:hover {
            background-color: #fff5f2 !important;
            color: #ff5722 !important;
        }
        .dropdown-item:hover i {
            color: #ff5722 !important;
        }

        /* 巨型選單 (Megamenu) 樣式 */
        .sub-navbar {
            position: relative;
        }
        .megamenu-nav-item {
            position: static;
        }
        .megamenu-nav-item.position-relative {
            position: relative;
        }
        .megamenu-dropdown {
            width: 100%;
            left: 0;
            right: 0;
            top: 100%;
            display: none;
            position: absolute;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            border-top: 1px solid #f0f0f0;
            border-bottom: 4px solid #ff5722;
            padding: 20px 0;
            z-index: 1050;
        }
        .megamenu-nav-item:hover .megamenu-dropdown {
            display: block;
            animation: megamenuFade 0.25s ease-out;
        }
        @keyframes megamenuFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .megamenu-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 15px;
        }
        .megamenu-card {
            display: block;
            border-radius: 8px;
            overflow: hidden;
            background: #fafafa;
            border: 1px solid #eef0f2;
            transition: all 0.3s ease;
            text-align: center;
        }
        .megamenu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            border-color: #ff5722;
        }
        .megamenu-img-wrapper {
            width: 100%;
            height: 90px;
            overflow: hidden;
        }
        .megamenu-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .megamenu-card:hover .megamenu-img {
            transform: scale(1.08);
        }
        .megamenu-title {
            padding: 8px 5px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #333;
            transition: color 0.3s ease;
        }
        .megamenu-card:hover .megamenu-title {
            color: #ff5722;
        }
        .region-link {
            transition: all 0.2s ease;
            font-size: 0.95rem;
            display: inline-block;
        }
        .region-link:hover {
            color: #ff5722 !important;
            transform: translateX(6px);
        }
        
        /* 圖片輪播區域 */
        .carousel-container {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }
        
        .carousel-item img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            border-radius: 8px;
        }
        
        /* 景點資訊卡片 */
        .info-card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }
        
        .info-item {
            padding: 1rem 0;
            border-bottom: 1px solid #e9ecef;
        }
        
        .info-item:last-child {
            border-bottom: none;
        }
        
        .info-label {
            font-weight: bold;
            color: #667eea;
            margin-right: 1rem;
            min-width: 100px;
            display: inline-block;
        }
        
        .badge-custom {
            font-size: 0.9rem;
            padding: 0.5rem 1rem;
        }
        
        /* 返回按鈕 */
        .btn-back {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            transition: transform 0.2s;
        }
        
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            color: white;
        }
    </style>
</head>
<body>
    <!-- 引用共用的前台導覽列 -->
    <header th:replace="~{layouts/frontend :: navbar}"></header>

    <!-- ========== 頁面標題區 ========== -->
    <div class="page-header">
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <h1 class="display-5 fw-bold">
                        <i class="bi bi-geo-alt-fill"></i> 
                        <span th:text="${attr.attrName}">景點名稱</span>
                    </h1>
                    <p class="lead mb-0">
                        <i class="bi bi-pin-map"></i> 
                        <span th:text="${attr.regionVO != null ? attr.regionVO.regionName : '未分類地區'}">地區</span>
                        <span class="mx-2">|</span>
                        <i class="bi bi-tag"></i> 
                        <span th:text="${attr.categoryVO != null ? attr.categoryVO.categoryName : '未分類類別'}">類別</span>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== 主要內容區 ========== -->
    <div class="container mb-5">
        <!-- 返回按鈕 -->
        <div class="row mb-3">
            <div class="col-12">
                <a href="/front/attr/search" class="btn btn-back">
                    <i class="bi bi-arrow-left"></i> 返回景點列表
                </a>
            </div>
        </div>

        <div class="row">
            <!-- 左側：圖片輪播 -->
            <div class="col-lg-8">
                <div class="carousel-container">
                    <h4 class="mb-3">
                        <i class="bi bi-images"></i> 景點圖片
                    </h4>
                    
                    <!-- Bootstrap Carousel 輪播組件 -->
                    <div id="attrCarousel" class="carousel slide" data-bs-ride="carousel">
                        <!-- 輪播指示器 -->
                        <div class="carousel-indicators" th:if="${#lists.size(images) > 1}">
                            <button th:each="image, iterStat : ${images}" 
                                    type="button" 
                                    data-bs-target="#attrCarousel" 
                                    th:attr="data-bs-slide-to=${iterStat.index}"
                                    th:classappend="${iterStat.index == 0} ? 'active' : ''"
                                    th:aria-label="'圖片 ' + ${iterStat.index + 1}">
                            </button>
                        </div>
                        
                        <!-- 輪播內容 -->
                        <div class="carousel-inner">
                            <!-- 情況一：有圖片資料 -->
                            <div th:if="${#lists.size(images) > 0}">
                                <div th:each="image, iterStat : ${images}" 
                                     class="carousel-item"
                                     th:classappend="${iterStat.index == 0} ? 'active' : ''">
                                    <!-- 圖片顯示優先級：線上 imageUrl → 本地 imagePath → 預設圖 -->
                                    <img th:src="${image.imageUrl != null and !#strings.isEmpty(image.imageUrl)} 
                                                 ? ${image.imageUrl} 
                                                 : (${image.imagePath != null and !#strings.isEmpty(image.imagePath)} 
                                                    ? '/attraction_images/' + ${image.imagePath} 
                                                    : '/images/default.jpg')" 
                                         th:alt="${attr.attrName}"
                                         class="d-block w-100"
                                         onerror="this.onerror=null; this.src='/images/default.jpg';">
                                </div>
                            </div>
                            
                            <!-- 情況二：無圖片資料，顯示預設圖片 -->
                            <div th:if="${#lists.size(images) == 0}" class="carousel-item active">
                                <img src="/images/default.jpg" 
                                     alt="預設圖片" 
                                     class="d-block w-100">
                                <div class="carousel-caption d-none d-md-block">
                                    <h5>暫無圖片</h5>
                                    <p>此景點尚未上傳圖片</p>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 輪播控制按鈕（只有多張圖片時才顯示） -->
                        <div th:if="${#lists.size(images) > 1}">
                            <button class="carousel-control-prev" type="button" data-bs-target="#attrCarousel" data-bs-slide="prev">
                                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">上一張</span>
                            </button>
                            <button class="carousel-control-next" type="button" data-bs-target="#attrCarousel" data-bs-slide="next">
                                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">下一張</span>
                            </button>
                        </div>
                    </div>
                    
                    <!-- 圖片數量提示 -->
                    <div class="mt-3 text-center text-muted">
                        <small>
                            <i class="bi bi-image"></i> 
                            共 <span th:text="${#lists.size(images)}">0</span> 張圖片
                        </small>
                    </div>
                </div>
            </div>

            <!-- 右側：景點資訊 -->
            <div class="col-lg-4">
                <div class="info-card">
                    <h4 class="mb-4">
                        <i class="bi bi-info-circle-fill"></i> 景點資訊
                    </h4>
                    
                    <!-- 地址 -->
                    <div class="info-item">
                        <div class="info-label">
                            <i class="bi bi-geo-alt"></i> 地址
                        </div>
                        <div class="d-flex align-items-center justify-content-between mt-1">
                            <span th:text="${attr.attrAddress != null ? attr.attrAddress : '無地址資訊'}">地址資訊</span>
                            
                            <!-- 新增：地圖定位按鈕 -->
                            <a th:if="${attr.attrAddress != null}" 
                               th:href="|https://www.google.com/maps/search/?api=1&query=${attr.attrName}+${attr.attrAddress}|" 
                               target="_blank" 
                               class="btn btn-sm btn-outline-primary ms-2 rounded-pill px-3 py-1 flex-shrink-0"
                               style="font-size: 0.8rem;">
                                <i class="bi bi-map-fill"></i> 看地圖
                            </a>
                        </div>
                    </div>
                    
                    <!-- 電話 -->
                    <div class="info-item" th:if="${attr.attrTel != null and !#strings.isEmpty(attr.attrTel)}">
                        <div class="info-label">
                            <i class="bi bi-telephone"></i> 電話
                        </div>
                        <div th:text="${attr.attrTel}">電話號碼</div>
                    </div>
                    
                    <!-- 營業時間 -->
                    <div class="info-item" th:if="${attr.openTime != null and !#strings.isEmpty(attr.openTime)}">
                        <div class="info-label">
                            <i class="bi bi-clock"></i> 營業時間
                        </div>
                        <div th:text="${attr.openTime}">營業時間</div>
                    </div>
                    
                    <!-- 營業狀態 -->
                    <div class="info-item">
                        <div class="info-label">
                            <i class="bi bi-shop"></i> 狀態
                        </div>
                        <div>
                            <span class="badge badge-custom"
                                  th:classappend="${attr.isOpen == 'Y' or attr.isOpen == '正常營業'} ? 'bg-success' : 'bg-secondary'"
                                  th:text="${attr.isOpen == 'Y' or attr.isOpen == '正常營業'} ? '正常營業' : '暫停營業'">
                                營業狀態
                            </span>
                        </div>
                    </div>
                    
                    <!-- 評分 -->
                    <div class="info-item">
                        <div class="info-label">
                            <i class="bi bi-star-fill text-warning"></i> 評分
                        </div>
                        <div>
                            <span class="text-warning fw-bold" style="font-size: 1.2rem;">
                                <span th:text="${attr.avgStars != null ? attr.avgStars : '0.0'}">0.0</span>
                            </span>
                            <span class="text-muted ms-2">
                                (<span th:text="${attr.attrVotes != null ? attr.attrVotes : 0}">0</span> 則評價)
                            </span>
                        </div>
                    </div>
                    
                    <!-- 地區 -->
                    <div class="info-item">
                        <div class="info-label">
                            <i class="bi bi-pin-map"></i> 地區
                        </div>
                        <div>
                            <span class="badge bg-primary badge-custom"
                                  th:text="${attr.regionVO != null ? attr.regionVO.regionName : '未分類'}">
                                地區
                            </span>
                        </div>
                    </div>
                    
                    <!-- 類別 -->
                    <div class="info-item">
                        <div class="info-label">
                            <i class="bi bi-tag"></i> 類別
                        </div>
                        <div>
                            <span class="badge bg-info badge-custom"
                                  th:text="${attr.categoryVO != null ? attr.categoryVO.categoryName : '未分類'}">
                                類別
                            </span>
                        </div>
                    </div>
                </div>
                
                <!-- 操作按鈕 -->
                <div class="d-grid gap-2">
                    <button class="btn btn-primary btn-lg" type="button" 
                            th:attr="data-attr-id=${attr.attrId}"
                            onclick="addToFavorite(this.getAttribute('data-attr-id'))">
                        <i class="bi bi-heart"></i> 加入收藏
                    </button>
                    <button class="btn btn-outline-primary btn-lg" type="button" onclick="shareAttraction()">
                        <i class="bi bi-share"></i> 分享景點
                    </button>
                </div>
            </div>
        </div>
        
        <!-- ========== 評論區域 ========== -->
        <div class="row mt-4">
            <div class="col-12">
                <!-- 評論列表 -->
                <div class="info-card">
                    <h4 class="mb-4">
                        <i class="bi bi-chat-left-text-fill"></i> 景點評論
                    </h4>
                    
                    <!-- 若有評論則顯示 -->
                    <div th:if="${commentList != null and #lists.size(commentList) > 0}">
                        <div th:each="comment : ${commentList}" class="info-item">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <div>
                                    <span class="fw-bold">顧客 #<span th:text="${comment.custId}">1</span></span>
                                    <span class="text-warning ms-2">
                                        <i class="bi bi-star-fill" th:each="i : ${#numbers.sequence(1, comment.commentScore)}"></i>
                                        <span th:text="${comment.commentScore} + ' 分'">5 分</span>
                                    </span>
                                    <!-- 檢舉按鈕 -->
                                    <button class="btn btn-link btn-sm text-danger p-0 ms-3 btn-report-comment" 
                                            th:data-comment-id="${comment.commentId}" 
                                            title="檢舉此評論"
                                            style="font-size: 0.85rem; text-decoration: none;">
                                        <i class="bi bi-flag-fill"></i> 檢舉
                                    </button>
                                </div>
                                <small class="text-muted" th:text="${#temporals.format(comment.commentTime, 'yyyy-MM-dd HH:mm')}">2024-01-01 12:00</small>
                            </div>
                            <p class="mb-0" th:text="${comment.commentContent}">評論內容</p>
                        </div>
                    </div>
                    
                    <!-- 若無評論則顯示提示 -->
                    <div th:if="${commentList == null or #lists.size(commentList) == 0}" class="text-center text-muted py-4">
                        <i class="bi bi-chat-left-dots" style="font-size: 3rem;"></i>
                        <p class="mt-2">目前尚無評論，成為第一個評論的人吧！</p>
                    </div>
                </div>
                
                <!-- 新增評論表單 -->
                <div class="info-card mt-4">
                    <h5 class="mb-3 d-flex align-items-center justify-content-between">
                        <span><i class="bi bi-pencil-square"></i> 發表評論</span>
                        <!-- 未登入時顯示登入按鈕 -->
                        <a th:unless="${userName}" href="/customer/login" class="btn btn-sm btn-outline-warning rounded-pill px-3 fw-bold shadow-sm">
                            <i class="bi bi-box-arrow-in-right"></i> 登入會員以新增評論
                        </a>
                    </h5>
                    <form action="/attr/addComment" method="post">
                        <!-- 隱藏的景點 ID -->
                        <input type="hidden" name="attrId" th:value="${attr.attrId}">
                        
                        <!-- 評分選擇 -->
                        <div class="mb-3">
                            <label for="commentScore" class="form-label">評分 <span class="text-danger">*</span></label>
                            <select class="form-select" id="commentScore" name="commentScore" required th:disabled="${userName == null}">
                                <option value="">請選擇評分</option>
                                <option value="5">⭐⭐⭐⭐⭐ 5 分 - 非常好</option>
                                <option value="4">⭐⭐⭐⭐ 4 分 - 很好</option>
                                <option value="3">⭐⭐⭐ 3 分 - 普通</option>
                                <option value="2">⭐⭐ 2 分 - 不好</option>
                                <option value="1">⭐ 1 分 - 非常不好</option>
                            </select>
                        </div>
                        
                        <!-- 評論內容 -->
                        <div class="mb-3">
                            <label for="commentContent" class="form-label">評論內容 <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="commentContent" name="commentContent" 
                                      rows="4" th:placeholder="${userName == null} ? '請先登入會員以發表您的評論...' : '請分享您的遊玩體驗...'" required th:disabled="${userName == null}"></textarea>
                        </div>
                        
                        <!-- 送出按鈕 -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg" th:disabled="${userName == null}">
                                <i class="bi bi-send-fill"></i> 送出評論
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== JavaScript 區域 ========== -->
    
    <!-- 引用共用的前台 scripts -->
    <th:block th:replace="~{layouts/frontend :: scripts}"></th:block>
    
    <!-- 自訂 JavaScript -->
    <script>
        // 初始化輪播（自動播放）
        document.addEventListener('DOMContentLoaded', function() {
            var carousel = new bootstrap.Carousel(document.getElementById('attrCarousel'), {
                interval: 3000,  // 3 秒自動切換
                wrap: true       // 循環播放
            });
        });
     // ==========================================
        // 加入收藏的 Ajax 功能 (補上這裡！)
        // ==========================================
        function addToFavorite(attrId) {
            if(!attrId) return;
            
            // 檢查是否登入
            const isLoggedIn = [[${userName != null}]];
            if (!isLoggedIn) {
                alert('請先登入會員以加入收藏！');
                window.location.href = '/customer/login';
                return;
            }
            
            // 發送 POST 請求到你的 Controller
            fetch('/front/favorite/add', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'attrId=' + attrId
            })
            .then(response => response.json())
            .then(data => {
                if(data.success) {
                    alert('成功加入收藏！');
                } else {
                    alert(data.message || '加入收藏失敗，請稍後再試。');
                    if (data.message === '請先登入會員') {
                        window.location.href = '/customer/login';
                    }
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('加入收藏時發生錯誤，請稍後再試。');
            });
        }

        // ==========================================
        // 分享景點的功能
        // ==========================================
        function shareAttraction() {
            const shareData = {
                title: document.title,
                text: '我在 MapIt 發現了一個超棒的景點，推薦給你！',
                url: window.location.href
            };

            // 優先：如果瀏覽器支援原生分享 API（主要是行動裝置）
            if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
                navigator.share(shareData)
                    .catch(err => {
                        console.log('使用者取消分享或發生錯誤：', err);
                    });
            } else {
                // 備用：複製網址到剪貼簿（所有瀏覽器適用）
                navigator.clipboard.writeText(window.location.href)
                    .then(() => {
                        alert('景點網址已複製到剪貼簿，快貼給好友分享吧！');
                    })
                    .catch(err => {
                        console.error('複製失敗:', err);
                        alert('複製失敗，請手動複製瀏覽器網址列進行分享！');
                    });
            }
        }

        // ==========================================
        // 評論檢舉的功能
        // ==========================================
        document.addEventListener('DOMContentLoaded', function() {
            const reportModal = new bootstrap.Modal(document.getElementById('reportCommentModal'));
            const reportCommentIdInput = document.getElementById('reportCommentId');
            const reportContentInput = document.getElementById('reportContent');

            // 監聽所有檢舉按鈕
            document.querySelectorAll('.btn-report-comment').forEach(btn => {
                btn.addEventListener('click', function() {
                    // 檢查是否登入
                    const isLoggedIn = [[${userName != null}]];
                    if (!isLoggedIn) {
                        alert('請先登入會員以進行檢舉！');
                        window.location.href = '/customer/login';
                        return;
                    }

                    const commentId = this.getAttribute('data-comment-id');
                    reportCommentIdInput.value = commentId;
                    reportContentInput.value = ''; // 清空先前的輸入
                    reportModal.show();
                });
            });

            // 提交檢舉
            document.getElementById('submitReportBtn').addEventListener('click', function() {
                const commentId = reportCommentIdInput.value;
                const reportContent = reportContentInput.value.trim();

                if (!reportContent) {
                    alert('請輸入檢舉理由！');
                    return;
                }

                // 發送 POST 請求
                fetch('/front/report/add', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        commentId: commentId,
                        reportContent: reportContent
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert(data.message);
                        reportModal.hide();
                    } else {
                        alert(data.message || '檢舉失敗，請稍後再試。');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('系統發生錯誤，請稍後再試。');
                });
            });
        });


    </script>

    <!-- ========== 評論檢舉 Modal ========== -->
    <div class="modal fade" id="reportCommentModal" tabindex="-1" aria-labelledby="reportCommentModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title" id="reportCommentModalLabel">
                        <i class="bi bi-exclamation-triangle-fill"></i> 檢舉此評論
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="reportCommentForm">
                        <input type="hidden" id="reportCommentId" name="commentId">
                        <div class="mb-3">
                            <label for="reportContent" class="form-label fw-bold">請說明檢舉理由 <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="reportContent" name="reportContent" rows="4" placeholder="例如：含有不當字眼、垃圾廣告、惡意抹黑等..." required></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" id="submitReportBtn">送出檢舉</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
