<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>聯絡我們 - 旅圖 MapIt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="/css/styles.css" rel="stylesheet" />
    <style>
        body {
            background-color: #f8f9fa;
        }

        .contact-container {
            max-width: 600px;
            margin: 150px auto 50px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        .contact-icon {
            font-size: 50px;
            color: #ff5722;
            margin-bottom: 20px;
        }
        .contact-info-box {
            background: #fff5f2;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: left;
        }
        .contact-info-box i {
            color: #ff5722;
            font-size: 24px;
            margin-right: 15px;
            vertical-align: middle;
        }
        .contact-info-box h5 {
            margin-bottom: 5px;
            font-weight: bold;
        }
        .contact-info-box p {
            margin: 0;
            color: #555;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <!-- 引用共用的前台導覽列 -->
    <header th:replace="~{layouts/frontend :: navbar}"></header>

    <!-- 客服中心內容 -->
    <div class="container">
        <div class="contact-container">
            <i class="bi bi-headset contact-icon"></i>
            <h2 class="mb-4 fw-bold">客服中心 / 聯絡我們</h2>
            <p class="text-muted mb-4">如果您有任何關於訂單、網站操作的疑問，歡迎隨時透過下方聯絡方式與我們取得聯繫，我們將有專人盡快為您服務！</p>
            
            <div class="contact-info-box d-flex align-items-center">
                <i class="bi bi-envelope-fill"></i>
                <div>
                    <h5>電子郵件 (Email)</h5>
                    <p>support@mapit-travel.com.tw</p>
                </div>
            </div>

            <div class="contact-info-box d-flex align-items-center">
                <i class="bi bi-telephone-fill"></i>
                <div>
                    <h5>客服專線 (市話)</h5>
                    <p>(02) 2345-6789</p>
                    <small class="text-muted">服務時間：週一至週五 09:00 - 18:00</small>
                </div>
            </div>
            
            <div class="mt-4">
                <a href="/" class="btn btn-outline-secondary rounded-pill px-4">返回首頁</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap core JS-->
    <!-- 引用共用的前台 scripts -->
    <th:block th:replace="~{layouts/frontend :: scripts}"></th:block>
</body>
</html>
