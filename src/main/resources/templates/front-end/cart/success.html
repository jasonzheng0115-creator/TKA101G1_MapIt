<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{layouts/frontend :: head}"></th:block>
    <title>訂單成立成功 - 旅圖 MapIt</title>
    <style>
        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            padding-top: 140px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .nav-item.dropdown .dropdown-menu { display: none; margin-top: 8px; }
        .nav-item.dropdown .dropdown-menu.show { display: block; }
        .dropdown-item:hover { background-color: #fff5f2 !important; color: #ff5722 !important; }
        .dropdown-item:hover i { color: #ff5722 !important; }

        .success-container {
            background-color: white; border-radius: 16px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.06);
            border: 1px solid #f1f5f9; max-width: 600px; width: 100%;
            padding: 40px; box-sizing: border-box; text-align: center; margin-bottom: 50px;
        }
        .success-header h1 { color: #ff5722; font-size: 28px; font-weight: bold; margin-bottom: 12px; }
        .success-header p { color: #64748b; font-size: 15px; margin-bottom: 35px; line-height: 1.6; }
        .receipt-card, .detail-card, .ticket-box {
            text-align: left; background-color: #ffffff;
            border: 1px solid #e2e8f0; border-radius: 12px; padding: 25px; margin-bottom: 25px;
        }
        .receipt-card h3, .detail-card h3, .ticket-box h3 {
            margin: 0 0 20px 0; color: #1e293b; font-size: 17px; font-weight: bold;
            border-left: 4px solid #ff5722; padding-left: 10px;
        }
        .receipt-card ul { list-style: none; padding: 0; margin: 0; font-size: 15px; line-height: 2.2; color: #475569; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        th { color: #64748b; font-weight: 500; }
        .ticket-box { background-color: #fffaf8; border-color: #ffe4d6; text-align: center; }
        .btn-custom-outline:hover { background-color: #fff5f2 !important; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(255, 87, 34, 0.15); }
        .btn-custom-primary:hover { background-color: #e64a19 !important; border-color: #e64a19 !important; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(255, 87, 34, 0.3); }
    </style>
</head>

<body>
		<!-- 引入共同導覽列 -->
	<header th:replace="~{layouts/frontend :: navbar}"></header>

    <div class="success-container">
        <div class="success-header">
            <h1>🎉 感謝您的訂購！</h1>
            <p>您的付款已扣款成功，以下為您的電子收據與入場憑證。</p>
        </div>
        
        <div class="receipt-card">
            <h3>🧾 訂單基本資訊</h3>
            <ul>
                <li><strong>訂單編號：</strong> <span th:text="${order.orderId}">10025</span></li>
                <li><strong>訂單時間：</strong> <span th:text="${order.orderTimestamp}">2026-06-26 23:15:44</span></li>
                <li><strong>實付總金額：</strong> <span style="color: #ff5722; font-weight: 800; font-size: 16px;" th:text="'NT$ ' + ${order.orderPrice}">NT$ 999</span></li>
                <li><strong>付款狀態：</strong> <span style="color: #198754; font-weight: bold;">🟢 刷卡成功 (已付款)</span></li>
            </ul>
        </div>
        
        <div class="detail-card">
            <h3>📋 購買項目明細</h3>
            <table>
                <thead><tr><th>商品名稱</th><th>數量</th><th>購買單價</th></tr></thead>
                <tbody>
                    <tr th:each="item : ${order.orderItems}">
                        <td>
                            <span th:text="${item.prodVO.productName}" style="font-weight: bold; color: #1e293b;">台北101門票</span><br>
                            <small th:text="'(商品編號 #' + ${item.productId} + ')'" style="color: #94a3b8; font-size: 12px;">(商品編號 #1)</small>
                        </td>
                        <td th:text="${item.itemQty} + ' 張'" style="color: #475569;">1 張</td>
                        <td th:text="'NT$ ' + ${item.itemPrice}" style="color: #475569;">NT$ 999</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="ticket-box text-center" style="padding: 30px 20px;">
            <h3 style="text-align: center; border-left: none; margin-bottom: 20px;">🎫 票券已發送至您的票券匣</h3>
            <p style="color: #64748b; font-size: 14px; margin-bottom: 25px;">感謝您的購買！請前往【我的票券匣】查看 QR Code 並進行使用</p>
            <div style="display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;">
                <a th:href="@{/orders/my-orders}" class="btn-custom-outline" style="background-color: white; color: #ff5722; padding: 12px 25px; border-radius: 25px; text-decoration: none; font-weight: bold; border: 2px solid #ff5722; transition: all 0.2s;">
                    🔙 返回歷史訂單
                </a>
                <a th:href="@{/customer/ticket}" class="btn-custom-primary" style="background-color: #ff5722; color: white; padding: 12px 25px; border-radius: 25px; text-decoration: none; font-weight: bold; border: 2px solid #ff5722; transition: all 0.2s;">
                    ➡︎ 前往我的票券匣
                </a>
            </div>
        </div>
    </div>

	<th:block th:replace="~{layouts/frontend :: scripts}"></th:block>
</body>
</html>
