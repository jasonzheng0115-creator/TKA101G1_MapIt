<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>旅遊行程規劃網站 - 首頁</title>
    <!-- 引入 Google Font：Noto Sans TC（思源黑體），讓中文更精緻 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        /* ===== 全域設定 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(160deg, #E8ECF1 0%, #F5F3F0 50%, #EAE8E4 100%);
            min-height: 100vh;
            color: #3D4F5F;
        }

        /* ===== 頂部導覽列 ===== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 40px;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(123, 143, 161, 0.15);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .navbar .logo {
            font-size: 18px;
            font-weight: 500;
            color: #5A7A8A;
            letter-spacing: 1px;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .user-info {
            font-size: 13px;
            font-weight: 300;
            color: #7B8FA1;
        }

        /* ===== 按鈕共用 ===== */
        .btn {
            display: inline-block;
            padding: 9px 22px;
            font-size: 13px;
            font-family: 'Noto Sans TC', sans-serif;
            font-weight: 400;
            text-decoration: none;
            border-radius: 20px;
            border: 1.5px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .btn-login {
            background: #7B8FA1;
            color: #FFFFFF;
            border-color: #7B8FA1;
        }

        .btn-login:hover {
            background: transparent;
            color: #7B8FA1;
        }

        .btn-logout {
            background: transparent;
            color: #A08B8B;
            border-color: #C4B5B5;
        }

        .btn-logout:hover {
            background: #A08B8B;
            color: #FFFFFF;
        }

        /* ===== 主視覺區 ===== */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 120px 20px 80px;
            position: relative;
        }

        /* 裝飾圓圈 — 增加層次感，不會無聊 */
        .hero::before {
            content: '';
            position: absolute;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(123, 143, 161, 0.10) 0%, transparent 70%);
            top: 40px;
            left: 10%;
            animation: float 8s ease-in-out infinite;
        }

        .hero::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(155, 181, 201, 0.12) 0%, transparent 70%);
            bottom: 20px;
            right: 15%;
            animation: float 6s ease-in-out infinite reverse;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .hero h1 {
            font-size: 38px;
            font-weight: 700;
            color: #4A6274;
            margin-bottom: 16px;
            position: relative;
        }

        .hero p {
            font-size: 16px;
            font-weight: 300;
            color: #8C9DAA;
            margin-bottom: 50px;
            line-height: 1.8;
        }

        /* ===== 功能卡片 ===== */
        .card-container {
            display: flex;
            gap: 24px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(123, 143, 161, 0.12);
            border-radius: 16px;
            padding: 36px 32px;
            width: 220px;
            text-decoration: none;
            color: inherit;
            transition: all 0.35s ease;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 36px rgba(90, 122, 138, 0.12);
            background: rgba(255, 255, 255, 0.9);
        }

        .card-icon {
            font-size: 36px;
            margin-bottom: 16px;
            display: block;
        }

        .card-title {
            font-size: 16px;
            font-weight: 500;
            color: #4A6274;
            margin-bottom: 8px;
        }

        .card-desc {
            font-size: 13px;
            font-weight: 300;
            color: #8C9DAA;
            line-height: 1.6;
        }

        /* ===== 頁尾 ===== */
        .footer {
            text-align: center;
            padding: 40px;
            font-size: 12px;
            font-weight: 300;
            color: #B4BCC3;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>

    <!-- ====== 導覽列 ====== -->
    <nav class="navbar">
        <div class="logo">✦ 旅行規劃</div>

        <div class="navbar-right">
            <span class="user-info" th:if="${userName}" th:text="${userName} + ' 你好'">使用者 你好</span>
            <a th:href="@{/customer/logout}" class="btn btn-logout" th:if="${userName}">登出</a>
            <a th:href="@{/customer/login}" class="btn btn-login" th:unless="${userName}">登入</a>
        </div>
    </nav>

    <!-- ====== 主視覺區 ====== -->
    <section class="hero">
        <h1>規劃你的夢想旅程</h1>
        <p>從靈感到出發，每一步都由你掌握<br>簡單、直覺、屬於你的旅行藍圖</p>

        <div class="card-container">
            <!-- 我的行程卡片 -->
            <a th:href="@{/trip/my-trips}" class="card">
                <span class="card-icon">🗺️</span>
                <div class="card-title">我的行程</div>
                <div class="card-desc">查看與管理你的專屬旅程計畫</div>
            </a>

            <!-- 探索景點卡片（預留未來功能） -->
            <a href="#" class="card">
                <span class="card-icon">📍</span>
                <div class="card-title">探索景點</div>
                <div class="card-desc">瀏覽熱門景點，尋找旅途靈感</div>
            </a>
        </div>
    </section>

    <!-- ====== 頁尾 ====== -->
    <footer class="footer">
        © 2026 TKA101 旅遊行程規劃網站 · 期末專題
    </footer>

</body>

</html>
