<!DOCTYPE html>

<head>

    <title>MapIt - 旅遊景點平台</title>

<body>
    <!-- 引用共用的前台導覽列 -->
    <header th:replace="~{layouts/frontend :: navbar}"></header>
   <!-- 首頁大圖與搜尋區塊 -->
   <section class="hero-section" style="padding-top: 120px; margin-top: 0;">
       <div class="hero-overlay"></div>
       <div class="hero-content">
           <div class="container px-4 px-lg-5 text-center">
               <h1 class="display-4 fw-bolder text-white mb-4">探索台灣美景</h1>
               <form class="hero-search-bar" action="/front/attr/search" method="get">
                   <input type="search" name="keyword" placeholder="搜尋景點或地區" aria-label="Search" required>
                   <button class="btn btn-primary" type="submit" style="background-color: #ffb300; color: #212529;">
                       <i class="bi bi-search"></i> 搜尋
                   </button>
               </form>
           </div>

   </section>

           <div class="position-relative">
               <div class="city-swimlane-container" id="citySwimlane">

                       <div class="city-name">臺北市</div>
                   </a>
                   <!-- 新北市 -->

                   </a>
                   <!-- 基隆市 -->
                   <a href="/front/attr/search?keyword=基隆市" class="city-card">
                       <img src="/images/keelung.jpg" alt="基隆市">
                       <div class="city-name">基隆市</div>
                   </a>
                   <!-- 宜蘭縣 -->

                       <img src="/images/yilan.jpg" alt="宜蘭縣">
                       <div class="city-name">宜蘭縣</div>
                   </a>
                   <!-- 桃園市 -->
                   <a href="/front/attr/search?keyword=桃園市" class="city-card">
                       <img src="/images/taoyuan.jpg" alt="桃園市">
                       <div class="city-name">桃園市</div>
                   </a>
                   <!-- 新竹縣 -->
                   <a href="/front/attr/search?keyword=新竹縣" class="city-card">
                       <img src="/images/hsinchu.jpg" alt="新竹縣">
                       <div class="city-name">新竹縣</div>
                   </a>
               </div>
               <!-- 輪播右滑箭頭 -->
               <button class="scroll-arrow right-arrow shadow-sm" onclick="scrollSwimlane('citySwimlane', 1)">
                   <i class="bi bi-chevron-right"></i>
               </button>
               <!-- 輪播左滑箭頭 -->
               <button class="scroll-arrow left-arrow shadow-sm" onclick="scrollSwimlane('citySwimlane', -1)">
                   <i class="bi bi-chevron-left"></i>
               </button>
           </div>
       </div>
   </section>

    <section class="py-5 bg-light">
        <div class="container px-4 px-lg-5">
            <h3 class="fw-bold mb-4">熱門景點推薦</h3>
            <!-- 區域分類標籤 -->
            <ul class="nav nav-pills region-pills flex-nowrap overflow-auto">
                <li class="nav-item"><a class="nav-link active" href="#" data-region="全部">全部</a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-region="北部地區">北部地區</a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-region="中部地區">中部地區</a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-region="南部地區">南部地區</a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-region="東部地區">東部地區</a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-region="離島地區">離島地區</a></li>
            </ul>
            <!-- 新增：縣市二級按鈕容器 (預設隱藏) -->
            <div id="countyPillsContainer" class="d-flex flex-wrap gap-2 mt-3 mb-2 d-none">
                <!-- 縣市按鈕將由 JavaScript 動態生成 -->
            </div>
            <!-- 景點網格排版 -->
            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4 mt-3" id="attrGrid">
                <div class="col attraction-item" th:each="item : ${attrWithImages}" th:attr="data-region=${item['attr']?.regionVO != null ? item['attr']?.regionVO?.regionName : ''},
                              data-address=${item['attr']?.attrAddress != null ? item['attr']?.attrAddress : ''}">
                    <a class="attraction-card-v2 text-decoration-none d-block h-100"
                        th:href="${item['attr']?.attrId != null} ? '/front/attr/detail/' + ${item['attr']?.attrId} : '#'">
                        <div class="img-wrapper position-relative">
                            <!-- 圖片 -->
                            <img class="rounded-4 w-100 object-fit-cover" th:src="${item['imageUrl'] != null && !#strings.isEmpty(item['imageUrl'])}
                                        ? ${item['imageUrl']}
                                        : (${item['imagePath'] != null && !#strings.isEmpty(item['imagePath'])}
                                           ? '/attraction_images/' + ${item['imagePath']}
                                           : 'https://dummyimage.com/450x300/dee2e6/6c757d.jpg')"
                               th:alt="${item['attr']?.attrName != null ? item['attr']?.attrName : '景點圖片'}"

                               onerror="this.onerror=null; this.src='https://dummyimage.com/450x300/dee2e6/6c757d.jpg';" />

                           <div class="view-count position-absolute top-0 end-0 m-2 px-2 py-1 bg-dark bg-opacity-75 text-white rounded-2 small d-flex align-items-center">

                               <i class="bi bi-eye-fill"></i>
                           </div>
                           <button
                               class="favorite-btn position-absolute top-0 start-0 m-2 btn btn-light rounded-circle p-0 d-flex align-items-center justify-content-center shadow-sm"
                               th:attr="data-attr-id=${item['attr']?.attrId}"
                               onclick="event.preventDefault(); addToFavorite(this.getAttribute('data-attr-id'))"
                               title="加入收藏"
                               style="width: 32px; height: 32px; border: none; background: rgba(255, 255, 255, 0.9);">
                               <i class="bi bi-heart" style="color: #dc3545; font-size: 1rem;"></i>
                           </button>
                           */-->
                       </div>
                       <!-- 資訊區塊 -->
                       <div class="info-wrapper pt-3">
                           <h5 class="fw-bold text-dark text-truncate mb-2"
                               th:text="${item['attr']?.attrName != null ? item['attr']?.attrName : '未命名景點'}">景點名稱</h5>
                           <!-- Hashtag 標籤 -->
                           <div class="d-flex flex-wrap gap-2">
                               <span
                                   class="badge text-secondary bg-secondary bg-opacity-10 rounded-1 px-2 py-1 fw-normal"

                               <span
                                   class="badge text-secondary bg-secondary bg-opacity-10 rounded-1 px-2 py-1 fw-normal"

                           </div>

    <!-- 引用共用的前台 scripts -->
    <th:block th:replace="~{layouts/frontend :: scripts}"></th:block>
   <script>
       function scrollSwimlane(containerId, direction) {
           const container = document.getElementById(containerId);
           if (container) {
               // 每次點擊滾動大約一個卡片的寬度加上間距
               const scrollAmount = 300;
               container.scrollBy({
                   left: direction * scrollAmount,
                   behavior: 'smooth'
               });
           }
       }
       function addToFavorite(attrId) {
           if (!attrId) return;
           fetch('/front/favorite/add', {
               method: 'POST',
               headers: {
                   'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'attrId=' + attrId
            })
                .then(response => {
                    if (response.ok) {
                        alert('成功加入收藏！');
                    } else {
                        alert('加入收藏失敗，請稍後再試。');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                });
        }
        // 縣市篩選與顯示邏輯
        document.addEventListener('DOMContentLoaded', function () {
            const regionLinks = document.querySelectorAll('.region-pills .nav-link');
            const attractionItems = document.querySelectorAll('.attraction-item');
            const countyContainer = document.getElementById('countyPillsContainer');
            const regionCountyMap = {
                '北部地區': ['基隆市', '台北市', '新北市', '桃園市', '新竹市', '新竹縣', '宜蘭縣'],
                '中部地區': ['苗栗縣', '台中市', '彰化縣', '南投縣', '雲林縣'],
                '南部地區': ['嘉義市', '嘉義縣', '台南市', '高雄市', '屏東縣'],
                '東部地區': ['花蓮縣', '台東縣'],
                '離島地區': ['澎湖縣', '金門縣', '連江縣']
            };
            regionLinks.forEach(link => {
                link.addEventListener('click', function (e) {
                    e.preventDefault();
                    regionLinks.forEach(l => l.classList.remove('active'));
                    this.classList.add('active');
                    const selectedRegion = this.getAttribute('data-region');
                    countyContainer.innerHTML = '';
                    if (selectedRegion === '全部') {
                        countyContainer.classList.add('d-none');
                        attractionItems.forEach(item => item.style.display = 'block');
                    } else {
                        countyContainer.classList.remove('d-none');
                        const allCountyBtn = document.createElement('button');
                        allCountyBtn.className = 'btn btn-sm btn-dark px-3 rounded-pill me-2 mb-2';
                        allCountyBtn.innerText = '全部縣市';
                        allCountyBtn.addEventListener('click', function () {
                            setActiveCountyBtn(this);
                            filterAttractions(selectedRegion, null);
                        });
                        countyContainer.appendChild(allCountyBtn);
                        const counties = regionCountyMap[selectedRegion] || [];
                        counties.forEach(county => {
                            const btn = document.createElement('button');
                            btn.className = 'btn btn-sm btn-outline-secondary px-3 rounded-pill me-2 mb-2';
                            btn.innerText = county;
                            btn.addEventListener('click', function () {
                                setActiveCountyBtn(this);
                                filterAttractions(selectedRegion, county);
                            });
                            countyContainer.appendChild(btn);
                        });
                        filterAttractions(selectedRegion, null);
                    }
                });
            });
            function setActiveCountyBtn(activeBtn) {
                const buttons = countyContainer.querySelectorAll('button');
                buttons.forEach(btn => {
                    btn.classList.remove('btn-dark');
                    btn.classList.add('btn-outline-secondary');
                });
                activeBtn.classList.remove('btn-outline-secondary');
                activeBtn.classList.add('btn-dark');
            }
            function filterAttractions(region, county) {
                attractionItems.forEach(item => {
                    const itemRegion = item.getAttribute('data-region') || '';
                    const itemAddress = item.getAttribute('data-address') || '';
                    // 標準化「台/臺」
                    const normalizedItemRegion = itemRegion.replace(/臺/g, '台');
                    // 1. 檢查一級地區是否匹配
                    let matchesRegion = false;
                    if (region === '全部') {
                        matchesRegion = true;
                    } else {
                        // 取得目前選取地區對應的縣市清單，並統一轉成「台」
                        const countiesInRegion = (regionCountyMap[region] || []).map(c => c.replace(/臺/g, '台'));
                        // 檢查該景點的縣市（例如新北市）是否在該地區（例如北部地區）的縣市清單中
                        matchesRegion = countiesInRegion.includes(normalizedItemRegion);
                    }
                    // 2. 檢查二級縣市是否匹配
                    let matchesCounty = false;
                    if (!county) {
                        matchesCounty = true; // 未選取縣市按鈕，預設通過
                    } else {
                        const normalizedCounty = county.replace(/臺/g, '台');
                        // 景點地區等於選中縣市，或地址中包含該縣市
                        matchesCounty = (normalizedItemRegion === normalizedCounty) ||
                            itemAddress.replace(/臺/g, '台').includes(normalizedCounty);
                    }
                    // 3. 兩者皆符合時顯示，否則隱藏
                    if (matchesRegion && matchesCounty) {
                        item.style.display = 'block';
                    } else {
                        item.style.display = 'none';
                    }
                });
            }
        });


    </script>
</body>
