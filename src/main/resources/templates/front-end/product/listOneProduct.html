<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>旅遊商品詳情</title>

<th:block th:replace="~{layouts/frontend :: head}"></th:block>

<style>
	body {
		background-color: whitesmoke;
		font-family: sans-serif;
		padding: 20px;
		padding-top: 140px;
		display: flex;
		flex-direction: column; /* 鎖定由上到下垂直 */
		align-items: center;    /* 返回鈕與卡片水平置中 */
	}

	/* 卡片上方專用工具列 */
	.action-bar {
		max-width: 1200px;
		width: 100%;
		margin-bottom: 20px;
		display: flex;
		justify-content: flex-start;
	}

	/* 取消返回按鈕 */
	.btn-back {
		text-decoration: none;
		color: gray;
		border: 1px solid lightgray;
		padding: 6px 14px;
		border-radius: 4px;
		font-size: 13px;
		font-weight: bold;
		background-color: white;
		transition: all 0.2s;
	}
	
	.btn-back:hover {
		background-color: snow;
		color: black;
		border-color: gray;
	}
	
	
	/* 詳情頁核心大卡片 */
	.detail-container {
		background-color: transparent;
		border-radius: 0;
		box-shadow: none;
		max-width: 1200px;
		width: 100%;
		display: flex; /* 讓圖片在左、資訊在右，形成完美的現代雙欄型錄 */
		flex-direction: column; /* 由上往下垂直排列 */
		gap: 30px;
		padding: 0;
		box-sizing: border-box;
	}
	
	/* 左欄：商品大圖片區外殼 */
	.detail-img-box {
		width: 100%;
		display: flex;
		justify-content: center; /* 讓圖片置中 */
	}
	
	.detail-img {
		width: 100%;
		max-width: 1200px;
		height: 500px;
		object-fit: cover; /* 確保不管什麼照片，絕不變形拉伸 */
		border-radius: 12px;
		border: none;
		display: block;
	}
	
	/* 右欄：商品文字與功能資訊區 */
	.detail-info-box {
		width: 100%;
		display: flex;
		flex-direction: column;
	}
	
	.detail-title {
		font-size: 26px;
		color: #333;
		margin: 0 0 15px 0;
		font-weight: bold;
	}
	
	.detail-price {
		font-size: 22px;
		color: crimson;
		font-weight: bold;
		margin-bottom: 25px;
		border-bottom: 1px solid lightgray;
		padding-bottom: 15px;
	}
	
</style>
</head>
<body>

		<!-- 引入共同導覽列 -->
	<header th:replace="~{layouts/frontend :: navbar}"></header>



	<div class="action-bar">
		<a th:href="@{/frontend/product/listAll}" class="btn-back"> << 返回商品列表</a>
	</div>

	<div class="detail-container" th:if="${prodVO}">
		
		<div class="detail-img-box">
			<img th:src="@{/upload/{imgName}(imgName=${prodVO.productImg})}" class="detail-img" alt="商品詳情圖片">
		</div>
		
		<div class="detail-info-box">
			<h2 class="detail-title" th:text="${prodVO.productName}">旅遊商品名稱 placeholder</h2>
			<div class="detail-price" th:text="'NT$ ' + ${prodVO.productPrice}">NT$ 9,999</div>
			
			<div id="frontend-desc-text" th:text="${prodVO.productDesc}" style="display: none;"></div>
			<div id="frontend-desc-formatted" style="margin-bottom: 25px;"></div>
			
			<form th:action="@{/cart/add}" method="POST" style="margin-top: auto; background-color: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid lightgray;">
				<input type="hidden" name="productId" th:value="${prodVO.productId}">
				
				<div style="display: flex; flex-direction: column; gap: 5px;">
					<div style="display: flex; align-items: center; gap: 10px;">
						<label style="font-size: 16px; font-weight: bold; color: gray;">選擇數量：</label>
						
						<input type="number" name="quantity" id="prodQuantity" value="1" min="1" 
						       th:max="${prodVO.productQty - prodVO.purchasedQty}" 
						       oninput="validateQty()"
						       style="width: 70px; text-align: center; padding: 8px; border: 1px solid lightgray; border-radius: 6px; font-size: 15px;">
						
						<span style="font-size: 13px; color: gray;" th:text="'(剩餘庫存: ' + ${prodVO.productQty - prodVO.purchasedQty} + ')'"></span>
					</div>
					
					<span id="stockWarning" style="font-size: 13px; color: red; font-weight: bold; display: none;">⚠️ 抱歉，已超出目前可購買的庫存上限！</span>
				</div>
				
				<button type="submit" style="width: 100%; background-color: orange; color: white; border: none; padding: 12px; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: background-color 0.2s;">
					🛒 立即加入購物車
				</button>
			</form>
		</div> 
	</div>
	
	<script>
		const rawEl = document.getElementById('frontend-desc-text');
		const targetDiv = document.getElementById('frontend-desc-formatted');
		
		if (rawEl && targetDiv) {
			const rawText = rawEl.innerText.trim();
			
			if (rawText.startsWith('{')) {
				try {
					const data = JSON.parse(rawText);
					
					targetDiv.innerHTML = `
						<div style="font-size: 15px; color: #444; text-align: left; line-height: 1.8;">
							<div style="margin-bottom: 8px;">📍 <b>地址/集合地點：</b> ${data.address || '未填'}</div>	
							<div style="margin-bottom: 8px;">🕒 <b>營業/接駁時間：</b> ${data.businessHours || '未填'}</div>
							<div style="margin-bottom: 8px;">⏳ <b>票券使用期限：</b> ${data.expiry || '未填'}</div>
							<div style="color: #777; font-style: italic; margin-top: 12px; border-left: 3px solid dodgerblue; padding-left: 10px;">📝 ${data.remark || '無額外備註'}</div>
						</div>
					`;
				} catch (e) {
					targetDiv.innerHTML = `<span style="font-size: 15px; color: gray;">${rawText}</span>`;
				}
			} else {
				// 舊文字直接相容印出
				targetDiv.innerHTML = `<span style="font-size: 15px; color: gray;">${rawText}</span>`;
			}
		}
			
		
		// 加入購物車前處理數量的點擊
		function validateQty() {
			const qtyInput = document.getElementById('prodQuantity');
			const warningText = document.getElementById('stockWarning');
			const maxStock = parseInt(qtyInput.getAttribute('max')) || 1;
			let currentVal = parseInt(qtyInput.value);
			
			if (isNaN(currentVal)) return;

			if (currentVal > maxStock) {
				warningText.style.display = 'block'; // 顯示紅字
				qtyInput.value = maxStock;           // 強制卡在最大庫存
			} else if (currentVal < 1) {
				qtyInput.value = 1;                  // 不能小於 1
				warningText.style.display = 'none';
			} else {
				warningText.style.display = 'none';  // 正常時隱藏紅字
			}
		}
	</script>

	<th:block th:replace="~{layouts/frontend :: scripts}"></th:block>
</body>
</html>
